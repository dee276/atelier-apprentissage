<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Angular Dev Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1e1e2e;
    --accent: #c3002f;
    --accent-dim: #7a0020;
    --accent-pale: #3a0010;
    --amber: #d4823a;
    --green: #3a8b5c;
    --blue: #3a6b8b;
    --purple: #6b3a8b;
    --text: #e8e8f0;
    --text-muted: #6a6a82;
    --text-dim: #3a3a52;
  }

  :root.light {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #eeecea;
    --border: #d8d4cc;
    --accent: #a8002a;
    --accent-dim: #e8b4c0;
    --accent-pale: #fceef1;
    --amber: #b86a20;
    --green: #2a6e44;
    --blue: #2a5070;
    --purple: #562a70;
    --text: #1a1a24;
    --text-muted: #6a6070;
    --text-dim: #aaa4a0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.25s, color 0.25s;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
    transition: opacity 0.25s;
  }
  :root.light body::before { opacity: 0.15; }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* THEME TOGGLE */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px;
    transition: border-color 0.2s, color 0.2s, background 0.25s;
    user-select: none;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }
  .theme-toggle-icon { font-size: 13px; transition: transform 0.4s ease; }
  .theme-toggle:hover .theme-toggle-icon { transform: rotate(20deg); }

  /* HEADER */
  header {
    padding: 60px 0 48px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .header-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
    color: var(--text);
  }
  h1 span { color: var(--accent); }

  .header-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 16px;
    letter-spacing: 0.5px;
  }

  .header-meta { display: flex; gap: 24px; margin-top: 28px; flex-wrap: wrap; }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid;
    letter-spacing: 1px;
  }
  .badge-red { border-color: var(--accent-dim); color: var(--accent); background: var(--accent-pale); }
  .badge-amber { border-color: #6b4a1a; color: var(--amber); background: rgba(212,130,58,0.07); }
  .badge-blue { border-color: #1a3a5a; color: var(--blue); background: rgba(58,107,139,0.07); }
  :root.light .badge-amber { border-color: #d4b090; }
  :root.light .badge-blue { border-color: #90b4d0; }

  /* PROGRESS BAR */
  .progress-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    margin: 0 -24px 48px;
    transition: background 0.25s;
  }

  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .progress-track { height: 2px; background: var(--border); position: relative; }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px var(--accent);
  }

  /* CONTROLS */
  .controls { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }

  .ctrl-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* PHASES */
  .phase { margin-bottom: 12px; }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .phase-header::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--phase-color, var(--accent));
  }
  .phase-header:hover { border-color: var(--phase-color, var(--accent)); background: var(--surface2); }

  .phase-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 2px; min-width: 40px; }
  .phase-title { font-size: 15px; font-weight: 700; color: var(--text); flex: 1; letter-spacing: 0.3px; }
  .phase-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted); }
  .phase-chevron { font-size: 12px; color: var(--text-dim); transition: transform 0.3s; }
  .phase.open .phase-chevron { transform: rotate(180deg); }

  .phase-body { display: none; border: 1px solid var(--border); border-top: none; background: var(--surface); }
  .phase.open .phase-body { display: block; }

  /* STEPS */
  .step {
    display: grid;
    grid-template-columns: 56px 1fr;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .step:last-child { border-bottom: none; }
  .step:hover { background: var(--surface2); }

  .step-gutter {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    border-right: 1px solid var(--border);
    gap: 8px;
  }

  .step-checkbox {
    width: 18px; height: 18px;
    border: 1px solid var(--text-dim);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .step-checkbox:hover { border-color: var(--phase-color, var(--accent)); }
  .step-checkbox.checked { background: var(--phase-color, var(--accent)); border-color: var(--phase-color, var(--accent)); }
  .step-checkbox.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }

  .step-number { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-dim); letter-spacing: 1px; }

  .step-content { padding: 20px 24px; }
  .step-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
  .step-desc { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-bottom: 10px; }

  .step-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 10px 14px;
    color: #a8b8c8;
    line-height: 1.7;
    overflow-x: auto;
    transition: background 0.25s, color 0.25s;
  }
  :root.light .step-code { color: #2a3a4a; background: #f0eeea; }
  .step-code .cmd { color: #e8c87a; }
  .step-code .flag { color: #8bb8e8; }
  .step-code .comment { color: var(--text-dim); }
  .step-code .str { color: #88c888; }
  .step-code .kw { color: #cc88cc; }
  .step-code .dec { color: #e88888; }
  :root.light .step-code .cmd { color: #8b4a00; }
  :root.light .step-code .flag { color: #2a5080; }
  :root.light .step-code .str { color: #2a6e44; }
  :root.light .step-code .kw { color: #6a2a8b; }
  :root.light .step-code .dec { color: #a02020; }
  :root.light .step-code .comment { color: #aaa4a0; }

  .step-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .tag { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 8px; border: 1px solid var(--border); color: var(--text-dim); letter-spacing: 0.5px; }
  .tag-critical { border-color: var(--accent-dim); color: var(--accent); background: var(--accent-pale); }
  .tag-tip { border-color: #1a4b30; color: var(--green); background: rgba(58,139,92,0.05); }
  :root.light .tag-tip { border-color: #90c4a8; }

  .tip-block {
    background: rgba(58,139,92,0.05);
    border-left: 2px solid var(--green);
    padding: 10px 14px;
    margin-top: 10px;
    font-size: 12px;
    color: #5a9b72;
    line-height: 1.6;
    font-family: 'JetBrains Mono', monospace;
  }
  :root.light .tip-block { background: rgba(42,110,68,0.07); color: #2a6e44; }

  .warn-block {
    background: rgba(212,130,58,0.05);
    border-left: 2px solid var(--amber);
    padding: 10px 14px;
    margin-top: 10px;
    font-size: 12px;
    color: #b87040;
    line-height: 1.6;
    font-family: 'JetBrains Mono', monospace;
  }
  :root.light .warn-block { background: rgba(184,106,32,0.07); color: #8b5010; }

  /* SUMMARY */
  .summary { margin-top: 56px; padding: 32px; border: 1px solid var(--border); background: var(--surface); }
  .summary-title { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 20px; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
  .stat-box { padding: 16px; border: 1px solid var(--border); background: var(--bg); }
  .stat-num { font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-num span { color: var(--accent); }
  .stat-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; margin-top: 6px; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  @media (max-width: 600px) {
    .step { grid-template-columns: 44px 1fr; }
    h1 { letter-spacing: -1px; }
    .theme-toggle { top: 10px; right: 10px; }
  }
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
  <span class="theme-toggle-icon" id="theme-icon">☀</span>
  <span id="theme-label">LIGHT</span>
</button>

<div class="container">

  <header>
    <div class="header-tag">// workflow guide</div>
    <h1><span>Angular</span><br>Dev Workflow</h1>
    <div class="header-sub">$ ordre d'exécution · meilleures pratiques · pitfalls</div>
    <div class="header-meta">
      <span class="badge badge-red">Angular 17+</span>
      <span class="badge badge-amber">TypeScript 5.x</span>
      <span class="badge badge-blue">Standalone Components</span>
    </div>
  </header>

  <div class="progress-bar">
    <div class="progress-label">
      <span>PROGRESSION</span>
      <span id="progress-text">0 / 0 étapes complétées</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="expandAll()">TOUT OUVRIR</button>
    <button class="ctrl-btn" onclick="collapseAll()">TOUT FERMER</button>
    <button class="ctrl-btn" onclick="resetChecks()">RESET</button>
  </div>

  <div id="phases"></div>

  <div class="summary">
    <div class="summary-title">// résumé du workflow</div>
    <div class="summary-grid">
      <div class="stat-box">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">ÉTAPES TOTALES</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-done">0</div>
        <div class="stat-label">COMPLÉTÉES</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">10</div>
        <div class="stat-label">PHASES</div>
      </div>
      <div class="stat-box">
        <div class="stat-num"><span>SoC</span></div>
        <div class="stat-label">SEPARATION OF CONCERNS</div>
      </div>
    </div>
  </div>

</div>

<script>
const PHASES = [
  {
    title: "Conception & Architecture",
    color: "#c3002f",
    steps: [
      {
        title: "Définir l'architecture de l'application",
        desc: "Identifier les grandes zones fonctionnelles, les features, les données partagées et les flux utilisateurs. Angular est un framework opinionated — l'architecture se pense avant d'ouvrir VS Code.",
        code: `<span class="comment">// Questions à répondre avant de commencer</span>
<span class="comment">// 1. Features principales → modules / feature routes</span>
<span class="comment">// 2. Données partagées → state management (Signal, NgRx, Akita)</span>
<span class="comment">// 3. Auth → Guards + Interceptors</span>
<span class="comment">// 4. API → REST ou GraphQL ?</span>
<span class="comment">// 5. Standalone components ou NgModules ?</span>
<span class="comment">//    → Angular 17+ : Standalone par défaut (recommandé)</span>`,
        tags: ["critical"],
        tip: "→ Angular 17+ : toujours partir en mode standalone. NgModules = legacy."
      },
      {
        title: "Définir la structure de dossiers",
        desc: "La convention Angular recommande une structure feature-based. Éviter une structure technique (tous les services ensemble, tous les composants ensemble).",
        code: `src/
  app/
    core/              <span class="comment">// singletons : auth, interceptors, guards</span>
      auth/
      interceptors/
      guards/
    shared/            <span class="comment">// composants, pipes, directives réutilisables</span>
      components/
      pipes/
      directives/
    features/          <span class="comment">// domaines métier (lazy-loaded)</span>
      dashboard/
        dashboard.component.ts
        dashboard.routes.ts
        dashboard.service.ts
      posts/
        posts.component.ts
        posts.routes.ts
    app.routes.ts      <span class="comment">// routes racine</span>
    app.config.ts      <span class="comment">// configuration app</span>`,
        tags: ["critical"]
      },
      {
        title: "Planifier le data model (interfaces TypeScript)",
        desc: "Définir toutes les interfaces TypeScript qui modélisent les données de l'API et de l'état local. C'est l'équivalent du schéma DB en Rails.",
        code: `<span class="comment">// src/app/core/models/post.model.ts</span>
<span class="kw">export interface</span> Post {
  id:          number;
  title:       string;
  body:        string;
  published:   boolean;
  publishedAt: string | null;
  author:      User;
  tags:        Tag[];
  createdAt:   string;
}

<span class="kw">export interface</span> CreatePostDto {
  title:  string;
  body:   string;
  tagIds: number[];
}

<span class="kw">export interface</span> PaginatedResponse&lt;T&gt; {
  data:       T[];
  total:      number;
  page:       number;
  perPage:    number;
}`,
        tags: ["critical"],
        tip: "→ Séparer les interfaces de réponse API (Post) des DTOs d'envoi (CreatePostDto)."
      }
    ]
  },
  {
    title: "Setup du Projet",
    color: "#d4823a",
    steps: [
      {
        title: "Créer le projet Angular",
        desc: "Utiliser Angular CLI. Choisir dès le départ : standalone, routing, et le format de style.",
        code: `<span class="comment"># Installer CLI globalement</span>
<span class="cmd">npm install</span> <span class="flag">-g</span> @angular/cli

<span class="comment"># Créer le projet (Angular 17+)</span>
<span class="cmd">ng new</span> my-app <span class="flag">--standalone --routing --style=scss</span>
<span class="cmd">cd</span> my-app

<span class="comment"># Vérifier la version</span>
<span class="cmd">ng version</span>

<span class="comment"># Premier commit</span>
<span class="cmd">git init && git add . && git commit -m</span> <span class="str">"feat: init Angular project"</span>`,
        tags: ["critical"],
        tip: "→ --standalone est le défaut Angular 17+. Si omis, vérifier angular.json."
      },
      {
        title: "Configurer ESLint + Prettier",
        desc: "Enforcer le style dès le premier jour. Angular CLI inclut maintenant ESLint en option.",
        code: `<span class="comment"># Ajouter ESLint</span>
<span class="cmd">ng add</span> @angular-eslint/schematics

<span class="comment"># Ajouter Prettier</span>
<span class="cmd">npm install</span> <span class="flag">--save-dev</span> prettier eslint-config-prettier

<span class="comment">// .prettierrc</span>
{
  <span class="str">"singleQuote"</span>: true,
  <span class="str">"semi"</span>: true,
  <span class="str">"printWidth"</span>: 100,
  <span class="str">"tabWidth"</span>: 2
}

<span class="comment"># Vérifier</span>
<span class="cmd">npm run lint</span>`,
        tags: ["critical"]
      },
      {
        title: "Configurer les environments",
        desc: "Créer les fichiers d'environnement pour dev et production. Ne jamais hardcoder les URLs d'API.",
        code: `<span class="comment"># Générer les fichiers d'environment</span>
<span class="cmd">ng generate environments</span>

<span class="comment">// src/environments/environment.ts</span>
<span class="kw">export const</span> environment = {
  production: <span class="flag">false</span>,
  apiUrl: <span class="str">'http://localhost:3000/api'</span>,
  appName: <span class="str">'My App (DEV)'</span>
};

<span class="comment">// src/environments/environment.prod.ts</span>
<span class="kw">export const</span> environment = {
  production: <span class="flag">true</span>,
  apiUrl: <span class="str">'https://api.monapp.com'</span>,
  appName: <span class="str">'My App'</span>
};`,
        tags: ["critical"],
        warn: "⚠ Ne jamais committer de clés API dans environment.ts — utiliser des variables CI/CD."
      },
      {
        title: "Configurer le proxy de développement",
        desc: "Éviter les problèmes CORS en dev en proxifiant les appels API vers le backend.",
        code: `<span class="comment">// proxy.conf.json</span>
{
  <span class="str">"/api"</span>: {
    <span class="str">"target"</span>: <span class="str">"http://localhost:3000"</span>,
    <span class="str">"secure"</span>: <span class="flag">false</span>,
    <span class="str">"changeOrigin"</span>: <span class="flag">true</span>,
    <span class="str">"logLevel"</span>: <span class="str">"debug"</span>
  }
}

<span class="comment">// angular.json → projects → architect → serve → options</span>
<span class="str">"proxyConfig"</span>: <span class="str">"proxy.conf.json"</span>

<span class="comment"># Démarrer avec proxy</span>
<span class="cmd">ng serve</span> <span class="flag">--proxy-config</span> proxy.conf.json`,
        tags: ["tip"]
      },
      {
        title: "Installer les dépendances essentielles",
        desc: "Ajouter les librairies de base avant de commencer à coder les features.",
        code: `<span class="comment"># UI</span>
<span class="cmd">ng add</span> @angular/material     <span class="comment"># Material Design (optionnel)</span>
<span class="cmd">npm i</span> tailwindcss            <span class="comment"># ou Tailwind CSS</span>

<span class="comment"># State management</span>
<span class="cmd">npm i</span> @ngrx/store @ngrx/effects @ngrx/entity  <span class="comment"># si NgRx</span>
<span class="comment"># ou Signals (natif Angular 17+) — recommandé</span>

<span class="comment"># Utils</span>
<span class="cmd">npm i</span> date-fns               <span class="comment"># dates</span>
<span class="cmd">npm i</span> zod                    <span class="comment"># validation runtime</span>

<span class="comment"># Dev</span>
<span class="cmd">npm i</span> <span class="flag">-D</span> @testing-library/angular jest`,
        tags: ["tip"]
      }
    ]
  },
  {
    title: "Routing & Lazy Loading",
    color: "#3a6b8b",
    steps: [
      {
        title: "Configurer les routes racine",
        desc: "Définir la structure de navigation principale avec lazy loading pour chaque feature. Le lazy loading est non-négociable pour la performance.",
        code: `<span class="comment">// src/app/app.routes.ts</span>
<span class="kw">import</span> { Routes } <span class="kw">from</span> <span class="str">'@angular/router'</span>;

<span class="kw">export const</span> routes: Routes = [
  {
    path: <span class="str">''</span>,
    redirectTo: <span class="str">'dashboard'</span>,
    pathMatch: <span class="str">'full'</span>
  },
  {
    path: <span class="str">'dashboard'</span>,
    loadComponent: () => <span class="kw">import</span>(<span class="str">'./features/dashboard/dashboard.component'</span>)
      .then(m => m.DashboardComponent)
  },
  {
    path: <span class="str">'posts'</span>,
    loadChildren: () => <span class="kw">import</span>(<span class="str">'./features/posts/posts.routes'</span>)
      .then(m => m.postsRoutes)
  },
  {
    path: <span class="str">'auth'</span>,

let checkState = {};

function renderPhases() {
  const container = document.getElementById('phases');
  let totalSteps = 0;

  PHASES.forEach((phase, pi) => {
    totalSteps += phase.steps.length;
    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase';
    phaseEl.id = `phase-${pi}`;

    const stepsHTML = phase.steps.map((step, si) => {
      const key = `${pi}-${si}`;
      const checked = checkState[key] || false;
      return `
        <div class="step" style="--phase-color: ${phase.color}">
          <div class="step-gutter">
            <div class="step-checkbox ${checked ? 'checked' : ''}" onclick="toggleCheck('${key}', this)"></div>
            <div class="step-number">${String(si + 1).padStart(2, '0')}</div>
          </div>
          <div class="step-content">
            <div class="step-title">${step.title}</div>
            <div class="step-desc">${step.desc}</div>
            ${step.code ? `<div class="step-code">${step.code}</div>` : ''}
            ${step.tip  ? `<div class="tip-block">${step.tip}</div>`  : ''}
            ${step.warn ? `<div class="warn-block">${step.warn}</div>` : ''}
            <div class="step-tags">
              ${(step.tags || []).map(t =>
                `<span class="tag ${t === 'critical' ? 'tag-critical' : t === 'tip' ? 'tag-tip' : ''}">
                  ${t === 'critical' ? '⚑ critique' : t === 'tip' ? '✓ best practice' : t}
                </span>`
              ).join('')}
            </div>
          </div>
        </div>`;
    }).join('');

    phaseEl.innerHTML = `
      <div class="phase-header" style="--phase-color: ${phase.color}" onclick="togglePhase(${pi})">
        <div class="phase-num">PHASE ${String(pi + 1).padStart(2, '0')}</div>
        <div class="phase-title">${phase.title}</div>
        <div class="phase-count">${phase.steps.length} étapes</div>
        <div class="phase-chevron">▼</div>
      </div>
      <div class="phase-body">${stepsHTML}</div>`;

    container.appendChild(phaseEl);
  });

  document.getElementById('stat-total').textContent = totalSteps;
  updateProgress();
  document.getElementById('phase-0').classList.add('open');
}

function togglePhase(pi) {
  document.getElementById(`phase-${pi}`).classList.toggle('open');
}

function toggleCheck(key, el) {
  checkState[key] = !checkState[key];
  el.classList.toggle('checked', checkState[key]);
  saveState();
  updateProgress();
}

function updateProgress() {
  const total = PHASES.reduce((s, p) => s + p.steps.length, 0);
  const done  = Object.values(checkState).filter(Boolean).length;
  const pct   = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total} étapes complétées`;
  document.getElementById('stat-done').textContent = done;
}

function expandAll()  { PHASES.forEach((_, pi) => document.getElementById(`phase-${pi}`).classList.add('open')); }
function collapseAll(){ PHASES.forEach((_, pi) => document.getElementById(`phase-${pi}`).classList.remove('open')); }

function resetChecks() {
  checkState = {};
  document.querySelectorAll('.step-checkbox').forEach(el => el.classList.remove('checked'));
  saveState();
  updateProgress();
}

function saveState() {
  try { localStorage.setItem('angular-workflow-checks', JSON.stringify(checkState)); } catch(e) {}
}

function loadState() {
  try {
    const saved = localStorage.getItem('angular-workflow-checks');
    if (saved) checkState = JSON.parse(saved);
  } catch(e) {}
}

function toggleTheme() {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('theme-icon').textContent  = isLight ? '🌙' : '☀';
  document.getElementById('theme-label').textContent = isLight ? 'DARK' : 'LIGHT';
  try { localStorage.setItem('angular-workflow-theme', isLight ? 'light' : 'dark'); } catch(e) {}
}

function loadTheme() {
  try {
    const saved = localStorage.getItem('angular-workflow-theme');
    if (saved === 'light') {
      document.documentElement.classList.add('light');
      document.getElementById('theme-icon').textContent  = '🌙';
      document.getElementById('theme-label').textContent = 'DARK';
    }
  } catch(e) {}
}

loadTheme();
loadState();
renderPhases();
