.copy-btn{margin-left:auto;font-size:11px;font-family:'JetBrains Mono',monospace;padding:4px 10px;border-radius:5px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#546E7A;cursor:pointer;transition:all .15s}

pre{font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.75;padding:18px 22px;overflow-x:auto;color:#CDD3DE;background:var(--code-bg);margin:0}
.kw{color:#C792EA}.fn{color:#82AAFF}.st{color:#C3E88D}.nm{color:#F78C6C}
.cm{color:#546E7A;font-style:italic}.ty{color:#FFCB6B}.mc{color:#89DDFF}
.op{color:#89DDFF}.sym{color:#4EC9B0}
.output-body{padding:16px 20px;background:var(--bg2);font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--tx2);line-height:1.8}
.out-prompt{color:var(--rust)}.out-ok{color:#3D9970}.out-val{color:#F78C6C}.out-dim{color:var(--tx3)}
.done-row{display:flex;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--line);background:var(--bg2)}
.done-btn{display:flex;align-items:center;gap:6px;font-size:12.5px;font-family:'DM Sans',sans-serif;padding:6px 14px;border-radius:7px;border:1px solid var(--line2);background:none;color:var(--tx3);cursor:pointer;transition:all .15s}
.done-btn:hover{border-color:var(--green);color:var(--green)}
.done-btn.done{border-color:var(--green);color:var(--green);background:rgba(61,153,112,.08)}
.section-divider{height:1px;background:var(--line);margin-bottom:56px}
@media(max-width:800px){nav{display:none}main{margin-left:0;padding:20px 18px 80px}.prog-strip{left:0}}
</style>

<script>
var EXERCISES = [
  {
    id:'21',title:'secp256k1 — addition de points',
    tags:['ECC','secp256k1','point addition','affine'],
    cargo:'',
    concept:[
      {type:'h3',text:'Courbe elliptique secp256k1'},
      {type:'p',text:'secp256k1 est définie par y² = x³ + 7 sur F_p, avec p = 2²⁵⁶ - 2³² - 977. C\'est la courbe utilisée par Bitcoin et Ethereum pour toutes les signatures.'},
      {type:'ul',items:[
        'Point à l\'infini : élément neutre du groupe, noté O',
        'Addition : si P ≠ Q : λ = (y₂-y₁)/(x₂-x₁) mod p, x₃ = λ²-x₁-x₂, y₃ = λ(x₁-x₃)-y₁',
        'Doublement (P = Q) : λ = 3x₁²/(2y₁) mod p',
        'Inverse modulaire via Fermat : a⁻¹ = a^(p-2) mod p',
      ]},
      {type:'tip',text:'En coordonnées projectives (Jacobian), on évite les divisions coûteuses. Les bibliothèques production utilisent cette optimisation — le code ci-dessous est pédagogique en coordonnées affines.'},
    ],
    code:
'<span class="cm">// 21 — secp256k1 : addition de points en coordonnées affines</span>\n'+
'<span class="cm">// Cargo.toml : pas de dépendances (arithmétique u256 simulée)</span>\n'+
'\n'+
'<span class="kw">use</span> std::fmt;\n'+
'\n'+
'<span class="cm">// Paramètres secp256k1 — p = 2^256 - 2^32 - 977</span>\n'+
'<span class="cm">// On utilise u128 pour simplifier (vrai impl nécessite u256)</span>\n'+
'\n'+
'<span class="cm">/// Point sur une courbe elliptique (coordonnées affines)</span>\n'+
'<span class="kw">#[derive(Clone, Debug, PartialEq)]</span>\n'+
'<span class="kw">enum</span> <span class="ty">Point</span> {\n'+
'    <span class="ty">Infinity</span>,\n'+
'    <span class="ty">Affine</span> { x: <span class="ty">u64</span>, y: <span class="ty">u64</span> },\n'+
'}\n'+
'\n'+
'<span class="cm">/// Courbe y² = x³ + ax + b mod p</span>\n'+
'<span class="kw">struct</span> <span class="ty">Curve</span> { a: <span class="ty">u64</span>, b: <span class="ty">u64</span>, p: <span class="ty">u64</span> }\n'+
'\n'+
'<span class="kw">impl</span> <span class="ty">Curve</span> {\n'+
'    <span class="cm">/// Inverse modulaire via petit théorème de Fermat : a^(p-2) mod p</span>\n'+
'    <span class="kw">fn</span> <span class="fn">inv</span>(<span class="op">&amp;</span><span class="kw">self</span>, a: <span class="ty">u64</span>) -&gt; <span class="ty">u64</span> {\n'+
'        <span class="fn">mod_pow</span>(a, <span class="kw">self</span>.p - <span class="nm">2</span>, <span class="kw">self</span>.p)\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Vérifie qu\'un point appartient à la courbe</span>\n'+
'    <span class="kw">fn</span> <span class="fn">is_on_curve</span>(<span class="op">&amp;</span><span class="kw">self</span>, p: <span class="op">&amp;</span><span class="ty">Point</span>) -&gt; <span class="ty">bool</span> {\n'+
'        <span class="kw">match</span> p {\n'+
'            <span class="ty">Point</span>::<span class="ty">Infinity</span> =&gt; <span class="kw">true</span>,\n'+
'            <span class="ty">Point</span>::<span class="ty">Affine</span> { x, y } =&gt; {\n'+
'                <span class="kw">let</span> lhs = (y * y) % <span class="kw">self</span>.p;\n'+
'                <span class="kw">let</span> rhs = ((<span class="fn">mod_pow</span>(*x, <span class="nm">3</span>, <span class="kw">self</span>.p)\n'+
'                    + <span class="kw">self</span>.a * x % <span class="kw">self</span>.p\n'+
'                    + <span class="kw">self</span>.b) % <span class="kw">self</span>.p);\n'+
'                lhs == rhs\n'+
'            }\n'+
'        }\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Addition de deux points</span>\n'+
'    <span class="kw">fn</span> <span class="fn">add</span>(<span class="op">&amp;</span><span class="kw">self</span>, p1: <span class="op">&amp;</span><span class="ty">Point</span>, p2: <span class="op">&amp;</span><span class="ty">Point</span>) -&gt; <span class="ty">Point</span> {\n'+
'        <span class="kw">match</span> (p1, p2) {\n'+
'            (<span class="ty">Point</span>::<span class="ty">Infinity</span>, _) =&gt; p2.<span class="fn">clone</span>(),\n'+
'            (_, <span class="ty">Point</span>::<span class="ty">Infinity</span>) =&gt; p1.<span class="fn">clone</span>(),\n'+
'            (<span class="ty">Point</span>::<span class="ty">Affine</span>{x:x1,y:y1}, <span class="ty">Point</span>::<span class="ty">Affine</span>{x:x2,y:y2}) =&gt; {\n'+
'                <span class="kw">let</span> p = <span class="kw">self</span>.p;\n'+
'                <span class="kw">if</span> x1 == x2 {\n'+
'                    <span class="kw">if</span> y1 != y2 { <span class="kw">return</span> <span class="ty">Point</span>::<span class="ty">Infinity</span>; } <span class="cm">// P + (-P)</span>\n'+
'                    <span class="cm">// Doublement : λ = 3x²/(2y) mod p</span>\n'+
'                    <span class="kw">let</span> num = (<span class="nm">3</span> * x1 % p * x1 % p + <span class="kw">self</span>.a) % p;\n'+
'                    <span class="kw">let</span> den = (<span class="nm">2</span> * y1) % p;\n'+
'                    <span class="kw">let</span> lam = num * <span class="kw">self</span>.<span class="fn">inv</span>(den) % p;\n'+
'                    <span class="kw">let</span> x3 = (lam * lam % p + p*<span class="nm">2</span> - <span class="nm">2</span> * x1 % p) % p;\n'+
'                    <span class="kw">let</span> y3 = (lam * ((x1 + p - x3) % p) % p + p - y1 % p) % p;\n'+
'                    <span class="ty">Point</span>::<span class="ty">Affine</span>{x:x3, y:y3}\n'+
'                } <span class="kw">else</span> {\n'+
'                    <span class="cm">// Addition : λ = (y2-y1)/(x2-x1) mod p</span>\n'+
'                    <span class="kw">let</span> num = (y2 + p - y1) % p;\n'+
'                    <span class="kw">let</span> den = (x2 + p - x1) % p;\n'+
'                    <span class="kw">let</span> lam = num * <span class="kw">self</span>.<span class="fn">inv</span>(den) % p;\n'+
'                    <span class="kw">let</span> x3 = (lam * lam % p + p*<span class="nm">2</span> + p - x1 % p - x2 % p) % p;\n'+
'                    <span class="kw">let</span> y3 = (lam * ((x1 + p - x3) % p) % p + p - y1 % p) % p;\n'+
'                    <span class="ty">Point</span>::<span class="ty">Affine</span>{x:x3, y:y3}\n'+
'                }\n'+
'            }\n'+
'        }\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Multiplication scalaire : k * P via double-and-add</span>\n'+
'    <span class="kw">fn</span> <span class="fn">mul</span>(<span class="op">&amp;</span><span class="kw">self</span>, <span class="kw">mut</span> k: <span class="ty">u64</span>, p: <span class="op">&amp;</span><span class="ty">Point</span>) -&gt; <span class="ty">Point</span> {\n'+
'        <span class="kw">let mut</span> result = <span class="ty">Point</span>::<span class="ty">Infinity</span>;\n'+
'        <span class="kw">let mut</span> addend = p.<span class="fn">clone</span>();\n'+
'        <span class="kw">while</span> k &gt; <span class="nm">0</span> {\n'+
'            <span class="kw">if</span> k <span class="op">&amp;</span> <span class="nm">1</span> == <span class="nm">1</span> { result = <span class="kw">self</span>.<span class="fn">add</span>(<span class="op">&amp;</span>result, <span class="op">&amp;</span>addend); }\n'+
'            addend = <span class="kw">self</span>.<span class="fn">add</span>(<span class="op">&amp;</span>addend, <span class="op">&amp;</span>addend);\n'+
'            k >>= <span class="nm">1</span>;\n'+
'        }\n'+
'        result\n'+
'    }\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">mod_pow</span>(<span class="kw">mut</span> base: <span class="ty">u64</span>, <span class="kw">mut</span> exp: <span class="ty">u64</span>, m: <span class="ty">u64</span>) -&gt; <span class="ty">u64</span> {\n'+
'    <span class="kw">let mut</span> r = <span class="nm">1u64</span>;\n'+
'    base %= m;\n'+
'    <span class="kw">while</span> exp &gt; <span class="nm">0</span> {\n'+
'        <span class="kw">if</span> exp <span class="op">&amp;</span> <span class="nm">1</span> == <span class="nm">1</span> { r = (r as u128 * base as u128 % m as u128) as u64; }\n'+
'        base = (base as u128 * base as u128 % m as u128) as u64;\n'+
'        exp >>= <span class="nm">1</span>;\n'+
'    }\n'+
'    r\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">main</span>() {\n'+
'    <span class="cm">// Courbe simplifiée y² = x³ + 7 mod 17 (même forme que secp256k1, p petit)</span>\n'+
'    <span class="kw">let</span> curve = <span class="ty">Curve</span> { a: <span class="nm">0</span>, b: <span class="nm">7</span>, p: <span class="nm">17</span> };\n'+
'\n'+
'    <span class="cm">// Point générateur G sur y²=x³+7 mod 17: (15,13)</span>\n'+
'    <span class="kw">let</span> g = <span class="ty">Point</span>::<span class="ty">Affine</span> { x: <span class="nm">15</span>, y: <span class="nm">13</span> };\n'+
'    <span class="mc">println!</span>(<span class="st">"G sur courbe : {}"</span>, curve.<span class="fn">is_on_curve</span>(<span class="op">&amp;</span>g));\n'+
'\n'+
'    <span class="cm">// Doublement : 2G</span>\n'+
'    <span class="kw">let</span> two_g = curve.<span class="fn">add</span>(<span class="op">&amp;</span>g, <span class="op">&amp;</span>g);\n'+
'    <span class="mc">println!</span>(<span class="st">"2G = {:?}"</span>, two_g);\n'+
'    <span class="mc">println!</span>(<span class="st">"2G sur courbe : {}"</span>, curve.<span class="fn">is_on_curve</span>(<span class="op">&amp;</span>two_g));\n'+
'\n'+
'    <span class="cm">// Addition : G + 2G = 3G</span>\n'+
'    <span class="kw">let</span> three_g = curve.<span class="fn">add</span>(<span class="op">&amp;</span>g, <span class="op">&amp;</span>two_g);\n'+
'    <span class="mc">println!</span>(<span class="st">"3G = {:?}"</span>, three_g);\n'+
'\n'+
'    <span class="cm">// Multiplication scalaire : 3*G doit égaler 3G</span>\n'+
'    <span class="kw">let</span> three_g_mul = curve.<span class="fn">mul</span>(<span class="nm">3</span>, <span class="op">&amp;</span>g);\n'+
'    <span class="mc">assert_eq!</span>(three_g, three_g_mul, <span class="st">"3G via add != 3G via mul"</span>);\n'+
'    <span class="mc">println!</span>(<span class="st">"OK 3G(add) == 3G(mul)"</span>);\n'+
'\n'+

'];\n'+
'\n'+
'<span class="cm">// Constantes de ronde Rcon</span>\n'+
'<span class="kw">const</span> <span class="ty">RCON</span>: [<span class="ty">u8</span>;<span class="nm">11</span>] = [<span class="nm">0x00</span>,<span class="nm">0x01</span>,<span class="nm">0x02</span>,<span class="nm">0x04</span>,<span class="nm">0x08</span>,<span class="nm">0x10</span>,<span class="nm">0x20</span>,<span class="nm">0x40</span>,<span class="nm">0x80</span>,<span class="nm">0x1b</span>,<span class="nm">0x36</span>];\n'+
'\n'+
'<span class="cm">/// Multiplication dans GF(2^8) pour MixColumns</span>\n'+
'<span class="kw">fn</span> <span class="fn">gf_mul</span>(a: <span class="ty">u8</span>, b: <span class="ty">u8</span>) -&gt; <span class="ty">u8</span> {\n'+
'    <span class="kw">let</span> <span class="kw">mut</span> p = <span class="nm">0u8</span>; <span class="kw">let</span> <span class="kw">mut</span> a = a; <span class="kw">let</span> <span class="kw">mut</span> b = b;\n'+
'    <span class="kw">for</span> _ <span class="kw">in</span> <span class="nm">0</span>..<span class="nm">8</span> {\n'+
'        <span class="kw">if</span> b <span class="op">&amp;</span> <span class="nm">1</span> != <span class="nm">0</span> { p ^= a; }\n'+
'        <span class="kw">let</span> hi = a <span class="op">&amp;</span> <span class="nm">0x80</span>;\n'+
'        a <<= <span class="nm">1</span>;\n'+
'        <span class="kw">if</span> hi != <span class="nm">0</span> { a ^= <span class="nm">0x1b</span>; } <span class="cm">// polynôme réducteur x^8+x^4+x^3+x+1</span>\n'+
'        b >>= <span class="nm">1</span>;\n'+
'    }\n'+
'    p\n'+
'}\n'+
'\n'+
'<span class="cm">/// Expansion de clé AES-128 (génère 11 sous-clés de 16 bytes)</span>\n'+
'<span class="kw">fn</span> <span class="fn">key_expand</span>(key: <span class="op">&amp;</span>[<span class="ty">u8</span>;<span class="nm">16</span>]) -&gt; [[<span class="ty">u8</span>;<span class="nm">16</span>];<span class="nm">11</span>] {\n'+
'    <span class="kw">let mut</span> w = [[<span class="nm">0u8</span>;<span class="nm">4</span>];<span class="nm">44</span>];\n'+
'    <span class="kw">for</span> i <span class="kw">in</span> <span class="nm">0</span>..<span class="nm">4</span> { w[i] = key[i*<span class="nm">4</span>..i*<span class="nm">4</span>+<span class="nm">4</span>].<span class="fn">try_into</span>().<span class="fn">unwrap</span>(); }\n'+
'    <span class="kw">for</span> i <span class="kw">in</span> <span class="nm">4</span>..<span class="nm">44</span> {\n'+
'        <span class="kw">let mut</span> temp = w[i-<span class="nm">1</span>];\n'+
'        <span class="kw">if</span> i % <span class="nm">4</span> == <span class="nm">0</span> {\n'+
'            temp = [<span class="ty">SBOX</span>[temp[<span class="nm">1</span>] <span class="kw">as</span> <span class="ty">usize</span>]^<span class="ty">RCON</span>[i/<span class="nm">4</span>],\n'+
'                    <span class="ty">SBOX</span>[temp[<span class="nm">2</span>] <span class="kw">as</span> <span class="ty">usize</span>],\n'+
'                    <span class="ty">SBOX</span>[temp[<span class="nm">3</span>] <span class="kw">as</span> <span class="ty">usize</span>],\n'+
'                    <span class="ty">SBOX</span>[temp[<span class="nm">0</span>] <span class="kw">as</span> <span class="ty">usize</span>]];\n'+
'        }\n'+
'        w[i] = [w[i-<span class="nm">4</span>][<span class="nm">0</span>]^temp[<span class="nm">0</span>], w[i-<span class="nm">4</span>][<span class="nm">1</span>]^temp[<span class="nm">1</span>],\n'+
'                w[i-<span class="nm">4</span>][<span class="nm">2</span>]^temp[<span class="nm">2</span>], w[i-<span class="nm">4</span>][<span class="nm">3</span>]^temp[<span class="nm">3</span>]];\n'+
'    }\n'+
'    <span class="kw">let mut</span> rk = [[<span class="nm">0u8</span>;<span class="nm">16</span>];<span class="nm">11</span>];\n'+
'    <span class="kw">for</span> i <span class="kw">in</span> <span class="nm">0</span>..<span class="nm">11</span> {\n'+
'        <span class="kw">for</span> j <span class="kw">in</span> <span class="nm">0</span>..<span class="nm">4</span> { rk[i][j*<span class="nm">4</span>..j*<span class="nm">4</span>+<span class="nm">4</span>].<span class="fn">copy_from_slice</span>(<span class="op">&amp;</span>w[i*<span class="nm">4</span>+j]); }\n'+
'    }\n'+
'    rk\n'+
'}\n'+
'\n'+
'<span class="cm">/// Chiffrement AES-128 d\'un bloc de 16 bytes</span>\n'+
'<span class="kw">fn</span> <span class="fn">aes128_encrypt_block</span>(block: <span class="op">&amp;</span>[<span class="ty">u8</span>;<span class="nm">16</span>], rk: <span class="op">&amp;</span>[[<span class="ty">u8</span>;<span class="nm">16</span>];<span class="nm">11</span>]) -&gt; [<span class="ty">u8</span>;<span class="nm">16</span>] {\n'+
'    <span class="kw">let mut</span> s = *block;\n'+
'    <span class="cm">// AddRoundKey initial</span>\n'+
'    <span class="kw">for</span> i <span class="kw">in</span> <span class="nm">0</span>..<span class="nm">16</span> { s[i] ^= rk[<span class="nm">0</span>][i]; }\n'+
'\n'+
'    <span class="kw">for</span> round <span class="kw">in</span> <span class="nm">1</span>..=<span class="nm">10</span> {\n'+
'        <span class="cm">// SubBytes</span>\n'+
'        <span class="kw">for</span> b <span class="kw">in</span> s.<span class="fn">iter_mut</span>() { *b = <span class="ty">SBOX</span>[*b <span class="kw">as</span> <span class="ty">usize</span>]; }\n'+
'\n'+
'        <span class="cm">// ShiftRows</span>\n'+
'        s = [s[<span class="nm">0</span>],s[<span class="nm">5</span>],s[<span class="nm">10</span>],s[<span class="nm">15</span>], s[<span class="nm">4</span>],s[<span class="nm">9</span>],s[<span class="nm">14</span>],s[<span class="nm">3</span>],\n'+
'             s[<span class="nm">8</span>],s[<span class="nm">13</span>],s[<span class="nm">2</span>],s[<span class="nm">7</span>],   s[<span class="nm">12</span>],s[<span class="nm">1</span>],s[<span class="nm">6</span>],s[<span class="nm">11</span>]];\n'+
'\n'+
'        <span class="cm">// MixColumns (sauf dernière ronde)</span>\n'+
'        <span class="kw">if</span> round < <span class="nm">10</span> {\n'+
'            <span class="kw">for</span> c <span class="kw">in</span> <span class="nm">0</span>..<span class="nm">4</span> {\n'+
'                <span class="kw">let</span> [a,b,cc,d] = [s[c],s[c+<span class="nm">4</span>],s[c+<span class="nm">8</span>],s[c+<span class="nm">12</span>]];\n'+
'                s[c]    = <span class="fn">gf_mul</span>(<span class="nm">2</span>,a)^<span class="fn">gf_mul</span>(<span class="nm">3</span>,b)^cc^d;\n'+
'                s[c+<span class="nm">4</span>] = a^<span class="fn">gf_mul</span>(<span class="nm">2</span>,b)^<span class="fn">gf_mul</span>(<span class="nm">3</span>,cc)^d;\n'+
'                s[c+<span class="nm">8</span>] = a^b^<span class="fn">gf_mul</span>(<span class="nm">2</span>,cc)^<span class="fn">gf_mul</span>(<span class="nm">3</span>,d);\n'+
'                s[c+<span class="nm">12</span>]= <span class="fn">gf_mul</span>(<span class="nm">3</span>,a)^b^cc^<span class="fn">gf_mul</span>(<span class="nm">2</span>,d);\n'+
'            }\n'+
'        }\n'+
'\n'+
'        <span class="cm">// AddRoundKey</span>\n'+
'        <span class="kw">for</span> i <span class="kw">in</span> <span class="nm">0</span>..<span class="nm">16</span> { s[i] ^= rk[round][i]; }\n'+
'    }\n'+
'    s\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">hex</span>(b: <span class="op">&amp;</span>[<span class="ty">u8</span>]) -&gt; <span class="ty">String</span> { b.<span class="fn">iter</span>().<span class="fn">map</span>(|x|<span class="mc">format!</span>(<span class="st">"{:02x}"</span>,x)).<span class="fn">collect</span>() }\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">main</span>() {\n'+
'    <span class="cm">// Vecteur de test NIST FIPS 197</span>\n'+

'    <span class="kw">let</span> plain: [<span class="ty">u8</span>;<span class="nm">16</span>] = [<span class="nm">0x00</span>,<span class="nm">0x11</span>,<span class="nm">0x22</span>,<span class="nm">0x33</span>,<span class="nm">0x44</span>,<span class="nm">0x55</span>,<span class="nm">0x66</span>,<span class="nm">0x77</span>,\n'+
'                           <span class="nm">0x88</span>,<span class="nm">0x99</span>,<span class="nm">0xaa</span>,<span class="nm">0xbb</span>,<span class="nm">0xcc</span>,<span class="nm">0xdd</span>,<span class="nm">0xee</span>,<span class="nm">0xff</span>];\n'+
'    <span class="kw">let</span> expected = <span class="st">"69c4e0d86a7b04300d8a3c7d9a1a9c0c"</span>;\n'+
'\n'+
'    <span class="kw">let</span> rk = <span class="fn">key_expand</span>(<span class="op">&amp;</span>key);\n'+
'    <span class="kw">let</span> ct = <span class="fn">aes128_encrypt_block</span>(<span class="op">&amp;</span>plain, <span class="op">&amp;</span>rk);\n'+
'\n'+
'    <span class="mc">println!</span>(<span class="st">"Plaintext : {}"</span>, <span class="fn">hex</span>(<span class="op">&amp;</span>plain));\n'+
'    <span class="mc">println!</span>(<span class="st">"Key       : {}"</span>, <span class="fn">hex</span>(<span class="op">&amp;</span>key));\n'+
'    <span class="mc">println!</span>(<span class="st">"Chiffré   : {}"</span>, <span class="fn">hex</span>(<span class="op">&amp;</span>ct));\n'+
'    <span class="mc">println!</span>(<span class="st">"Attendu   : {}"</span>, expected);\n'+
'    <span class="mc">assert_eq!</span>(<span class="fn">hex</span>(<span class="op">&amp;</span>ct), expected);\n'+
'    <span class="mc">println!</span>(<span class="st">"OK vecteur NIST validé!\n"</span>);\n'+
'\n'+
'    <span class="cm">// Démonstration danger ECB : blocs identiques → ciphertexts identiques</span>\n'+

'<span class="cm">// Cargo.toml : chacha20 = "0.9"</span>\n'+
'<span class="kw">use</span> chacha20::{ChaCha20, cipher::{KeyIvInit, StreamCipher}};\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">chacha_encrypt</span>(key: <span class="op">&amp;</span>[<span class="ty">u8</span>;<span class="nm">32</span>], nonce: <span class="op">&amp;</span>[<span class="ty">u8</span>;<span class="nm">12</span>], msg: <span class="op">&amp;</span>[<span class="ty">u8</span>]) -&gt; <span class="ty">Vec</span>&lt;<span class="ty">u8</span>&gt; {\n'+
'    <span class="kw">let mut</span> ct = msg.<span class="fn">to_vec</span>();\n'+
'    ChaCha20::<span class="fn">new</span>(<span class="op">&amp;</span>(*key).<span class="fn">into</span>(), <span class="op">&amp;</span>(*nonce).<span class="fn">into</span>()).<span class="fn">apply_keystream</span>(<span class="op">&amp;</span><span class="kw">mut</span> ct);\n'+
'    ct\n'+

'        <span class="kw">if</span> <span class="fn">meets_difficulty</span>(<span class="op">&amp;</span>hash, difficulty_bits) {\n'+
'            <span class="kw">return</span> (nonce, hash, nonce <span class="kw">as</span> <span class="ty">u64</span> + <span class="nm">1</span>, start.<span class="fn">elapsed</span>());\n'+
'        }\n'+
'    }\n'+
'    <span class="mc">unreachable!</span>()\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">hex</span>(b: <span class="op">&amp;</span>[<span class="ty">u8</span>]) -&gt; <span class="ty">String</span> { b.<span class="fn">iter</span>().<span class="fn">map</span>(|x|<span class="mc">format!</span>(<span class="st">"{:02x}"</span>,x)).<span class="fn">collect</span>() }\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">main</span>() {\n'+
'    <span class="kw">let</span> header = <span class="st">b"Block #1 | prev=000000 | merkle=abc123 | ts=1704067200"</span>;\n'+
'\n'+
'    <span class="kw">for</span> bits <span class="kw">in</span> [<span class="nm">8u32</span>, <span class="nm">16</span>, <span class="nm">20</span>] {\n'+
'        <span class="kw">let</span> (nonce, hash, tries, dur) = <span class="fn">mine</span>(header, bits);\n'+
'        <span class="kw">let</span> hashrate = tries * <span class="nm">1000</span> / (dur.<span class="fn">as_millis</span>() <span class="kw">as</span> <span class="ty">u64</span> + <span class="nm">1</span>);\n'+
'        <span class="mc">println!</span>(<span class="st">"Diff {:2} bits | nonce={:8} | {:6} tentatives | {}ms | {} kH/s"</span>,\n'+
'            bits, nonce, tries, dur.<span class="fn">as_millis</span>(), hashrate/<span class="nm">1000</span>);\n'+
'        <span class="mc">println!</span>(<span class="st">"  hash: {}..."</span>, <span class="op">&amp;</span><span class="fn">hex</span>(<span class="op">&amp;</span>hash)[..<span class="nm">24</span>]);\n'+
'    }\n'+
'\n'+
'    <span class="cm">// Vérification : changer 1 byte du header invalide le PoW</span>\n'+
'    <span class="kw">let</span> (nonce, hash, _, _) = <span class="fn">mine</span>(header, <span class="nm">8</span>);\n'+
'    <span class="kw">let mut</span> tampered = header.<span class="fn">to_vec</span>();\n'+
'    tampered[<span class="nm">0</span>] ^= <span class="nm">0x01</span>;\n'+
'    <span class="kw">let mut</span> data = tampered;\n'+
'    data.<span class="fn">extend_from_slice</span>(<span class="op">&amp;</span>nonce.<span class="fn">to_le_bytes</span>());\n'+
'    <span class="kw">let</span> bad_hash = <span class="fn">sha256d</span>(<span class="op">&amp;</span>data);\n'+
'    <span class="mc">println!</span>(<span class="st">"\nModification header → PoW invalide : {}"</span>,\n'+
'        !<span class="fn">meets_difficulty</span>(<span class="op">&amp;</span>bad_hash, <span class="nm">8</span>));\n'+
'}',
    output:
'<span class="out-prompt">$</span> cargo run --release\n'+
'Diff  8 bits | nonce=     212 |    213 tentatives |  1ms | 213 kH/s\n'+
'  hash: <span class="out-val">000000a3c2b4d9e1f8...</span>\n'+
'Diff 16 bits | nonce=   47821 |  47822 tentatives |  18ms | 2657 kH/s\n'+
'  hash: <span class="out-val">00000000f2a9c4b8d3...</span>\n'+
'Diff 20 bits | nonce=  893421 | 893422 tentatives | 312ms | 2863 kH/s\n'+
'  hash: <span class="out-val">000000000ec4b2a9f3...</span>\n'+
'\n'+
'Modification header → PoW invalide : <span class="out-ok">true</span>'
  }
];

// ── BUILD NAV ──
var navDiv = document.getElementById('nav-items');
EXERCISES.forEach(function(ex) {
  var btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.id = 'nb-' + ex.id;
  btn.innerHTML = '<span class="nn">'+ex.id+'</span><span style="flex:1;font-size:12px">'+ex.title+'</span><span class="nc">✓</span>';
  btn.onclick = function(){ document.getElementById('ex-'+ex.id)?.scrollIntoView({behavior:'smooth',block:'start'}); };
  navDiv.appendChild(btn);
});

// ── BUILD EXERCISES ──
var cont = document.getElementById('ex-container');
EXERCISES.forEach(function(ex, idx) {
  var uid = 'u'+ex.id;
  var conceptHtml = '';
  ex.concept.forEach(function(c){
    if(c.type==='h3') conceptHtml+='<h3>'+c.text+'</h3>';
    else if(c.type==='p') conceptHtml+='<p>'+c.text+'</p>';
    else if(c.type==='ul'){ conceptHtml+='<ul>'; c.items.forEach(function(li){conceptHtml+='<li>'+li+'</li>';}); conceptHtml+='</ul>'; }
    else if(c.type==='warn') conceptHtml+='<div class="callout warn"><span>⚠</span><span>'+c.text+'</span></div>';
    else if(c.type==='tip') conceptHtml+='<div class="callout tip"><span>✓</span><span>'+c.text+'</span></div>';
    else if(c.type==='info') conceptHtml+='<div class="callout info"><span>ℹ</span><span>'+c.text+'</span></div>';
  });
  var cargoPanel = ex.cargo ? '<div class="tab-panel" id="'+uid+'-2"><div class="code-wrap"><div class="code-header"><span style="font-family:JetBrains Mono,monospace;font-size:11px;color:#546E7A">Cargo.toml</span></div><pre>[dependencies]\n'+ex.cargo+'</pre></div></div>' : '';
  var outIdx = ex.cargo ? 3 : 2;
  var cargoTab = ex.cargo ? '<button class="tab-btn" onclick="showTab(\''+uid+'\',2,this)">📦 Cargo</button>' : '';
  cont.insertAdjacentHTML('beforeend',
    '<section class="ex-section" id="ex-'+ex.id+'">'+
    '<div class="ex-head"><div class="ex-badge">Ex. '+ex.id+'</div><div class="ex-head-info"><h2>'+ex.title+'</h2><div class="tags">'+ex.tags.map(function(t){return '<span class="tag">'+t+'</span>';}).join('')+'</div></div></div>'+
    '<div class="tab-wrap">'+
    '<div class="tab-bar">'+
    '<button class="tab-btn active" onclick="showTab(\''+uid+'\',0,this)">📖 Concept</button>'+
    '<button class="tab-btn" onclick="showTab(\''+uid+'\',1,this)">🦀 Code</button>'+
    cargoTab+
    '<button class="tab-btn" onclick="showTab(\''+uid+'\','+outIdx+',this)">▶ Sortie</button>'+
    '</div>'+
    '<div class="tab-panel active" id="'+uid+'-0"><div class="concept-body">'+conceptHtml+'</div></div>'+
    '<div class="tab-panel" id="'+uid+'-1"><div class="code-wrap"><div class="code-header"><div class="code-dots"><div class="code-dot" style="background:#FF5F57"></div><div class="code-dot" style="background:#FFBD2E"></div><div class="code-dot" style="background:#28C840"></div></div><span style="font-family:JetBrains Mono,monospace;font-size:11px;color:#546E7A;margin-left:8px">src/main.rs</span><button class="copy-btn" id="cpb-'+uid+'" onclick="copyCode(\''+uid+'\')">Copier</button></div><pre id="pre-'+uid+'">'+ex.code+'</pre></div></div>'+
    cargoPanel+
    '<div class="tab-panel" id="'+uid+'-'+outIdx+'"><div class="output-body">'+ex.output+'</div></div>'+
    '<div class="done-row"><button class="done-btn" id="done-'+ex.id+'" onclick="toggleDone(\''+ex.id+'\')"><span id="di-'+ex.id+'">○</span> <span id="dl-'+ex.id+'">Marquer comme fait</span></button></div>'+
    '</div></section>'+
    (idx<EXERCISES.length-1?'<div class="section-divider"></div>':'')
  );
});

function showTab(uid,idx,btn){
  var i=0; while(true){var p=document.getElementById(uid+'-'+i);if(!p)break;p.classList.toggle('active',i===idx);i++;}
  btn.closest('.tab-bar').querySelectorAll('.tab-btn').forEach(function(b,j){b.classList.toggle('active',j===idx);});
}
function copyCode(uid){
  var pre=document.getElementById('pre-'+uid);
  var btn=document.getElementById('cpb-'+uid);
  navigator.clipboard.writeText(pre.innerText).then(function(){btn.textContent='Copié!';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copier';btn.classList.remove('copied');},2000);});
}
var DONE_KEY='rust_21_30_done';
var doneMap={};try{doneMap=JSON.parse(localStorage.getItem(DONE_KEY)||'{}');}catch(e){}
function toggleDone(id){doneMap[id]=!doneMap[id];localStorage.setItem(DONE_KEY,JSON.stringify(doneMap));renderDone();}
function renderDone(){var c=0;EXERCISES.forEach(function(ex){var d=!!doneMap[ex.id];if(d)c++;var btn=document.getElementById('done-'+ex.id);var icon=document.getElementById('di-'+ex.id);var lbl=document.getElementById('dl-'+ex.id);var nav=document.getElementById('nb-'+ex.id);if(btn)btn.className=d?'done-btn done':'done-btn';if(icon)icon.textContent=d?'✓':'○';if(lbl)lbl.textContent=d?'Complété':'Marquer comme fait';if(nav)nav.classList.toggle('done',d);});document.getElementById('nav-prog').textContent=c+' / 10';document.getElementById('prog-fill').style.width=(c/10*100)+'%';}
function doExpandAll(){EXERCISES.forEach(function(ex){var uid='u'+ex.id;var b=document.querySelector('[onclick="showTab(\''+uid+'\',1,this)"]');if(b)showTab(uid,1,b);});}
function doMarkAll(){EXERCISES.forEach(function(ex){doneMap[ex.id]=true;});localStorage.setItem(DONE_KEY,JSON.stringify(doneMap));renderDone();}
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('rust_l2_theme',t);document.getElementById('tbtn-dark').classList.toggle('active',t==='dark');document.getElementById('tbtn-light').classList.toggle('active',t==='light');}
var io=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){var id=e.target.id.replace('ex-','');document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.toggle('active',b.id==='nb-'+id);});}});},{rootMargin:'-15% 0px -70% 0px'});
document.querySelectorAll('.ex-section').forEach(function(s){io.observe(s);});
var st=localStorage.getItem('rust_l2_theme')||'dark';setTheme(st);renderDone();
</script>
