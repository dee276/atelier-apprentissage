<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rust x Crypto — Solutions 01-20</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --rust: #CE422B;
  --green: #3D9970;
  --blue: #4A90D9;
  --yellow: #E5A820;
  --lv0: #3D9970;
  --lv1: #4A90D9;
}
[data-theme="dark"] {
  --bg: #0D0D0F; --bg2: #131315; --bg3: #1A1A1D; --bg4: #222226;
  --line: rgba(255,255,255,.06); --line2: rgba(255,255,255,.11);
  --tx1: #EAE9E2; --tx2: #9A9990; --tx3: #5A5955;
  --code-bg: #0A0A0C;
}
[data-theme="light"] {
  --bg: #F2EFE8; --bg2: #FDFCF9; --bg3: #EEEAE2; --bg4: #E4E0D7;
  --line: rgba(0,0,0,.07); --line2: rgba(0,0,0,.13);
  --tx1: #18170F; --tx2: #56544A; --tx3: #9A9890;
  --code-bg: #111113;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx1);min-height:100vh;display:flex;transition:background .2s,color .2s}

/* SIDEBAR */
nav{width:252px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--line);position:fixed;top:0;left:0;bottom:0;overflow-y:auto;display:flex;flex-direction:column;z-index:40;transition:background .2s}
.nav-top{padding:22px 18px 14px;border-bottom:1px solid var(--line)}
.nav-chip{display:inline-block;background:rgba(206,66,43,.15);color:var(--rust);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:4px;margin-bottom:10px}
.nav-h{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.02em;color:var(--tx1);line-height:1.2}
.nav-sub{font-size:11px;color:var(--tx3);margin-top:3px;font-family:'JetBrains Mono',monospace}
.nav-group{padding:10px 0 4px}
.nav-group-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);padding:6px 18px 4px;display:flex;align-items:center;gap:6px}
.nav-group-label .glabel-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nav-btn{display:flex;align-items:center;gap:8px;width:100%;padding:8px 18px;background:none;border:none;border-left:2px solid transparent;color:var(--tx2);font-size:12.5px;font-family:'DM Sans',sans-serif;cursor:pointer;text-align:left;transition:all .12s}
.nav-btn:hover{color:var(--tx1);background:rgba(255,255,255,.03)}
.nav-btn.active{color:var(--tx1);border-left-color:var(--rust);background:rgba(206,66,43,.06)}
.nav-btn .nn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx3);min-width:20px}
.nav-btn.active .nn{color:var(--rust)}
.nav-btn .nc{font-size:12px;color:var(--green);opacity:0;margin-left:auto}
.nav-btn.done .nc{opacity:1}
.nav-foot{margin-top:auto;padding:12px 18px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
.theme-pill{display:flex;background:var(--bg3);border:1px solid var(--line2);border-radius:99px;padding:3px;gap:2px}
.tbtn{width:26px;height:26px;border-radius:50%;border:none;background:none;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;color:var(--tx3);transition:all .15s}
.tbtn.active{background:var(--bg2);color:var(--tx1);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.nav-prog-text{font-size:11px;color:var(--tx3);font-family:'JetBrains Mono',monospace}

/* PROGRESS BAR */
.prog-strip{height:2px;background:var(--bg4);position:fixed;top:0;left:252px;right:0;z-index:99}
.prog-fill{height:100%;background:var(--rust);transition:width .4s ease}

/* MAIN */
main{margin-left:252px;flex:1;padding:44px 50px 100px;max-width:880px}
.topbar{display:flex;align-items:flex-end;gap:14px;margin-bottom:36px;padding-bottom:22px;border-bottom:1px solid var(--line)}
.tb-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--rust);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.tb-eyebrow::before{content:'';display:block;width:18px;height:1px;background:var(--rust)}
.tb-h{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-.03em;color:var(--tx1)}
.tb-actions{margin-left:auto;display:flex;gap:8px;align-items:center;padding-bottom:2px}
.action-btn{font-size:11.5px;font-family:'JetBrains Mono',monospace;padding:6px 12px;border-radius:6px;border:1px solid var(--line2);background:var(--bg3);color:var(--tx2);cursor:pointer;transition:all .15s;white-space:nowrap}
.action-btn:hover{border-color:var(--rust);color:var(--rust)}

/* SECTION */
.ex-section{margin-bottom:56px;scroll-margin-top:20px}
.ex-head{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px}
.ex-badge{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:600;padding:4px 9px;border-radius:5px;white-space:nowrap;margin-top:2px}
.ex-badge.lv0{background:rgba(61,153,112,.12);color:var(--lv0);border:1px solid rgba(61,153,112,.2)}
.ex-badge.lv1{background:rgba(74,144,217,.12);color:var(--lv1);border:1px solid rgba(74,144,217,.2)}
.ex-head-info h2{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;letter-spacing:-.02em;color:var(--tx1);margin-bottom:5px}
.tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:4px;background:var(--bg4);color:var(--tx3);border:1px solid var(--line)}

/* TABS */
.tab-wrap{border:1px solid var(--line);border-radius:10px;overflow:hidden;margin-bottom:18px}
.tab-bar{display:flex;gap:2px;background:var(--bg3);padding:3px;border-bottom:1px solid var(--line)}
.tab-btn{padding:7px 14px;border-radius:6px;font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--tx3);background:none;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.tab-btn.active{background:var(--bg2);color:var(--tx1);box-shadow:0 1px 3px rgba(0,0,0,.15)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* CONCEPT */
.concept-body{padding:18px 22px;background:var(--bg2)}
.concept-body h3{font-size:13px;font-weight:500;color:var(--tx1);margin-bottom:10px;padding-left:10px;border-left:3px solid var(--rust)}
.concept-body p{font-size:13.5px;color:var(--tx2);line-height:1.7;margin-bottom:8px}
.concept-body ul{padding-left:18px;margin:8px 0;display:flex;flex-direction:column;gap:4px}
.concept-body li{font-size:13.5px;color:var(--tx2);line-height:1.6}
.concept-body code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg4);color:var(--tx1);padding:1px 5px;border-radius:3px}
.callout{border-radius:6px;padding:10px 14px;margin-top:10px;font-size:13px;line-height:1.6;display:flex;gap:8px}
.callout.warn{background:rgba(229,168,32,.08);border:1px solid rgba(229,168,32,.2);color:#B8900A}
.callout.tip{background:rgba(61,153,112,.08);border:1px solid rgba(61,153,112,.2);color:#2E7A58}
.callout.info{background:rgba(74,144,217,.08);border:1px solid rgba(74,144,217,.2);color:#2A6AAD}

/* CODE */
.code-wrap{position:relative;background:var(--code-bg)}
.code-header{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.02)}
.code-fname{font-family:'JetBrains Mono',monospace;font-size:11px;color:#546E7A;display:flex;align-items:center;gap:5px}
.code-dots{display:flex;gap:5px}
.code-dot{width:10px;height:10px;border-radius:50%}
.copy-btn{margin-left:auto;font-size:11px;font-family:'JetBrains Mono',monospace;padding:4px 10px;border-radius:5px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:#546E7A;cursor:pointer;transition:all .15s}
.copy-btn:hover{border-color:rgba(255,255,255,.18);color:#CDD3DE}
.copy-btn.copied{color:#3D9970;border-color:rgba(61,153,112,.3)}
pre{font-family:'JetBrains Mono',monospace;font-size:12.5px;line-height:1.75;padding:18px 22px;overflow-x:auto;color:#CDD3DE;background:var(--code-bg);margin:0}
.kw{color:#C792EA}.fn{color:#82AAFF}.st{color:#C3E88D}.nm{color:#F78C6C}
.cm{color:#546E7A;font-style:italic}.ty{color:#FFCB6B}.mc{color:#89DDFF}
.lf{color:#FF5370}.op{color:#89DDFF}.sym{color:#4EC9B0}

/* OUTPUT */
.output-body{padding:16px 20px;background:var(--bg2);font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--tx2);line-height:1.8}
.out-prompt{color:var(--rust)}.out-ok{color:#3D9970}.out-val{color:#F78C6C}.out-dim{color:var(--tx3)}

/* DONE */
.done-row{display:flex;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--line);background:var(--bg2)}
.done-btn{display:flex;align-items:center;gap:6px;font-size:12.5px;font-family:'DM Sans',sans-serif;padding:6px 14px;border-radius:7px;border:1px solid var(--line2);background:none;color:var(--tx3);cursor:pointer;transition:all .15s}
.done-btn:hover{border-color:var(--green);color:var(--green)}
.done-btn.done{border-color:var(--green);color:var(--green);background:rgba(61,153,112,.08)}

/* DIVIDER */
.section-divider{height:1px;background:var(--line);margin-bottom:56px}
.level-separator{display:flex;align-items:center;gap:16px;margin:48px 0 40px}
.level-separator-line{flex:1;height:1px;background:var(--line)}
.level-separator-badge{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;padding:6px 16px;border-radius:6px;white-space:nowrap}
.level-separator-badge.lv1{background:rgba(74,144,217,.12);color:var(--lv1);border:1px solid rgba(74,144,217,.2)}

@media(max-width:800px){
  nav{display:none}
  main{margin-left:0;padding:20px 18px 80px}
  .prog-strip{left:0}
}
</style>
</head>
<body>
<div class="prog-strip"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

<nav>
  <div class="nav-top">
    <div class="nav-chip">Rust x Crypto</div>
    <div class="nav-h">Solutions<br>01 – 20</div>
    <div class="nav-sub">// avec Cargo.toml inclus</div>
  </div>
  <div id="nav-items"></div>
  <div class="nav-foot">
    <span class="nav-prog-text" id="nav-prog">0 / 20</span>
    <div class="theme-pill">
      <button class="tbtn" id="tbtn-dark" onclick="setTheme('dark')" title="Sombre">🌙</button>
      <button class="tbtn active" id="tbtn-light" onclick="setTheme('light')" title="Clair">☀️</button>
    </div>
  </div>
</nav>

<main>
  <div class="topbar">
    <div>
      <div class="tb-eyebrow">Exercices 01 – 20</div>
      <div class="tb-h">Solutions commentées</div>
    </div>
    <div class="tb-actions">
      <button class="action-btn" id="btn-expand" onclick="doExpandAll()">Tout ouvrir code</button>
      <button class="action-btn" id="btn-markall" onclick="doMarkAll()">Tout marquer fait</button>
    </div>
  </div>
  <div id="ex-container"></div>
</main>

<script>
var DONE_KEY = 'rust_solutions_done_v2';
var doneMap = {};
try { doneMap = JSON.parse(localStorage.getItem(DONE_KEY) || '{}'); } catch(e) {}

var EXERCISES = [
  {
    id: '01', level: 0, title: 'Hello, bits!',
    tags: ['u8','u32','u64','binaire','wrapping_add'],
    cargo: '',
    concept: [
      { type: 'h3', text: 'Types entiers et représentation numérique' },
      { type: 'p', text: 'En Rust, chaque type entier a une taille fixe. Un overflow en mode debug <strong>panique</strong> ; en release il wrappe silencieusement. Pour du code prévisible on utilise les méthodes explicites.' },
      { type: 'ul', items: [
        '<code>u8</code> → 0..255 · <code>u32</code> → 0..4 294 967 295 · <code>u64</code> → 0..18 446 744 073 709 551 615',
        '<code>{:b}</code> binaire · <code>{:o}</code> octal · <code>{:x}</code> hex · <code>{:08x}</code> hex paddé à 8 chars',
        '<code>wrapping_add/mul</code> → arithmétique modulaire, jamais de panic',
        '<code>checked_add</code> → <code>Option&lt;T&gt;</code>, None si overflow',
        '<code>saturating_add</code> → bloque à la valeur max',
      ]},
      { type: 'warn', text: 'En cryptographie, les overflows silencieux sont dangereux. Utiliser <code>wrapping_*</code> seulement quand le wrapping est intentionnel (compteurs de nonces, SHA-256).' },
      { type: 'tip', text: 'Les compteurs ChaCha20 et les accumulateurs SHA-256 utilisent exactement <code>wrapping_add</code> car le dépassement y est défini par la spec.' }
    ],
    code:
'<span class="cm">// 01 — Hello, bits! — pas de dépendances externes</span>\n' +
'\n' +
'<span class="kw">fn</span> <span class="fn">afficher</span>(label: <span class="op">&amp;</span><span class="ty">str</span>, v: <span class="ty">u64</span>) {\n' +
'    <span class="mc">println!</span>(<span class="st">"--- {} ---"</span>, label);\n' +
'    <span class="mc">println!</span>(<span class="st">"  dec : {}"</span>, v);\n' +
'    <span class="mc">println!</span>(<span class="st">"  bin : {:b}"</span>, v);\n' +
'    <span class="mc">println!</span>(<span class="st">"  oct : {:o}"</span>, v);\n' +
'    <span class="mc">println!</span>(<span class="st">"  hex : {:016x}"</span>, v);\n' +
'}\n' +
'\n' +
'<span class="kw">fn</span> <span class="fn">demo_overflow</span>() {\n' +
'    <span class="kw">let</span> x: <span class="ty">u8</span> = <span class="nm">255</span>;\n' +
'    <span class="mc">println!</span>(<span class="st">"\n=== Overflow u8 ==="</span>);\n' +
'    <span class="mc">println!</span>(<span class="st">"wrapping_add(1) = {}"</span>, x.<span class="fn">wrapping_add</span>(<span class="nm">1</span>));     <span class="cm">// 0</span>\n' +
'    <span class="mc">println!</span>(<span class="st">"wrapping_mul(2) = {}"</span>, x.<span class="fn">wrapping_mul</span>(<span class="nm">2</span>));     <span class="cm">// 254</span>\n' +
'    <span class="mc">println!</span>(<span class="st">"saturating_add(1) = {}"</span>, x.<span class="fn">saturating_add</span>(<span class="nm">1</span>)); <span class="cm">// 255</span>\n' +
'    <span class="kw">match</span> x.<span class="fn">checked_add</span>(<span class="nm">1</span>) {\n' +
'        <span class="ty">Some</span>(v) =&gt; <span class="mc">println!</span>(<span class="st">"checked = {}"</span>, v),\n' +
'        <span class="ty">None</span>    =&gt; <span class="mc">println!</span>(<span class="st">"checked_add : overflow détecté (None)"</span>),\n' +
'    }\n' +
'    <span class="cm">// Compteur de nonce ChaCha20 — wrapping intentionnel</span>\n' +
'    <span class="kw">let</span> <span class="kw">mut</span> nonce = <span class="ty">u32</span>::MAX;\n' +
'    nonce = nonce.<span class="fn">wrapping_add</span>(<span class="nm">1</span>);\n' +
'    <span class="mc">println!</span>(<span class="st">"nonce u32::MAX + 1 = {}"</span>, nonce); <span class="cm">// 0</span>\n' +
'}\n' +
'\n' +
'<span class="kw">fn</span> <span class="fn">main</span>() {\n' +
'    afficher(<span class="st">"42"</span>, <span class="nm">42</span>);\n' +
'    afficher(<span class="st">"0xDEADBEEF"</span>, <span class="nm">0xDEAD_BEEF</span>);\n' +
'    afficher(<span class="st">"u64::MAX"</span>, <span class="ty">u64</span>::MAX);\n' +
'    demo_overflow();\n' +
'    <span class="mc">println!</span>(<span class="st">"\ntaille u8={} u32={} u64={} bits"</span>,\n' +
'             <span class="ty">u8</span>::BITS, <span class="ty">u32</span>::BITS, <span class="ty">u64</span>::BITS);\n' +
'}',
    output:
'<span class="out-prompt">$</span> cargo run\n' +
'--- 42 ---\n' +
'  dec : <span class="out-val">42</span>\n' +
'  bin : <span class="out-val">101010</span>\n' +
'  oct : <span class="out-val">52</span>\n' +
'  hex : <span class="out-val">000000000000002a</span>\n' +
'--- 0xDEADBEEF ---\n' +
'  hex : <span class="out-val">00000000deadbeef</span>\n' +
'\n' +
'=== Overflow u8 ===\n' +
'wrapping_add(1) = <span class="out-val">0</span>\n' +
'wrapping_mul(2) = <span class="out-val">254</span>\n' +
'saturating_add(1) = <span class="out-val">255</span>\n' +
'<span class="out-ok">checked_add : overflow détecté (None)</span>\n' +
'nonce u32::MAX + 1 = <span class="out-val">0</span>\n' +
'taille u8=<span class="out-val">8</span> u32=<span class="out-val">32</span> u64=<span class="out-val">64</span> bits'
  },
  {
    id: '02', level: 0, title: 'XOR, AND, OR — opérateurs binaires',
    tags: ['XOR','bitops','OTP','Result'],
    cargo: '',
    concept: [
      { type: 'h3', text: 'XOR : la primitive fondamentale' },
      { type: 'p', text: 'Le XOR (⊕) est l\'opération centrale de la cryptographie symétrique. Propriétés clés :' },
      { type: 'ul', items: [
        '<strong>Auto-inverse</strong> : <code>a ⊕ b ⊕ b = a</code> → XOR à nouveau déchiffre',
        '<strong>Commutatif</strong> : <code>a ⊕ b = b ⊕ a</code>',
        '<strong>Identité</strong> : <code>a ⊕ 0 = a</code> · <code>a ⊕ a = 0</code>',
        'ChaCha20, Salsa20 : génèrent un keystream puis XOR avec le plaintext',
      ]},
      { type: 'warn', text: 'Réutiliser la même clé OTP révèle XOR(m1, m2). Des millions de $ ont été perdus pour cette raison (nonce réutilisé en pratique).' },
      { type: 'tip', text: '<code>a.iter().zip(b.iter()).map(|(x,y)| x^y).collect()</code> — idiome Rust pour XOR de deux vecteurs.' }
    ],
    code:
'<span class="cm">// 02 — XOR, AND, OR</span>\n' +
'\n' +
'<span class="kw">fn</span> <span class="fn">xor_bytes</span>(a: <span class="op">&amp;</span>[<span class="ty">u8</span>], b: <span class="op">&amp;</span>[<span class="ty">u8</span>]) -&gt; <span class="ty">Result</span>&lt;<span class="ty">Vec</span>&lt;<span class="ty">u8</span>&gt;, <span class="ty">String</span>&gt; {\n' +
'    <span class="kw">if</span> a.<span class="fn">len</span>() != b.<span class="fn">len</span>() {\n' +
'        <span class="kw">return</span> <span class="ty">Err</span>(<span class="mc">format!</span>(<span class="st">"longueurs {} vs {}"</span>, a.<span class="fn">len</span>(), b.<span class="fn">len</span>()));\n' +
'    }\n' +
'    <span class="ty">Ok</span>(a.<span class="fn">iter</span>().<span class="fn">zip</span>(b).<span class="fn">map</span>(|(x, y)| x ^ y).<span class="fn">collect</span>())\n' +
'}\n' +
'\n' +
'<span class="kw">fn</span> <span class="fn">bytes_to_hex</span>(b: <span class="op">&amp;</span>[<span class="ty">u8</span>]) -&gt; <span class="ty">String</span> {\n' +
'    b.<span class="fn">iter</span>().<span class="fn">map</span>(|x| <span class="mc">format!</span>(<span class="st">"{:02x}"</span>, x)).<span class="fn">collect</span>()\n' +
'}\n' +
'\n' +
'<span class="kw">fn</span> <span class="fn">main</span>() {\n' +
'    <span class="cm">// OTP : chiffrement parfait</span>\n' +
'    <span class="kw">let</span> msg: <span class="op">&amp;</span>[<span class="ty">u8</span>] = <span class="st">b"Hello"</span>;\n' +
'    <span class="kw">let</span> key: <span class="op">&amp;</span>[<span class="ty">u8</span>] = <span class="op">&amp;</span>[<span class="nm">0x4A</span>, <span class="nm">0xF3</span>, <span class="nm">0x21</span>, <span class="nm">0x9C</span>, <span class="nm">0x07</span>];\n' +
'    <span class="kw">let</span> cipher = <span class="fn">xor_bytes</span>(msg, key).<span class="fn">unwrap</span>();\n' +
'    <span class="kw">let</span> plain  = <span class="fn">xor_bytes</span>(<span class="op">&amp;</span>cipher, key).<span class="fn">unwrap</span>();\n' +
'    <span class="mc">println!</span>(<span class="st">"chiffré  : {}"</span>, <span class="fn">bytes_to_hex</span>(<span class="op">&amp;</span>cipher));\n' +
'    <span class="mc">println!</span>(<span class="st">"déchiffré: {:?}"</span>, <span class="ty">String</span>::<span class="fn">from_utf8_lossy</span>(<span class="op">&amp;</span>plain));\n' +
'    <span class="mc">assert_eq!</span>(plain, msg);\n' +
'    <span class="mc">println!</span>(<span class="st">"OK XOR est son propre inverse\n"</span>);\n' +
'\n' +
'    <span class="cm">// Attaque two-time pad</span>\n' +

      { type: 'tip', text: 'En production Bitcoin les transactions sont sérialisées en binaire. JSON est utilisé pour les RPC et APIs web (Bitcoin Core, Electrum).' }

'<span class="cm">// 10 — Parsing de transaction JSON</span>\n' +
'<span class="cm">// Cargo.toml : serde = { version = "1", features = ["derive"] }, serde_json = "1"</span>\n' +
'<span class="kw">use</span> serde::{Deserialize, Serialize};\n' +
'\n' +
'<span class="kw">#[derive(Debug, Serialize, Deserialize)]</span>\n' +
'<span class="kw">struct</span> <span class="ty">Tx</span> {\n' +

'    to:     <span class="ty">String</span>,\n' +

'}\n' +
'\n' +
'<span class="kw">#[derive(Debug)]</span>\n' +
'<span class="kw">enum</span> <span class="ty">TxErr</span> {\n' +
'    <span class="ty">Json</span>(<span class="ty">String</span>), <span class="ty">AmountZero</span>, <span class="ty">NegFee</span>, <span class="ty">SameAddr</span>, <span class="ty">EmptyAddr</span>,\n' +
'}\n' +
'\n' +
'<span class="kw">impl</span> std::fmt::<span class="ty">Display</span> <span class="kw">for</span> <span class="ty">TxErr</span> {\n' +

'            <span class="ty">TxErr</span>::<span class="ty">SameAddr</span>  =&gt; write!(f, <span class="st">"from == to"</span>),\n' +
'            <span class="ty">TxErr</span>::<span class="ty">EmptyAddr</span> =&gt; write!(f, <span class="st">"adresse vide"</span>),\n' +
'        }\n' +
'    }\n' +
'}\n' +
'\n' +
'<span class="kw">fn</span> <span class="fn">parse_tx</span>(json: <span class="op">&amp;</span><span class="ty">str</span>) -&gt; <span class="ty">Result</span>&lt;<span class="ty">Tx</span>, <span class="ty">TxErr</span>&gt; {\n' +
'    <span class="kw">let</span> tx: <span class="ty">Tx</span> = serde_json::<span class="fn">from_str</span>(json)\n' +
'        .<span class="fn">map_err</span>(|e| <span class="ty">TxErr</span>::<span class="ty">Json</span>(e.<span class="fn">to_string</span>()))?;\n' +

'    <span class="kw">if</span> tx.fee &lt; <span class="nm">0.0</span>      { <span class="kw">return</span> <span class="ty">Err</span>(<span class="ty">TxErr</span>::<span class="ty">NegFee</span>); }\n' +

  {
    id: '11', level: 1, title: 'SHA-256 — padding',

    cargo: '',
    concept: [
      { type: 'h3', text: 'Padding SHA-256 (FIPS 180-4)' },
      { type: 'p', text: 'Avant de traiter le message, SHA-256 le padde pour qu\'il soit un multiple de 512 bits (64 bytes). Trois étapes :' },
      { type: 'ul', items: [
        '1. Ajouter le bit <code>1</code> (byte <code>0x80</code>)',
        '2. Ajouter des bytes <code>0x00</code> jusqu\'à avoir 56 bytes dans le dernier bloc',
        '3. Ajouter la longueur originale <strong>en bits</strong> sur 8 bytes big-endian',
      ]},
      { type: 'info', text: 'Le message paddé fait toujours <code>ceil((len+9)/64) * 64</code> bytes. Un message de 55 bytes padding → 64 bytes. Un message de 56 bytes → 128 bytes.' }
    ],
    code:
'<span class="cm">// 11 — SHA-256 : padding (FIPS 180-4 §5.1.1)</span>\n' +
'\n' +
'<span class="kw">fn</span> <span class="fn">sha256_pad</span>(msg: <span class="op">&amp;</span>[<span class="ty">u8</span>]) -&gt; <span class="ty">Vec</span>&lt;<span class="ty">u8</span>&gt; {\n' +
'    <span class="kw">let</span> bit_len = (msg.<span class="fn">len</span>() <span class="kw">as</span> <span class="ty">u64</span>).<span class="fn">wrapping_mul</span>(<span class="nm">8</span>);\n' +
'    <span class="kw">let mut</span> out = msg.<span class="fn">to_vec</span>();\n' +
'\n' +
'    <span class="cm">// Étape 1 : bit 1 (byte 0x80)</span>\n' +
'    out.<span class="fn">push</span>(<span class="nm">0x80</span>);\n' +
'\n' +
'    <span class="cm">// Étape 2 : zéros jusqu\'à longueur ≡ 56 (mod 64)</span>\n' +
'    <span class="kw">while</span> out.<span class="fn">len</span>() % <span class="nm">64</span> != <span class="nm">56</span> {\n' +
'        out.<span class="fn">push</span>(<span class="nm">0x00</span>);\n' +
'    }\n' +
'\n' +
'    <span class="cm">// Étape 3 : longueur originale en bits sur 8 bytes big-endian</span>\n' +
'    out.<span class="fn">extend_from_slice</span>(<span class="op">&amp;</span>bit_len.<span class="fn">to_be_bytes</span>());\n' +
'\n' +
'    <span class="mc">assert_eq!</span>(out.<span class="fn">len</span>() % <span class="nm">64</span>, <span class="nm">0</span>, <span class="st">"longueur doit être multiple de 64"</span>);\n' +
'    out\n' +
'}\n' +
'\n' +
'<span class="kw">fn</span> <span class="fn">main</span>() {\n' +
'    <span class="kw">let</span> cases: <span class="op">&amp;</span>[<span class="op">&amp;</span>[<span class="ty">u8</span>]] = <span class="op">&amp;</span>[<span class="st">b""</span>, <span class="st">b"abc"</span>, <span class="st">b"hello world"</span>];\n' +
'\n' +
'    <span class="kw">for</span> msg <span class="kw">in</span> cases {\n' +
'        <span class="kw">let</span> padded = <span class="fn">sha256_pad</span>(msg);\n' +
'        <span class="mc">println!</span>(<span class="st">"msg {:?} ({} bytes) -> padded {} bytes ({} blocs 512-bit)"</span>,\n' +
'            <span class="ty">String</span>::<span class="fn">from_utf8_lossy</span>(msg), msg.<span class="fn">len</span>(),\n' +
'            padded.<span class="fn">len</span>(), padded.<span class="fn">len</span>() / <span class="nm">64</span>);\n' +
'\n' +
'        <span class="cm">// Vérifier que le bit 1 est bien placé</span>\n' +
'        <span class="mc">assert_eq!</span>(padded[msg.<span class="fn">len</span>()], <span class="nm">0x80</span>);\n' +
'\n' +
'        <span class="cm">// Vérifier les 8 derniers bytes = bit_len big-endian</span>\n' +
'        <span class="kw">let</span> bit_len = (msg.<span class="fn">len</span>() <span class="kw">as</span> <span class="ty">u64</span>) * <span class="nm">8</span>;\n' +
'        <span class="kw">let</span> tail = <span class="ty">u64</span>::<span class="fn">from_be_bytes</span>(padded[padded.<span class="fn">len</span>()-<span class="nm">8</span>..].<span class="fn">try_into</span>().<span class="fn">unwrap</span>());\n' +
'        <span class="mc">assert_eq!</span>(tail, bit_len);\n' +
'        <span class="mc">println!</span>(<span class="st">"  OK bit_len={} bits en queue"</span>, bit_len);\n' +
'    }\n' +
'\n' +
'    <span class="cm">// Cas limite : 55 bytes -> 1 bloc, 56 bytes -> 2 blocs</span>\n' +
'    <span class="mc">println!</span>(<span class="st">"\n55 bytes  -> {} blocs"</span>, <span class="fn">sha256_pad</span>(<span class="op">&amp;</span>[<span class="nm">0u8</span>;<span class="nm">55</span>]).<span class="fn">len</span>() / <span class="nm">64</span>);\n' +
'    <span class="mc">println!</span>(<span class="st">"56 bytes  -> {} blocs"</span>, <span class="fn">sha256_pad</span>(<span class="op">&amp;</span>[<span class="nm">0u8</span>;<span class="nm">56</span>]).<span class="fn">len</span>() / <span class="nm">64</span>);\n' +
'}',
    output:

'  <span class="out-ok">OK bit_len=88 bits en queue</span>\n' +
'\n' +
'55 bytes  -> <span class="out-val">1</span> blocs\n' +
'56 bytes  -> <span class="out-val">2</span> blocs'

    concept: [
      { type: 'h3', text: 'Preuve d\'inclusion Merkle (SPV)' },

'<span class="cm">// Cargo.toml : sha2 = "0.10"</span>\n' +
'<span class="kw">use</span> sha2::{Sha256, Digest};\n' +
'\n' +
'<span class="kw">type</span> <span class="ty">Hash</span> = [<span class="ty">u8</span>;<span class="nm">32</span>];\n' +
'\n' +
'<span class="kw">fn</span> <span class="fn">hash_pair</span>(l: <span class="ty">Hash</span>, r: <span class="ty">Hash</span>) -&gt; <span class="ty">Hash</span> {\n' +
'    <span class="kw">let mut</span> d = [<span class="nm">0u8</span>;<span class="nm">64</span>];\n' +
'    d[..<span class="nm">32</span>].<span class="fn">copy_from_slice</span>(<span class="op">&amp;</span>l); d[<span class="nm">32</span>..].<span class="fn">copy_from_slice</span>(<span class="op">&amp;</span>r);\n' +
'    Sha256::<span class="fn">digest</span>(Sha256::<span class="fn">digest</span>(d)).<span class="fn">into</span>()\n' +
'}\n' +
'\n' +
'<span class="kw">fn</span> <span class="fn">build_tree</span>(leaves: <span class="op">&amp;</span>[<span class="ty">Hash</span>]) -&gt; <span class="ty">Vec</span>&lt;<span class="ty">Vec</span>&lt;<span class="ty">Hash</span>&gt;&gt; {\n' +
'    <span class="kw">let mut</span> lvl = leaves.<span class="fn">to_vec</span>();\n' +
'    <span class="kw">let mut</span> tree = <span class="kw">vec!</span>[lvl.<span class="fn">clone</span>()];\n' +
'    <span class="kw">while</span> lvl.<span class="fn">len</span>() &gt; <span class="nm">1</span> {\n' +
'        <span class="kw">if</span> lvl.<span class="fn">len</span>() % <span class="nm">2</span> == <span class="nm">1</span> { lvl.<span class="fn">push</span>(*lvl.<span class="fn">last</span>().<span class="fn">unwrap</span>()); }\n' +
'        lvl = lvl.<span class="fn">chunks</span>(<span class="nm">2</span>).<span class="fn">map</span>(|p| <span class="fn">hash_pair</span>(p[<span class="nm">0</span>], p[<span class="nm">1</span>])).<span class="fn">collect</span>();\n' +
'        tree.<span class="fn">push</span>(lvl.<span class="fn">clone</span>());\n' +
'    }\n' +
'    tree\n' +
'}\n' +
'\n' +
'<span class="cm">/// Génère la preuve d\'inclusion pour tx à l\'index `idx`</span>\n' +
'<span class="cm">/// Retourne Vec&lt;(hash_frère, is_right)&gt;</span>\n' +
'<span class="kw">fn</span> <span class="fn">gen_proof</span>(tree: <span class="op">&amp;</span>[<span class="ty">Vec</span>&lt;<span class="ty">Hash</span>&gt;], <span class="kw">mut</span> idx: <span class="ty">usize</span>) -&gt; <span class="ty">Vec</span>&lt;(<span class="ty">Hash</span>, <span class="ty">bool</span>)&gt; {\n' +
'    <span class="kw">let mut</span> proof = <span class="ty">Vec</span>::<span class="fn">new</span>();\n' +
'    <span class="kw">for</span> level <span class="kw">in</span> <span class="op">&amp;</span>tree[..<span class="fn">tree.len()</span>-<span class="nm">1</span>] {\n' +
'        <span class="kw">let</span> sibling_idx = <span class="kw">if</span> idx % <span class="nm">2</span> == <span class="nm">0</span> { idx + <span class="nm">1</span> } <span class="kw">else</span> { idx - <span class="nm">1</span> };\n' +
'        <span class="kw">let</span> sibling = level[sibling_idx.<span class="fn">min</span>(level.<span class="fn">len</span>() - <span class="nm">1</span>)];\n' +
'        proof.<span class="fn">push</span>((sibling, idx % <span class="nm">2</span> == <span class="nm">0</span>)); <span class="cm">// is_right_sibling</span>\n' +

'    }\n' +

'}\n' +
'\n' +
'<span class="cm">/// Vérifie la preuve contre la racine connue</span>\n' +

'    <span class="kw">let mut</span> current = tx_hash;\n' +
'    <span class="kw">for</span> <span class="op">&amp;</span>(sibling, is_right) <span class="kw">in</span> proof {\n' +
'        current = <span class="kw">if</span> is_right {\n' +
'            <span class="fn">hash_pair</span>(current, sibling)\n' +
'        } <span class="kw">else</span> {\n' +
'            <span class="fn">hash_pair</span>(sibling, current)\n' +
'        };\n' +
'    }\n' +

'\n' +
'<span class="kw">fn</span> <span class="fn">main</span>() {\n' +
'    <span class="kw">let</span> txs: <span class="ty">Vec</span>&lt;<span class="ty">Hash</span>&gt; = (<span class="nm">0u8</span>..<span class="nm">8</span>).<span class="fn">map</span>(|i| { <span class="kw">let mut</span> h = [<span class="nm">0u8</span>;<span class="nm">32</span>]; h[<span class="nm">0</span>]=i; h }).<span class="fn">collect</span>();\n' +
'    <span class="kw">let</span> tree = <span class="fn">build_tree</span>(<span class="op">&amp;</span>txs);\n' +
'    <span class="kw">let</span> root = tree[tree.<span class="fn">len</span>()-<span class="nm">1</span>][<span class="nm">0</span>];\n' +

'        <span class="kw">let</span> proof = <span class="fn">gen_proof</span>(<span class="op">&amp;</span>tree, idx);\n' +
'        <span class="kw">let</span> ok = <span class="fn">verify_proof</span>(root, txs[idx], <span class="op">&amp;</span>proof);\n' +
'        <span class="mc">println!</span>(<span class="st">"tx[{}] preuve {} hashes : {}"</span>, idx, proof.<span class="fn">len</span>(), <span class="kw">if</span> ok {<span class="st">"OK"</span>} <span class="kw">else</span> {<span class="st">"FAIL"</span>});\n' +
'    }\n' +
'\n' +
'    <span class="cm">// Fausse preuve : tx inconnue</span>\n' +
'    <span class="kw">let</span> fake = [<span class="nm">0xFFu8</span>;<span class="nm">32</span>];\n' +
'    <span class="kw">let</span> proof = <span class="fn">gen_proof</span>(<span class="op">&amp;</span>tree, <span class="nm">0</span>);\n' +

'<span class="cm">/// Implémentation pédagogique de base^exp mod m</span>\n' +

'    all_bits.<span class="fn">chunks</span>(<span class="nm">11</span>)\n' +
'        .<span class="fn">map</span>(|chunk| {\n' +
'            <span class="kw">let</span> idx = chunk.<span class="fn">iter</span>().<span class="fn">fold</span>(<span class="nm">0usize</span>, |a, <span class="op">&amp;</span>b| (a << <span class="nm">1</span>) | b <span class="kw">as</span> <span class="ty">usize</span>);\n' +
'            <span class="ty">WORDS</span>[idx % <span class="ty">WORDS</span>.<span class="fn">len</span>()].<span class="fn">to_string</span>() <span class="cm">// % pour l\'extrait</span>\n' +
'        })\n' +
'        .<span class="fn">collect</span>()\n' +
'}\n' +
'\n' +
'<span class="kw">fn</span> <span class="fn">verify_checksum</span>(entropy: <span class="op">&amp;</span>[<span class="ty">u8</span>; <span class="nm">16</span>]) -&gt; <span class="ty">bool</span> {\n' +
'    <span class="kw">let</span> hash = Sha256::<span class="fn">digest</span>(entropy);\n' +
'    hash[<span class="nm">0</span>] >> <span class="nm">4</span> != <span class="nm">0</span> <span class="cm">// vérification simplifiée</span>\n' +
'}\n' +
'\n' +
'<span class="kw">fn</span> <span class="fn">main</span>() {\n' +
'    <span class="kw">let</span> entropy: [<span class="ty">u8</span>; <span class="nm">16</span>] = [\n' +
'        <span class="nm">0x00</span>,<span class="nm">0x00</span>,<span class="nm">0x00</span>,<span class="nm">0x00</span>,<span class="nm">0x00</span>,<span class="nm">0x00</span>,<span class="nm">0x00</span>,<span class="nm">0x00</span>,\n' +
'        <span class="nm">0x00</span>,<span class="nm">0x00</span>,<span class="nm">0x00</span>,<span class="nm">0x00</span>,<span class="nm">0x00</span>,<span class="nm">0x00</span>,<span class="nm">0x00</span>,<span class="nm">0x00</span>,\n' +
'    ];\n' +
'\n' +
'    <span class="kw">let</span> words = <span class="fn">entropy_to_mnemonic</span>(<span class="op">&amp;</span>entropy);\n' +
'    <span class="mc">println!</span>(<span class="st">"Entropie 0x00..00 -> phrase BIP39:"</span>);\n' +
'    <span class="mc">println!</span>(<span class="st">"{}"</span>, words.<span class="fn">join</span>(<span class="st">" "</span>));\n' +
'    <span class="mc">println!</span>(<span class="st">"({} mots)"</span>, words.<span class="fn">len</span>());\n' +
'\n' +
'    <span class="mc">println!</span>(<span class="st">"\nNotes architecturales:"</span>);\n' +
'    <span class="mc">println!</span>(<span class="st">"  128 bits entropie + 4 bits checksum = 132 bits"</span>);\n' +
'    <span class="mc">println!</span>(<span class="st">"  132 / 11 = {} mots"</span>, <span class="nm">132</span> / <span class="nm">11</span>);\n' +
'    <span class="mc">println!</span>(<span class="st">"  2^11 = {} -> taille wordlist"</span>, <span class="nm">2048</span>);\n' +
'    <span class="mc">println!</span>(<span class="st">"  256 bits entropie + 8 bits checksum = {} mots"</span>, <span class="nm">264</span>/<span class="nm">11</span>);\n' +
'\n' +
'    <span class="cm">// Test vecteur officiel BIP39 : entropie 0x00..00 -> "abandon" x11 + "about"</span>\n' +
'    <span class="mc">println!</span>(<span class="st">"\nVecteur officiel BIP39 :"</span>);\n' +
'    <span class="mc">println!</span>(<span class="st">"abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about"</span>);\n' +
'}',
    output:
'<span class="out-prompt">$</span> cargo run\n' +
'Entropie 0x00..00 -> phrase BIP39:\n' +
'<span class="out-val">abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about</span>\n' +
'(12 mots)\n' +
'\n' +
'Notes architecturales:\n' +
'  128 bits entropie + 4 bits checksum = 132 bits\n' +
'  132 / 11 = <span class="out-val">12</span> mots\n' +
'  2^11 = <span class="out-val">2048</span> -> taille wordlist\n' +
'  256 bits entropie + 8 bits checksum = <span class="out-val">24</span> mots\n' +
'\n' +
'Vecteur officiel BIP39 :\n' +
'<span class="out-ok">abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon abandon about</span>'
  }
];

// ── BUILD NAV ──
var navDiv = document.getElementById('nav-items');
var lv0Group = document.createElement('div'); lv0Group.className = 'nav-group';
var lv1Group = document.createElement('div'); lv1Group.className = 'nav-group';
lv0Group.innerHTML = '<div class="nav-group-label"><span class="glabel-dot" style="background:var(--lv0)"></span>L0 — Débutant (01-10)</div>';
lv1Group.innerHTML = '<div class="nav-group-label"><span class="glabel-dot" style="background:var(--lv1)"></span>L1 — Deb.-Inter. (11-20)</div>';
EXERCISES.forEach(function(ex) {
  var btn = document.createElement('button');
  btn.className = 'nav-btn';
  btn.id = 'nav-' + ex.id;
  btn.innerHTML = '<span class="nn">' + ex.id + '</span><span style="flex:1;font-size:12px">' + ex.title + '</span><span class="nc">✓</span>';
  btn.onclick = function() {
    var el = document.getElementById('ex-' + ex.id);
    if (el) el.scrollIntoView({behavior:'smooth', block:'start'});
  };
  if (ex.level === 0) lv0Group.appendChild(btn);
  else lv1Group.appendChild(btn);
});
navDiv.appendChild(lv0Group);
navDiv.appendChild(lv1Group);

// ── BUILD EXERCISES ──
var container = document.getElementById('ex-container');

EXERCISES.forEach(function(ex, idx) {
  var lvClass = 'lv' + ex.level;
  var uid = 'u' + ex.id;

  // Build concept HTML
  var conceptHtml = '';
  ex.concept.forEach(function(c) {
    if (c.type === 'h3') conceptHtml += '<h3>' + c.text + '</h3>';
    else if (c.type === 'p') conceptHtml += '<p>' + c.text + '</p>';
    else if (c.type === 'ul') {
      conceptHtml += '<ul>';
      c.items.forEach(function(li) { conceptHtml += '<li>' + li + '</li>'; });
      conceptHtml += '</ul>';
    }
    else if (c.type === 'warn') conceptHtml += '<div class="callout warn"><span>⚠</span><span>' + c.text + '</span></div>';
    else if (c.type === 'tip') conceptHtml += '<div class="callout tip"><span>✓</span><span>' + c.text + '</span></div>';
    else if (c.type === 'info') conceptHtml += '<div class="callout info"><span>ℹ</span><span>' + c.text + '</span></div>';
  });

  // Cargo section
  var cargoHtml = '';
  if (ex.cargo) {
    cargoHtml = '<div style="padding:12px 20px;border-bottom:1px solid var(--line);background:var(--bg3)">' +
      '<div style="font-size:11px;color:var(--tx3);font-family:JetBrains Mono,monospace;margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em">Cargo.toml [dependencies]</div>' +
      '<pre style="border-left:3px solid var(--lv' + ex.level + ');font-size:12px;padding:8px 12px">' + ex.cargo + '</pre></div>';
  }

  // Level separator before first L1
  var separatorHtml = '';
  if (ex.id === '11') {
    separatorHtml = '<div class="level-separator">' +
      '<div class="level-separator-line"></div>' +
      '<div class="level-separator-badge lv1">L1 · Débutant–Intermédiaire · Exercices 11–20</div>' +
      '<div class="level-separator-line"></div>' +
      '</div>';
  }

  var dividerHtml = idx < EXERCISES.length - 1 ? '<div class="section-divider"></div>' : '';

  var html = separatorHtml +
    '<section class="ex-section" id="ex-' + ex.id + '">' +
    '<div class="ex-head">' +
    '<div class="ex-badge ' + lvClass + '">Ex. ' + ex.id + '</div>' +
    '<div class="ex-head-info">' +
    '<h2>' + ex.title + '</h2>' +
    '<div class="tags">' + ex.tags.map(function(t){ return '<span class="tag">' + t + '</span>'; }).join('') + '</div>' +
    '</div>' +
    '</div>' +
    '<div class="tab-wrap">' +
    '<div class="tab-bar">' +
    '<button class="tab-btn active" onclick="showTab(\'' + uid + '\',0,this)">📖 Concept</button>' +
    '<button class="tab-btn" onclick="showTab(\'' + uid + '\',1,this)">🦀 Code</button>' +
    (ex.cargo ? '<button class="tab-btn" onclick="showTab(\'' + uid + '\',2,this)">📦 Cargo</button>' : '') +
    '<button class="tab-btn" onclick="showTab(\'' + uid + '\',' + (ex.cargo ? 3 : 2) + ',this)">▶ Sortie</button>' +
    '</div>' +
    '<div class="tab-panel active" id="' + uid + '-0"><div class="concept-body">' + conceptHtml + '</div></div>' +
    '<div class="tab-panel" id="' + uid + '-1">' +
    '<div class="code-wrap">' +
    '<div class="code-header">' +
    '<div style="display:flex;gap:5px"><div class="code-dot" style="background:#FF5F57"></div><div class="code-dot" style="background:#FFBD2E"></div><div class="code-dot" style="background:#28C840"></div></div>' +
    '<span style="font-family:JetBrains Mono,monospace;font-size:11px;color:#546E7A;margin-left:12px">src/main.rs</span>' +
    '<button class="copy-btn" id="cpbtn-' + uid + '" onclick="copyCode(\'' + uid + '\')">Copier</button>' +
    '</div>' +
    '<pre id="pre-' + uid + '">' + ex.code + '</pre>' +
    '</div></div>' +
    (ex.cargo ? '<div class="tab-panel" id="' + uid + '-2"><div class="code-wrap"><div class="code-header"><span style="font-family:JetBrains Mono,monospace;font-size:11px;color:#546E7A">Cargo.toml</span></div><pre>[dependencies]\n' + ex.cargo + '</pre></div></div>' : '') +
    '<div class="tab-panel" id="' + uid + '-' + (ex.cargo ? 3 : 2) + '"><div class="output-body">' + ex.output + '</div></div>' +
    '<div class="done-row"><button class="done-btn" id="done-' + ex.id + '" onclick="toggleDone(\'' + ex.id + '\')"><span id="done-icon-' + ex.id + '">○</span> <span id="done-label-' + ex.id + '">Marquer comme fait</span></button></div>' +
    '</div>' +
    '</section>' +
    dividerHtml;

  container.insertAdjacentHTML('beforeend', html);
});

// ── TABS ──
function showTab(uid, idx, btn) {
  var i = 0;
  while (true) {
    var p = document.getElementById(uid + '-' + i);
    if (!p) break;
    p.classList.toggle('active', i === idx);
    i++;
  }
  var bar = btn.closest('.tab-bar');
  bar.querySelectorAll('.tab-btn').forEach(function(b, j) {
    b.classList.toggle('active', j === idx);
  });
}

// ── COPY ──
function copyCode(uid) {
  var pre = document.getElementById('pre-' + uid);
  var btn = document.getElementById('cpbtn-' + uid);
  if (!pre || !btn) return;
  navigator.clipboard.writeText(pre.innerText).then(function() {
    btn.textContent = 'Copié!';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = 'Copier'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── DONE ──
var DONE_KEY = 'rust_solutions_v3';
var doneMap = {};
try { doneMap = JSON.parse(localStorage.getItem(DONE_KEY) || '{}'); } catch(e) {}

function toggleDone(id) {
  doneMap[id] = !doneMap[id];
  localStorage.setItem(DONE_KEY, JSON.stringify(doneMap));
  renderDone();
}

function renderDone() {
  var count = 0;
  EXERCISES.forEach(function(ex) {
    var done = !!doneMap[ex.id];
    if (done) count++;
    var btn = document.getElementById('done-' + ex.id);
    var icon = document.getElementById('done-icon-' + ex.id);
    var label = document.getElementById('done-label-' + ex.id);
    var nav = document.getElementById('nav-' + ex.id);
    if (btn) btn.className = done ? 'done-btn done' : 'done-btn';
    if (icon) icon.textContent = done ? '✓' : '○';
    if (label) label.textContent = done ? 'Complété' : 'Marquer comme fait';
    if (nav) nav.classList.toggle('done', done);
  });
  document.getElementById('nav-prog').textContent = count + ' / 20';
  document.getElementById('prog-fill').style.width = (count / 20 * 100) + '%';
}

// ── EXPAND ALL ──
function doExpandAll() {
  EXERCISES.forEach(function(ex) {
    var uid = 'u' + ex.id;
    var codeTabBtn = document.querySelector('[onclick="showTab(\'' + uid + '\',1,this)"]');
    if (codeTabBtn) showTab(uid, 1, codeTabBtn);
  });
}

// ── MARK ALL ──
function doMarkAll() {
  EXERCISES.forEach(function(ex) { doneMap[ex.id] = true; });
  localStorage.setItem(DONE_KEY, JSON.stringify(doneMap));
  renderDone();
}

// ── THEME ──
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('rust_sol_theme', t);
  document.getElementById('tbtn-dark').classList.toggle('active', t === 'dark');
  document.getElementById('tbtn-light').classList.toggle('active', t === 'light');
}

// ── INTERSECTION OBSERVER ──
var io = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (entry.isIntersecting) {
      var id = entry.target.id.replace('ex-', '');
      document.querySelectorAll('.nav-btn').forEach(function(b) {
        b.classList.toggle('active', b.id === 'nav-' + id);
      });
    }
  });
}, { rootMargin: '-15% 0px -70% 0px' });
document.querySelectorAll('.ex-section').forEach(function(s) { io.observe(s); });

// ── INIT ──
var savedTheme = localStorage.getItem('rust_sol_theme') || 'dark';
setTheme(savedTheme);
renderDone();
</script>
</body>
