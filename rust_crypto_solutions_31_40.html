{
  id:'38', title:'Interpréteur Script Bitcoin P2PKH',
  tags:['Script','opcodes','stack','P2PKH','OP_CHECKSIG'],
  cargo:'k256 = { version = "0.13", features = ["ecdsa"] }\nsha2 = "0.10"\nripemd = "0.10"',
  concept:[
    {type:'h3',text:'Bitcoin Script — machine à pile'},
    {type:'p',text:'Bitcoin Script est un langage à pile (stack-based). Pour dépenser un UTXO, on exécute scriptSig + scriptPubKey et le résultat doit être vrai.'},
    {type:'ul',items:[
      'OP_DUP : duplique le haut de la pile',
      'OP_HASH160 : SHA256 puis RIPEMD160',
      'OP_EQUALVERIFY : compare les deux éléments du haut, échoue si !=',
      'OP_CHECKSIG : vérifie la signature ECDSA',
      'scriptSig P2PKH : &lt;sig&gt; &lt;pubkey&gt;',
      'scriptPubKey P2PKH : OP_DUP OP_HASH160 &lt;hash160&gt; OP_EQUALVERIFY OP_CHECKSIG',
    ]},
    {type:'tip',text:'OP_CHECKSIG dans Bitcoin prend la signature et la clé publique de la pile, puis vérifie la signature contre le sighash de la transaction. Ici on simplifie avec un hash fixe.'},
  ],
  code:
'<span class="cm">// 38 — Interpréteur Script Bitcoin P2PKH</span>\n'+
'<span class="cm">// Cargo.toml : k256 = { version = "0.13", features = ["ecdsa"] }, sha2 = "0.10", ripemd = "0.10"</span>\n'+
'<span class="kw">use</span> k256::ecdsa::{SigningKey, VerifyingKey, Signature, signature::{Signer, Verifier}};\n'+
'<span class="kw">use</span> k256::elliptic_curve::sec1::ToEncodedPoint;\n'+
'<span class="kw">use</span> sha2::{Sha256, Digest};\n'+
'<span class="kw">use</span> ripemd::Ripemd160;\n'+
'<span class="kw">use</span> rand::rngs::OsRng;\n'+
'\n'+
'<span class="kw">#[derive(Debug, Clone)]</span>\n'+
'<span class="kw">enum</span> <span class="ty">StackItem</span> {\n'+
'    <span class="ty">Bytes</span>(<span class="ty">Vec</span>&lt;<span class="ty">u8</span>&gt;),\n'+
'    <span class="ty">Bool</span>(<span class="ty">bool</span>),\n'+
'}\n'+
'\n'+
'<span class="kw">impl</span> <span class="ty">StackItem</span> {\n'+
'    <span class="kw">fn</span> <span class="fn">as_bytes</span>(<span class="op">&amp;</span><span class="kw">self</span>) -&gt; <span class="op">&amp;</span>[<span class="ty">u8</span>] {\n'+
'        <span class="kw">match</span> <span class="kw">self</span> { <span class="ty">StackItem</span>::<span class="ty">Bytes</span>(b) =&gt; b, _ =&gt; <span class="op">&amp;</span>[] }\n'+
'    }\n'+
'    <span class="kw">fn</span> <span class="fn">is_true</span>(<span class="op">&amp;</span><span class="kw">self</span>) -&gt; <span class="ty">bool</span> {\n'+
'        <span class="kw">match</span> <span class="kw">self</span> {\n'+
'            <span class="ty">StackItem</span>::<span class="ty">Bool</span>(b) =&gt; *b,\n'+
'            <span class="ty">StackItem</span>::<span class="ty">Bytes</span>(b) =&gt; !b.<span class="fn">is_empty</span>(),\n'+
'        }\n'+
'    }\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">hash160</span>(data: <span class="op">&amp;</span>[<span class="ty">u8</span>]) -&gt; <span class="ty">Vec</span>&lt;<span class="ty">u8</span>&gt; {\n'+
'    Ripemd160::<span class="fn">digest</span>(Sha256::<span class="fn">digest</span>(data)).<span class="fn">to_vec</span>()\n'+
'}\n'+
'\n'+
'<span class="cm">/// Exécute P2PKH : scriptSig || scriptPubKey</span>\n'+
'<span class="kw">fn</span> <span class="fn">execute_p2pkh</span>(\n'+
'    sig_bytes:   <span class="op">&amp;</span>[<span class="ty">u8</span>],\n'+
'    pubkey_bytes: <span class="op">&amp;</span>[<span class="ty">u8</span>],\n'+
'    pubkey_hash: <span class="op">&amp;</span>[<span class="ty">u8</span>],\n'+
'    message:     <span class="op">&amp;</span>[<span class="ty">u8</span>],\n'+
') -&gt; <span class="ty">bool</span> {\n'+
'    <span class="kw">let mut</span> stack: <span class="ty">Vec</span>&lt;<span class="ty">StackItem</span>&gt; = <span class="ty">Vec</span>::<span class="fn">new</span>();\n'+
'\n'+
'    <span class="cm">// ── scriptSig ──────────────────────</span>\n'+
'    <span class="mc">println!</span>(<span class="st">"  scriptSig: PUSH &lt;sig&gt;"</span>);\n'+
'    stack.<span class="fn">push</span>(<span class="ty">StackItem</span>::<span class="ty">Bytes</span>(sig_bytes.<span class="fn">to_vec</span>()));\n'+
'\n'+
'    <span class="mc">println!</span>(<span class="st">"  scriptSig: PUSH &lt;pubkey&gt;"</span>);\n'+
'    stack.<span class="fn">push</span>(<span class="ty">StackItem</span>::<span class="ty">Bytes</span>(pubkey_bytes.<span class="fn">to_vec</span>()));\n'+
'\n'+
'    <span class="cm">// ── scriptPubKey ───────────────────</span>\n'+
'\n'+
'    <span class="cm">// OP_DUP : duplique le haut de la pile</span>\n'+
'    <span class="mc">println!</span>(<span class="st">"  OP_DUP"</span>);\n'+
'    <span class="kw">let</span> top = stack.<span class="fn">last</span>().<span class="fn">unwrap</span>().<span class="fn">clone</span>();\n'+
'    stack.<span class="fn">push</span>(top);\n'+
'\n'+
'    <span class="cm">// OP_HASH160 : RIPEMD160(SHA256(top))</span>\n'+
'    <span class="mc">println!</span>(<span class="st">"  OP_HASH160"</span>);\n'+
'    <span class="kw">let</span> to_hash = stack.<span class="fn">pop</span>().<span class="fn">unwrap</span>();\n'+
'    stack.<span class="fn">push</span>(<span class="ty">StackItem</span>::<span class="ty">Bytes</span>(<span class="fn">hash160</span>(to_hash.<span class="fn">as_bytes</span>())));\n'+
'\n'+
'    <span class="cm">// PUSH &lt;pubkey_hash&gt;</span>\n'+
'    <span class="mc">println!</span>(<span class="st">"  PUSH &lt;pubkey_hash&gt;"</span>);\n'+
'    stack.<span class="fn">push</span>(<span class="ty">StackItem</span>::<span class="ty">Bytes</span>(pubkey_hash.<span class="fn">to_vec</span>()));\n'+
'\n'+
'    <span class="cm">// OP_EQUALVERIFY : compare et dépile les deux</span>\n'+
'    <span class="mc">println!</span>(<span class="st">"  OP_EQUALVERIFY"</span>);\n'+
'    <span class="kw">let</span> b = stack.<span class="fn">pop</span>().<span class="fn">unwrap</span>();\n'+
'    <span class="kw">let</span> a = stack.<span class="fn">pop</span>().<span class="fn">unwrap</span>();\n'+
'    <span class="kw">if</span> a.<span class="fn">as_bytes</span>() != b.<span class="fn">as_bytes</span>() {\n'+
'        <span class="mc">println!</span>(<span class="st">"  OP_EQUALVERIFY: ÉCHEC — hash160 ne correspond pas!"</span>);\n'+
'        <span class="kw">return false</span>;\n'+
'    }\n'+
'\n'+
'    <span class="cm">// OP_CHECKSIG : vérifie la signature</span>\n'+
'    <span class="mc">println!</span>(<span class="st">"  OP_CHECKSIG"</span>);\n'+
'    <span class="kw">let</span> pubkey_item = stack.<span class="fn">pop</span>().<span class="fn">unwrap</span>();\n'+
'    <span class="kw">let</span> sig_item    = stack.<span class="fn">pop</span>().<span class="fn">unwrap</span>();\n'+
'\n'+
'    <span class="kw">let</span> vk = <span class="kw">match</span> VerifyingKey::<span class="fn">from_sec1_bytes</span>(pubkey_item.<span class="fn">as_bytes</span>()) {\n'+
'        <span class="ty">Ok</span>(k) =&gt; k,\n'+
'        <span class="ty">Err</span>(_) =&gt; { <span class="mc">println!</span>(<span class="st">"  Clé publique invalide"</span>); <span class="kw">return false</span>; }\n'+
'    };\n'+
'    <span class="kw">let</span> sig = <span class="kw">match</span> Signature::<span class="fn">from_slice</span>(sig_item.<span class="fn">as_bytes</span>()) {\n'+
'        <span class="ty">Ok</span>(s) =&gt; s,\n'+
'        <span class="ty">Err</span>(_) =&gt; { <span class="mc">println!</span>(<span class="st">"  Signature invalide"</span>); <span class="kw">return false</span>; }\n'+
'    };\n'+
'\n'+
'    <span class="kw">let</span> result = vk.<span class="fn">verify</span>(message, <span class="op">&amp;</span>sig).<span class="fn">is_ok</span>();\n'+
'    stack.<span class="fn">push</span>(<span class="ty">StackItem</span>::<span class="ty">Bool</span>(result));\n'+
'    stack.<span class="fn">pop</span>().<span class="fn">map</span>(|i| i.<span class="fn">is_true</span>()).<span class="fn">unwrap_or</span>(<span class="kw">false</span>)\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">main</span>() {\n'+
'    <span class="kw">let</span> sk = SigningKey::<span class="fn">random</span>(<span class="op">&amp;</span><span class="kw">mut</span> OsRng);\n'+
'    <span class="kw">let</span> vk = sk.<span class="fn">verifying_key</span>();\n'+
'\n'+
'    <span class="cm">// Clé publique compressée (33 bytes)</span>\n'+
'    <span class="kw">let</span> pubkey_enc = vk.<span class="fn">to_encoded_point</span>(<span class="kw">true</span>);\n'+
'    <span class="kw">let</span> pubkey_bytes = pubkey_enc.<span class="fn">as_bytes</span>();\n'+
'\n'+
'    <span class="cm">// HASH160 de la clé publique (= l\'adresse P2PKH)</span>\n'+
'    <span class="kw">let</span> pubkey_hash = <span class="fn">hash160</span>(pubkey_bytes);\n'+
'\n'+
'    <span class="cm">// Message signé (= sighash de la tx en vrai)</span>\n'+
'    <span class="kw">let</span> message = <span class="st">b"sighash: 01000000...SIGHASH_ALL"</span>;\n'+
'\n'+
'    <span class="cm">// Signer</span>\n'+
'    <span class="kw">use</span> k256::ecdsa::signature::Signer;\n'+
'    <span class="kw">let</span> sig: Signature = sk.<span class="fn">sign</span>(message);\n'+
'\n'+
'    <span class="mc">println!</span>(<span class="st">"=== Exécution P2PKH ==="</span>);\n'+
'    <span class="kw">let</span> valid = <span class="fn">execute_p2pkh</span>(sig.<span class="fn">to_bytes</span>().<span class="fn">as_slice</span>(), pubkey_bytes, <span class="op">&amp;</span>pubkey_hash, message);\n'+
'    <span class="mc">println!</span>(<span class="st">"\nRésultat : {}"</span>, <span class="kw">if</span> valid {<span class="st">"VALIDE ✓"</span>} <span class="kw">else</span> {<span class="st">"INVALIDE ✗"</span>});\n'+
'\n'+
'    <span class="cm">// Dépense avec mauvaise signature</span>\n'+
'    <span class="kw">let</span> sk2 = SigningKey::<span class="fn">random</span>(<span class="op">&amp;</span><span class="kw">mut</span> OsRng);\n'+
'    <span class="kw">let</span> bad_sig: Signature = sk2.<span class="fn">sign</span>(message);\n'+
'    <span class="mc">println!</span>(<span class="st">"\n=== Mauvaise signature ==="</span>);\n'+
'    <span class="kw">let</span> invalid = <span class="fn">execute_p2pkh</span>(bad_sig.<span class="fn">to_bytes</span>().<span class="fn">as_slice</span>(), pubkey_bytes, <span class="op">&amp;</span>pubkey_hash, message);\n'+
'    <span class="mc">println!</span>(<span class="st">"\nRésultat : {}"</span>, <span class="kw">if</span> invalid {<span class="st">"VALIDE ✓"</span>} <span class="kw">else</span> {<span class="st">"INVALIDE ✗ (attendu)"</span>});\n'+
'}',
  output:
'<span class="out-prompt">$</span> cargo run\n'+
'=== Exécution P2PKH ===\n'+
'  scriptSig: PUSH &lt;sig&gt;\n'+
'  scriptSig: PUSH &lt;pubkey&gt;\n'+
'  OP_DUP\n'+
'  OP_HASH160\n'+
'  PUSH &lt;pubkey_hash&gt;\n'+
'  OP_EQUALVERIFY\n'+
'  OP_CHECKSIG\n'+
'\n'+
'Résultat : <span class="out-ok">VALIDE ✓</span>\n'+
'\n'+
'=== Mauvaise signature ===\n'+
'  OP_EQUALVERIFY\n'+
'  OP_CHECKSIG\n'+
'\n'+
'Résultat : <span class="out-dim">INVALIDE ✗ (attendu)</span>'
},
{
  id:'39', title:'RLP encoding + adresse Ethereum',
  tags:['RLP','Ethereum','Keccak256','adresse','EIP-55'],
  cargo:'rlp = "0.5"\nkeccak-hash = "0.10"\nk256 = "0.13"\nrand = "0.8"',
  concept:[
    {type:'h3',text:'RLP (Recursive Length Prefix) — sérialisation Ethereum'},
    {type:'p',text:'RLP est le format de sérialisation d\'Ethereum pour toutes les structures de données : transactions, blocs, état, receipts.'},
    {type:'ul',items:[
      'String courte (0-55 bytes) : [0x80+len] || data',
      'String longue (>55 bytes) : [0xB7+len_of_len] || len || data',
      'Liste : [0xC0+total_len] || items... (récursif)',
      'Adresse Ethereum = Keccak256(pubkey_64bytes)[12..] (20 bytes)',
      'EIP-55 checksum : majuscules/minuscules encodent le checksum',
    ]},
    {type:'tip',text:'L\'adresse Ethereum est dérivée de la clé publique NON-compressée sans le préfixe 04 (64 bytes), contrairement à Bitcoin qui utilise la clé compressée (33 bytes) avec RIPEMD160.'},
  ],
  code:
'<span class="cm">// 39 — RLP encoding + adresse Ethereum</span>\n'+
'<span class="cm">// Cargo.toml : rlp = "0.5", keccak-hash = "0.10", k256 = "0.13", rand = "0.8"</span>\n'+
'<span class="kw">use</span> k256::{SecretKey, elliptic_curve::sec1::ToEncodedPoint};\n'+
'<span class="kw">use</span> keccak_hash::keccak;\n'+
'<span class="kw">use</span> rand::rngs::OsRng;\n'+
'\n'+
'<span class="cm">/// Encode une adresse Ethereum avec checksum EIP-55</span>\n'+
'<span class="kw">fn</span> <span class="fn">eth_address_checksum</span>(addr: <span class="op">&amp;</span>[<span class="ty">u8</span>;<span class="nm">20</span>]) -&gt; <span class="ty">String</span> {\n'+
'    <span class="kw">let</span> hex_addr = addr.<span class="fn">iter</span>().<span class="fn">map</span>(|b|<span class="mc">format!</span>(<span class="st">"{:02x}"</span>,b)).<span class="fn">collect</span>::&lt;<span class="ty">String</span>&gt;();\n'+
'    <span class="kw">let</span> hash = keccak(hex_addr.<span class="fn">as_bytes</span>());\n'+
'\n'+
'    <span class="kw">let mut</span> result = <span class="ty">String</span>::<span class="fn">from</span>(<span class="st">"0x"</span>);\n'+
'    <span class="kw">for</span> (i, c) <span class="kw">in</span> hex_addr.<span class="fn">chars</span>().<span class="fn">enumerate</span>() {\n'+
'        <span class="kw">let</span> nibble = (hash[i/<span class="nm">2</span>] >> (<span class="kw">if</span> i%<span class="nm">2</span>==<span class="nm">0</span> {<span class="nm">4</span>} <span class="kw">else</span> {<span class="nm">0</span>})) <span class="op">&amp;</span> <span class="nm">0xF</span>;\n'+
'        result.<span class="fn">push</span>(<span class="kw">if</span> nibble >= <span class="nm">8</span> { c.<span class="fn">to_ascii_uppercase</span>() } <span class="kw">else</span> { c });\n'+
'    }\n'+
'    result\n'+
'}\n'+
'\n'+
'<span class="cm">/// Implémentation manuelle RLP (pédagogique)</span>\n'+
'<span class="kw">fn</span> <span class="fn">rlp_encode_bytes</span>(data: <span class="op">&amp;</span>[<span class="ty">u8</span>]) -&gt; <span class="ty">Vec</span>&lt;<span class="ty">u8</span>&gt; {\n'+
'    <span class="kw">match</span> data.<span class="fn">len</span>() {\n'+
'        <span class="nm">1</span> <span class="kw">if</span> data[<span class="nm">0</span>] <= <span class="nm">0x7F</span> =&gt; data.<span class="fn">to_vec</span>(), <span class="cm">// byte simple</span>\n'+
'        <span class="nm">0</span>..=<span class="nm">55</span> =&gt; {\n'+
'            <span class="kw">let mut</span> v = <span class="kw">vec!</span>[<span class="nm">0x80</span> + data.<span class="fn">len</span>() <span class="kw">as</span> <span class="ty">u8</span>];\n'+
'            v.<span class="fn">extend_from_slice</span>(data); v\n'+
'        },\n'+
'        n =&gt; {\n'+
'            <span class="kw">let</span> len_bytes = (<span class="kw">if</span> n &lt;= <span class="nm">0xFF</span> { <span class="kw">vec!</span>[n <span class="kw">as</span> <span class="ty">u8</span>] }\n'+
'                <span class="kw">else if</span> n &lt;= <span class="nm">0xFFFF</span> { <span class="kw">vec!</span>[(n>>8) <span class="kw">as</span> <span class="ty">u8</span>, (n<span class="op">&amp;</span><span class="nm">0xFF</span>) <span class="kw">as</span> <span class="ty">u8</span>] }\n'+
'                <span class="kw">else</span> { <span class="kw">vec!</span>[(n>>16) <span class="kw">as</span> <span class="ty">u8</span>,(n>>8)<span class="kw">as</span> <span class="ty">u8</span>,(n<span class="op">&amp;</span><span class="nm">0xFF</span>)<span class="kw">as</span> <span class="ty">u8</span>] });\n'+
'            <span class="kw">let mut</span> v = <span class="kw">vec!</span>[<span class="nm">0xB7</span> + len_bytes.<span class="fn">len</span>() <span class="kw">as</span> <span class="ty">u8</span>];\n'+
'            v.<span class="fn">extend_from_slice</span>(<span class="op">&amp;</span>len_bytes);\n'+
'            v.<span class="fn">extend_from_slice</span>(data); v\n'+
'        }\n'+
'    }\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">rlp_encode_list</span>(items: <span class="op">&amp;</span>[<span class="ty">Vec</span>&lt;<span class="ty">u8</span>&gt;]) -&gt; <span class="ty">Vec</span>&lt;<span class="ty">u8</span>&gt; {\n'+
'    <span class="kw">let</span> payload: <span class="ty">Vec</span>&lt;<span class="ty">u8</span>&gt; = items.<span class="fn">iter</span>().<span class="fn">flat_map</span>(|i| i.<span class="fn">iter</span>().<span class="fn">copied</span>()).<span class="fn">collect</span>();\n'+
'    <span class="kw">let</span> n = payload.<span class="fn">len</span>();\n'+
'    <span class="kw">let mut</span> v = <span class="kw">if</span> n <= <span class="nm">55</span> {\n'+
'        <span class="kw">vec!</span>[<span class="nm">0xC0</span> + n <span class="kw">as</span> <span class="ty">u8</span>]\n'+
'    } <span class="kw">else</span> {\n'+
'        <span class="kw">let</span> lb = <span class="kw">if</span> n <= <span class="nm">0xFF</span> { <span class="kw">vec!</span>[n <span class="kw">as</span> <span class="ty">u8</span>] } <span class="kw">else</span> { <span class="kw">vec!</span>[(n>>8)<span class="kw">as</span> <span class="ty">u8</span>,(n<span class="op">&amp;</span><span class="nm">0xFF</span>)<span class="kw">as</span> <span class="ty">u8</span>] };\n'+
'        <span class="kw">let mut</span> h = <span class="kw">vec!</span>[<span class="nm">0xF7</span> + lb.<span class="fn">len</span>() <span class="kw">as</span> <span class="ty">u8</span>]; h.<span class="fn">extend</span>(lb); h\n'+
'    };\n'+
'    v.<span class="fn">extend</span>(payload); v\n'+
'}\n'+
'\n'+

{
  id:'40', title:'KZG polynomial commitment (BLS12-381)',
  tags:['KZG','ZK','bls12_381','pairing','EIP-4844'],
  cargo:'bls12_381 = "0.8"\nff = "0.13"\nrand = "0.8"',
  concept:[
    {type:'h3',text:'KZG Polynomial Commitments'},
    {type:'p',text:'KZG (Kate-Zaverucha-Goldberg) permet de "s\'engager" sur un polynôme et de prouver sa valeur en un point, sans révéler les autres coefficients. Base de Plonk et EIP-4844.'},
    {type:'ul',items:[
      'Setup : paramètres [τ^i·G1] pour i=0..d (τ secret = trusted setup)',
      'Commit : C = p(τ)·G1 = Σ aᵢ·τⁱ·G1',
      'Prove : preuve π = (p(x)-p(z))/(x-z) évaluée en τ',
      'Verify : pairing e(C - p(z)·G1, G2) == e(π, [τ]G2 - z·G2)',
      'EIP-4844 (proto-danksharding) : blobs de données avec KZG',
    ]},
    {type:'warn',text:'Le "trusted setup" de KZG doit être effectué par des parties de confiance (cérémonie Powers of Tau). Si τ est connu, tout le système est compromis. PLONK utilise une cérémonie universelle.'},
  ],
  code:
'<span class="cm">// 40 — KZG polynomial commitment sur BLS12-381</span>\n'+
'<span class="cm">// Cargo.toml : bls12_381 = "0.8", ff = "0.13", rand = "0.8"</span>\n'+
'<span class="kw">use</span> bls12_381::{\n'+
'    G1Affine, G1Projective, G2Affine, G2Projective,\n'+
'    Scalar, pairing, Bls12,\n'+
'};\n'+
'<span class="kw">use</span> ff::Field;\n'+
'<span class="kw">use</span> rand::rngs::OsRng;\n'+
'<span class="kw">use</span> std::ops::{Add, Mul, Sub, Neg};\n'+
'\n'+
'<span class="cm">/// Polynôme p(x) = a0 + a1*x + a2*x^2 + ...</span>\n'+
'<span class="kw">struct</span> <span class="ty">Polynomial</span>(<span class="ty">Vec</span>&lt;<span class="ty">Scalar</span>&gt;);\n'+
'\n'+
'<span class="kw">impl</span> <span class="ty">Polynomial</span> {\n'+
'    <span class="cm">/// Évalue p(x)</span>\n'+
'    <span class="kw">fn</span> <span class="fn">eval</span>(<span class="op">&amp;</span><span class="kw">self</span>, x: <span class="ty">Scalar</span>) -&gt; <span class="ty">Scalar</span> {\n'+
'        <span class="kw">let mut</span> result = <span class="ty">Scalar</span>::<span class="fn">zero</span>();\n'+
'        <span class="kw">let mut</span> power = <span class="ty">Scalar</span>::<span class="fn">one</span>();\n'+
'        <span class="kw">for</span> <span class="op">&amp;</span>coeff <span class="kw">in</span> <span class="op">&amp;</span><span class="kw">self</span>.<span class="nm">0</span> {\n'+
'            result += coeff * power;\n'+
'            power *= x;\n'+
'        }\n'+
'        result\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Division par (x - z) via division synthétique de Ruffini</span>\n'+
'    <span class="kw">fn</span> <span class="fn">divide_by_x_minus_z</span>(<span class="op">&amp;</span><span class="kw">self</span>, z: <span class="ty">Scalar</span>) -&gt; <span class="ty">Self</span> {\n'+
'        <span class="kw">let</span> n = <span class="kw">self</span>.<span class="nm">0</span>.<span class="fn">len</span>();\n'+
'        <span class="kw">if</span> n <= <span class="nm">1</span> { <span class="kw">return</span> <span class="ty">Polynomial</span>(<span class="kw">vec!</span>[<span class="ty">Scalar</span>::<span class="fn">zero</span>()]); }\n'+
'        <span class="kw">let mut</span> q = <span class="kw">vec!</span>[<span class="ty">Scalar</span>::<span class="fn">zero</span>(); n - <span class="nm">1</span>];\n'+
'        q[n-<span class="nm">2</span>] = <span class="kw">self</span>.<span class="nm">0</span>[n-<span class="nm">1</span>];\n'+
'        <span class="kw">for</span> i <span class="kw">in</span> (<span class="nm">0</span>..n-<span class="nm">2</span>).<span class="fn">rev</span>() {\n'+
'            q[i] = <span class="kw">self</span>.<span class="nm">0</span>[i+<span class="nm">1</span>] + z * q[i+<span class="nm">1</span>];\n'+
'        }\n'+
'        <span class="ty">Polynomial</span>(q)\n'+
'    }\n'+
'}\n'+
'\n'+
'<span class="cm">/// Trusted setup simplifié : τ connu (uniquement pour la démo !)</span>\n'+
'<span class="kw">struct</span> <span class="ty">Srs</span> {\n'+
'    g1: <span class="ty">Vec</span>&lt;<span class="ty">G1Projective</span>&gt;,  <span class="cm">// [τ^i * G1]</span>\n'+
'    g2: <span class="ty">G2Projective</span>,       <span class="cm">// G2</span>\n'+
'    tau_g2: <span class="ty">G2Projective</span>,   <span class="cm">// τ * G2</span>\n'+
'}\n'+
'\n'+
'<span class="kw">impl</span> <span class="ty">Srs</span> {\n'+
'    <span class="kw">fn</span> <span class="fn">setup</span>(tau: <span class="ty">Scalar</span>, degree: <span class="ty">usize</span>) -&gt; <span class="ty">Self</span> {\n'+
'        <span class="kw">let</span> g1_gen = <span class="ty">G1Projective</span>::<span class="fn">generator</span>();\n'+
'        <span class="kw">let</span> g2_gen = <span class="ty">G2Projective</span>::<span class="fn">generator</span>();\n'+
'        <span class="kw">let mut</span> g1 = <span class="kw">vec!</span>[g1_gen];\n'+
'        <span class="kw">let mut</span> tau_pow = tau;\n'+
'        <span class="kw">for</span> _ <span class="kw">in</span> <span class="nm">1</span>..=degree {\n'+
'            g1.<span class="fn">push</span>(g1_gen * tau_pow);\n'+
'            tau_pow *= tau;\n'+
'        }\n'+
'        <span class="ty">Srs</span> { g1, g2: g2_gen, tau_g2: g2_gen * tau }\n'+
'    }\n'+
'}\n'+
'\n'+
'<span class="cm">/// Engage un polynôme : C = Σ aᵢ * [τⁱ]G1</span>\n'+
'<span class="kw">fn</span> <span class="fn">commit</span>(poly: <span class="op">&amp;</span><span class="ty">Polynomial</span>, srs: <span class="op">&amp;</span><span class="ty">Srs</span>) -&gt; <span class="ty">G1Projective</span> {\n'+
'    poly.<span class="nm">0</span>.<span class="fn">iter</span>().<span class="fn">enumerate</span>()\n'+
'        .<span class="fn">fold</span>(<span class="ty">G1Projective</span>::<span class="fn">identity</span>(), |acc, (i, <span class="op">&amp;</span>a)| acc + srs.g1[i] * a)\n'+
'}\n'+
'\n'+
'<span class="cm">/// Génère une preuve d\'évaluation en z</span>\n'+
'<span class="kw">fn</span> <span class="fn">prove</span>(poly: <span class="op">&amp;</span><span class="ty">Polynomial</span>, z: <span class="ty">Scalar</span>, srs: <span class="op">&amp;</span><span class="ty">Srs</span>) -&gt; <span class="ty">G1Projective</span> {\n'+
'    <span class="cm">// q(x) = (p(x) - p(z)) / (x - z)</span>\n'+
'    <span class="kw">let</span> y = poly.<span class="fn">eval</span>(z);\n'+
'    <span class="kw">let mut</span> shifted = poly.<span class="nm">0</span>.<span class="fn">clone</span>();\n'+
'    shifted[<span class="nm">0</span>] -= y;\n'+
'    <span class="kw">let</span> q = <span class="ty">Polynomial</span>(shifted).<span class="fn">divide_by_x_minus_z</span>(z);\n'+
'    <span class="fn">commit</span>(<span class="op">&amp;</span>q, srs)\n'+
'}\n'+
'\n'+
'<span class="cm">/// Vérifie la preuve via pairing</span>\n'+
'<span class="cm">/// e(C - y*G1, G2) == e(π, [τ]G2 - z*G2)</span>\n'+
'<span class="kw">fn</span> <span class="fn">verify</span>(\n'+
'    commitment: <span class="ty">G1Projective</span>,\n'+
'    z: <span class="ty">Scalar</span>, y: <span class="ty">Scalar</span>,\n'+
'    proof: <span class="ty">G1Projective</span>,\n'+
'    srs: <span class="op">&amp;</span><span class="ty">Srs</span>,\n'+
') -&gt; <span class="ty">bool</span> {\n'+
'    <span class="kw">let</span> g1_gen = <span class="ty">G1Projective</span>::<span class="fn">generator</span>();\n'+
'    <span class="kw">let</span> lhs_g1 = <span class="ty">G1Affine</span>::<span class="fn">from</span>(commitment - g1_gen * y);\n'+
'    <span class="kw">let</span> rhs_g2 = <span class="ty">G2Affine</span>::<span class="fn">from</span>(srs.tau_g2 - srs.g2 * z);\n'+
'    <span class="kw">let</span> proof_g1 = <span class="ty">G1Affine</span>::<span class="fn">from</span>(proof);\n'+
'    <span class="kw">let</span> g2_affine = <span class="ty">G2Affine</span>::<span class="fn">from</span>(srs.g2);\n'+
'\n'+
'    <span class="cm">// e(C - y*G1, G2) == e(π, τ*G2 - z*G2)</span>\n'+
'    pairing(<span class="op">&amp;</span>lhs_g1, <span class="op">&amp;</span>g2_affine) == pairing(<span class="op">&amp;</span>proof_g1, <span class="op">&amp;</span>rhs_g2)\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">main</span>() {\n'+
'    <span class="mc">println!</span>(<span class="st">"=== KZG Polynomial Commitment ===\n"</span>);\n'+
'\n'+
'    <span class="cm">// Trusted setup (τ connu uniquement pour la démo)</span>\n'+
'    <span class="kw">let</span> tau = <span class="ty">Scalar</span>::<span class="fn">random</span>(<span class="op">&amp;</span><span class="kw">mut</span> OsRng);\n'+
'    <span class="kw">let</span> srs = <span class="ty">Srs</span>::<span class="fn">setup</span>(tau, <span class="nm">5</span>); <span class="cm">// supporte deg ≤ 5</span>\n'+
'    <span class="mc">println!</span>(<span class="st">"SRS généré (τ secret en production)"</span>);\n'+
'\n'+
'    <span class="cm">// Polynôme p(x) = 3 + 2x + x^2  (coefficients : [3, 2, 1])</span>\n'+
'    <span class="kw">let</span> poly = <span class="ty">Polynomial</span>(<span class="kw">vec!</span>[\n'+
'        <span class="ty">Scalar</span>::<span class="fn">from</span>(<span class="nm">3u64</span>),\n'+
'        <span class="ty">Scalar</span>::<span class="fn">from</span>(<span class="nm">2u64</span>),\n'+
'        <span class="ty">Scalar</span>::<span class="fn">from</span>(<span class="nm">1u64</span>),\n'+
'    ]);\n'+
'    <span class="mc">println!</span>(<span class="st">"Polynôme : p(x) = 3 + 2x + x^2"</span>);\n'+
'\n'+
'    <span class="cm">// Engagement</span>\n'+
'    <span class="kw">let</span> commitment = <span class="fn">commit</span>(<span class="op">&amp;</span>poly, <span class="op">&amp;</span>srs);\n'+
'    <span class="mc">println!</span>(<span class="st">"Commitment C = p(τ)*G1 calculé"</span>);\n'+
'\n'+
'    <span class="cm">// Prouver l\'évaluation en z=4 : p(4) = 3 + 8 + 16 = 27</span>\n'+
'    <span class="kw">let</span> z = <span class="ty">Scalar</span>::<span class="fn">from</span>(<span class="nm">4u64</span>);\n'+
'    <span class="kw">let</span> y = poly.<span class="fn">eval</span>(z);\n'+
'    <span class="kw">let</span> proof = <span class="fn">prove</span>(<span class="op">&amp;</span>poly, z, <span class="op">&amp;</span>srs);\n'+
'\n'+
'    <span class="kw">let</span> y_u64 = y.<span class="fn">to_le_bytes</span>(); <span class="cm">// extraire la valeur</span>\n'+
'    <span class="mc">println!</span>(<span class="st">"Évaluation p(4) = {} (attendu 27)"</span>,\n'+
'        <span class="ty">u64</span>::<span class="fn">from_le_bytes</span>(y_u64[..<span class="nm">8</span>].<span class="fn">try_into</span>().<span class="fn">unwrap</span>()));\n'+
'\n'+
'    <span class="cm">// Vérification</span>\n'+
'    <span class="kw">let</span> valid = <span class="fn">verify</span>(commitment, z, y, proof, <span class="op">&amp;</span>srs);\n'+
'    <span class="mc">println!</span>(<span class="st">"Vérification pairing : {}"</span>, <span class="kw">if</span> valid {<span class="st">"OK ✓"</span>} <span class="kw">else</span> {<span class="st">"FAIL ✗"</span>});\n'+
'\n'+
'    <span class="cm">// Fausse preuve → rejetée</span>\n'+
'    <span class="kw">let</span> fake_y = <span class="ty">Scalar</span>::<span class="fn">from</span>(<span class="nm">999u64</span>);\n'+
'    <span class="kw">let</span> invalid = <span class="fn">verify</span>(commitment, z, fake_y, proof, <span class="op">&amp;</span>srs);\n'+
'    <span class="mc">println!</span>(<span class="st">"Fausse valeur y=999 : {}"</span>, <span class="kw">if</span> invalid {<span class="st">"BUG!"</span>} <span class="kw">else</span> {<span class="st">"Rejetée ✓"</span>});\n'+
'}',
  output:
'<span class="out-prompt">$</span> cargo run --release\n'+
'=== KZG Polynomial Commitment ===\n'+
'\n'+
'SRS généré (τ secret en production)\n'+
'Polynôme : p(x) = 3 + 2x + x^2\n'+
'Commitment C = p(τ)*G1 calculé\n'+
'Évaluation p(4) = <span class="out-val">27</span> (attendu 27)\n'+

'Fausse valeur y=999 : <span class="out-ok">Rejetée ✓</span>\n'+
'<span class="out-dim">(calcul de pairing ~200ms en --release)</span>'
}

    '<div class="tab-panel" id="'+uid+'-1"><div class="code-wrap"><div class="code-header"><div class="code-dots"><div class="code-dot" style="background:#FF5F57"></div><div class="code-dot" style="background:#FFBD2E"></div><div class="code-dot" style="background:#28C840"></div></div><span style="font-family:JetBrains Mono,monospace;font-size:11px;color:#546E7A;margin-left:8px">src/main.rs</span><button class="copy-btn" id="cpb-'+uid+'" onclick="copyCode(\''+uid+'\')">Copier</button></div><pre id="pre-'+uid+'">'+ex.code+'</pre></div></div>'+
    cargoPanel+
    '<div class="tab-panel" id="'+uid+'-'+outIdx+'"><div class="output-body">'+ex.output+'</div></div>'+
    '<div class="done-row"><button class="done-btn" id="done-'+ex.id+'" onclick="toggleDone(\''+ex.id+'\')"><span id="di-'+ex.id+'">○</span> <span id="dl-'+ex.id+'">Marquer comme fait</span></button></div>'+
    '</div></section>'+
    (idx<EXERCISES.length-1?'<div class="section-divider"></div>':'')
  );
});

function showTab(uid,idx,btn){
  var i=0; while(true){var p=document.getElementById(uid+'-'+i);if(!p)break;p.classList.toggle('active',i===idx);i++;}
  btn.closest('.tab-bar').querySelectorAll('.tab-btn').forEach(function(b,j){b.classList.toggle('active',j===idx);});
}
function copyCode(uid){
  var pre=document.getElementById('pre-'+uid);var btn=document.getElementById('cpb-'+uid);
  navigator.clipboard.writeText(pre.innerText).then(function(){btn.textContent='Copié!';btn.classList.add('copied');setTimeout(function(){btn.textContent='Copier';btn.classList.remove('copied');},2000);});
}
var DONE_KEY='rust_31_40_done';
var doneMap={};try{doneMap=JSON.parse(localStorage.getItem(DONE_KEY)||'{}');}catch(e){}
function toggleDone(id){doneMap[id]=!doneMap[id];localStorage.setItem(DONE_KEY,JSON.stringify(doneMap));renderDone();}
function renderDone(){var c=0;EXERCISES.forEach(function(ex){var d=!!doneMap[ex.id];if(d)c++;var btn=document.getElementById('done-'+ex.id);var icon=document.getElementById('di-'+ex.id);var lbl=document.getElementById('dl-'+ex.id);var nav=document.getElementById('nb-'+ex.id);if(btn)btn.className=d?'done-btn done':'done-btn';if(icon)icon.textContent=d?'✓':'○';if(lbl)lbl.textContent=d?'Complété':'Marquer comme fait';if(nav)nav.classList.toggle('done',d);});document.getElementById('nav-prog').textContent=c+' / 10';document.getElementById('prog-fill').style.width=(c/10*100)+'%';}
function doExpandAll(){EXERCISES.forEach(function(ex){var uid='u'+ex.id;var b=document.querySelector('[onclick="showTab(\''+uid+'\',1,this)"]');if(b)showTab(uid,1,b);});}
function doMarkAll(){EXERCISES.forEach(function(ex){doneMap[ex.id]=true;});localStorage.setItem(DONE_KEY,JSON.stringify(doneMap));renderDone();}
function setTheme(t){document.documentElement.setAttribute('data-theme',t);localStorage.setItem('rust_l3_theme',t);document.getElementById('tbtn-dark').classList.toggle('active',t==='dark');document.getElementById('tbtn-light').classList.toggle('active',t==='light');}
var io=new IntersectionObserver(function(entries){entries.forEach(function(e){if(e.isIntersecting){var id=e.target.id.replace('ex-','');document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.toggle('active',b.id==='nb-'+id);});}});},{rootMargin:'-15% 0px -70% 0px'});
document.querySelectorAll('.ex-section').forEach(function(s){io.observe(s);});
var st=localStorage.getItem('rust_l3_theme')||'dark';setTheme(st);renderDone();
</script>
