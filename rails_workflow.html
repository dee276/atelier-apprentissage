<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rails Dev Workflow</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #16161f;
    --border: #1e1e2e;
    --red: #cc3333;
    --red-bright: #ff4444;
    --red-dim: #8b1a1a;
    --amber: #d4823a;
    --green: #3a8b5c;
    --blue: #3a6b8b;
    --purple: #6b3a8b;
    --text: #e8e8f0;
    --text-muted: #6a6a82;
    --text-dim: #3a3a52;
    --accent: #cc3333;
  }

  :root.light {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #eeecea;
    --border: #d8d4cc;
    --red: #b52a2a;
    --red-bright: #cc3333;
    --red-dim: #e8c4c4;
    --amber: #b86a20;
    --green: #2a6e44;
    --blue: #2a5070;
    --purple: #562a70;
    --text: #1a1a24;
    --text-muted: #6a6070;
    --text-dim: #aaa4a0;
    --accent: #b52a2a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 24px 80px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    padding: 60px 0 48px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .header-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--red);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  h1 {
    font-size: clamp(36px, 5vw, 64px);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -2px;
    color: var(--text);
  }

  h1 span {
    color: var(--red);
  }

  .header-sub {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    margin-top: 16px;
    letter-spacing: 0.5px;
  }

  .header-meta {
    display: flex;
    gap: 24px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    border: 1px solid;
    letter-spacing: 1px;
  }

  .badge-red { border-color: var(--red-dim); color: var(--red); background: rgba(204,51,51,0.07); }
  .badge-amber { border-color: #6b4a1a; color: var(--amber); background: rgba(212,130,58,0.07); }
  .badge-green { border-color: #1a4b30; color: var(--green); background: rgba(58,139,92,0.07); }

  :root.light .badge-amber { border-color: #d4b090; }
  :root.light .badge-green { border-color: #90c4a8; }

  /* THEME TOGGLE */
  .theme-toggle {
    position: fixed;
    top: 16px;
    right: 20px;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    cursor: pointer;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px;
    transition: border-color 0.2s, color 0.2s;
    user-select: none;
  }

  .theme-toggle:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .theme-toggle-icon {
    font-size: 13px;
    transition: transform 0.4s ease;
  }

  .theme-toggle:hover .theme-toggle-icon {
    transform: rotate(20deg);
  }

  /* PROGRESS BAR */
  .progress-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 0;
    margin: 0 -24px 48px;
    padding-left: 24px;
    padding-right: 24px;
  }

  .progress-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }

  .progress-track {
    height: 2px;
    background: var(--border);
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--red);
    width: 0%;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px var(--red);
  }

  /* PHASE HEADERS */
  .phase {
    margin-bottom: 12px;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .phase-header::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--phase-color, var(--red));
  }

  .phase-header:hover {
    border-color: var(--phase-color, var(--red));
    background: var(--surface2);
  }

  .phase-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    min-width: 40px;
  }

  .phase-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    flex: 1;
    letter-spacing: 0.3px;
  }

  .phase-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .phase-chevron {
    font-size: 12px;
    color: var(--text-dim);
    transition: transform 0.3s;
  }

  .phase.open .phase-chevron { transform: rotate(180deg); }

  .phase-body {
    display: none;
    border: 1px solid var(--border);
    border-top: none;
    background: var(--surface);
  }

  .phase.open .phase-body { display: block; }

  /* STEPS */
  .step {
    display: grid;
    grid-template-columns: 56px 1fr;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .step:last-child { border-bottom: none; }

  .step:hover { background: var(--surface2); }

  .step-gutter {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
    border-right: 1px solid var(--border);
    gap: 8px;
  }

  .step-checkbox {
    width: 18px;
    height: 18px;
    border: 1px solid var(--text-dim);
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .step-checkbox:hover { border-color: var(--phase-color, var(--red)); }
  .step-checkbox.checked {
    background: var(--phase-color, var(--red));
    border-color: var(--phase-color, var(--red));
  }

  .step-checkbox.checked::after {
    content: '✓';
    color: white;
    font-size: 11px;
    font-weight: 700;
  }

  .step-number {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .step-content {
    padding: 20px 24px;
  }

  .step-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: 0.2px;
  }

  .step-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 10px;
  }

  .step-code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 10px 14px;
    color: #a8b8c8;
    line-height: 1.7;
    overflow-x: auto;
    position: relative;
  }

  .step-code .cmd { color: #e8c87a; }
  .step-code .flag { color: #8bb8e8; }
  .step-code .comment { color: var(--text-dim); }
  .step-code .str { color: #88c888; }
  .step-code .kw { color: #cc88cc; }

  .step-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
  }

  .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .tag-critical {
    border-color: var(--red-dim);
    color: var(--red);
    background: rgba(204,51,51,0.05);
  }

  .tag-tip {
    border-color: #1a4b30;
    color: var(--green);
    background: rgba(58,139,92,0.05);
  }

  /* TIPS PANEL */
  .tip-block {
    background: rgba(58,139,92,0.05);
    border-left: 2px solid var(--green);
    padding: 10px 14px;
    margin-top: 10px;
    font-size: 12px;
    color: #5a9b72;
    line-height: 1.6;
    font-family: 'JetBrains Mono', monospace;
  }

  .warn-block {
    background: rgba(212,130,58,0.05);
    border-left: 2px solid var(--amber);
    padding: 10px 14px;
    margin-top: 10px;
    font-size: 12px;
    color: #b87040;
    line-height: 1.6;
    font-family: 'JetBrains Mono', monospace;
  }

  /* SUMMARY */
  .summary {
    margin-top: 56px;
    padding: 32px;
    border: 1px solid var(--border);
    background: var(--surface);
  }

  .summary-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--red);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
  }

  .stat-box {
    padding: 16px;
    border: 1px solid var(--border);
    background: var(--bg);
  }

  .stat-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }

  .stat-num span { color: var(--red); }

  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1px;
    margin-top: 6px;
  }

  /* COLLAPSE ALL */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    align-items: center;
  }

  .ctrl-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }

  .ctrl-btn:hover {
    border-color: var(--red);
    color: var(--red);
  }

  .ctrl-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 1px;
    margin-left: auto;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); }

  /* Light mode overrides */
  :root.light .step-code { color: #2a3a4a; background: #f0eeea; }
  :root.light .step-code .cmd { color: #8b4a00; }
  :root.light .step-code .flag { color: #2a5080; }
  :root.light .step-code .comment { color: #aaa4a0; }
  :root.light .step-code .str { color: #2a6e44; }
  :root.light .step-code .kw { color: #6a2a8b; }
  :root.light .tip-block { background: rgba(42,110,68,0.07); color: #2a6e44; border-color: #2a6e44; }
  :root.light .warn-block { background: rgba(184,106,32,0.07); color: #8b5010; border-color: #b86a20; }
  :root.light body::before { opacity: 0.15; }

  @media (max-width: 600px) {
    .step { grid-template-columns: 44px 1fr; }
    h1 { letter-spacing: -1px; }
    .theme-toggle { top: 10px; right: 10px; }
  }
</style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">
  <span class="theme-toggle-icon" id="theme-icon">☀</span>
  <span id="theme-label">LIGHT</span>
</button>

<div class="container">

  <header>
    <div class="header-tag">// workflow guide</div>
    <h1>Ruby on <span>Rails</span><br>Dev Workflow</h1>
    <div class="header-sub">$ ordre d'exécution · meilleures pratiques · pitfalls</div>
    <div class="header-meta">
      <span class="badge badge-red">Rails 7+</span>
      <span class="badge badge-amber">Ruby 3.x</span>
      <span class="badge badge-green">Convention over Config</span>
    </div>
  </header>

  <div class="progress-bar">
    <div class="progress-label">
      <span>PROGRESSION</span>
      <span id="progress-text">0 / 0 étapes complétées</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" onclick="expandAll()">TOUT OUVRIR</button>
    <button class="ctrl-btn" onclick="collapseAll()">TOUT FERMER</button>
    <button class="ctrl-btn" onclick="resetChecks()">RESET</button>
    <span class="ctrl-label" id="phase-progress"></span>
  </div>

  <div id="phases"></div>

  <div class="summary">
    <div class="summary-title">// résumé du workflow</div>
    <div class="summary-grid">
      <div class="stat-box">
        <div class="stat-num" id="stat-total">0</div>
        <div class="stat-label">ÉTAPES TOTALES</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="stat-done">0</div>
        <div class="stat-label">COMPLÉTÉES</div>
      </div>
      <div class="stat-box">
        <div class="stat-num">12</div>
        <div class="stat-label">PHASES</div>
      </div>
      <div class="stat-box">
        <div class="stat-num"><span>CoC</span></div>
        <div class="stat-label">CONVENTION OVER CONFIG</div>
      </div>
    </div>
  </div>

</div>

<script>
const PHASES = [
  {
    title: "Conception & Planification",
    color: "#cc3333",
    steps: [
      {
        title: "Définir le domaine métier",
        desc: "Identifier les entités principales, leurs attributs, et les relations entre elles. Faire un diagramme rapide (même sur papier). C'est la base de tout — une erreur ici coûte cher.",
        code: `<span class="comment"># Exemple de réflexion domaine</span>
<span class="comment"># User → has_many :posts</span>
<span class="comment"># Post → belongs_to :user, has_many :comments</span>
<span class="comment"># Comment → belongs_to :post, belongs_to :user</span>`,
        tags: ["critical"],
        tip: "→ Outil recommandé : dbdiagram.io ou un simple ERD sur papier avant de toucher au code."
      },
      {
        title: "Schéma de base de données (ERD)",
        desc: "Définir les tables, colonnes (avec types), clés étrangères, index nécessaires. Valider les cardinalités (1:1, 1:N, N:M). Identifier les tables de jointure pour les relations N:M.",
        code: `<span class="comment"># Tables à planifier :</span>
users       <span class="str">id, email, name, created_at</span>
posts       <span class="str">id, user_id, title, body, published_at</span>
tags        <span class="str">id, name</span>
posts_tags  <span class="str">post_id, tag_id  ← table de jointure N:M</span>`,
        tags: ["critical"],
        warn: "⚠ Ne pas improviser le schéma en cours de route — les migrations correctrices s'accumulent et deviennent une dette."
      },
      {
        title: "Définir les user stories / routes nécessaires",
        desc: "Lister les actions que les utilisateurs doivent pouvoir faire. Cela détermine directement les routes REST et les controllers nécessaires.",
        code: `<span class="comment"># User stories → verbes REST</span>
Voir tous les posts    → GET  /posts          (index)
Voir un post           → GET  /posts/:id      (show)
Créer un post          → POST /posts          (create)
Formulaire création    → GET  /posts/new      (new)
Modifier un post       → PATCH /posts/:id     (update)
Supprimer un post      → DELETE /posts/:id    (destroy)`,
        tags: ["tip"],
        tip: "→ Si une action ne rentre pas dans les 7 actions REST, questionner si elle mérite son propre controller."
      }
    ]
  },
  {
    title: "Setup du Projet",
    color: "#d4823a",
    steps: [
      {
        title: "Créer le projet Rails",
        desc: "Choisir la base de données dès le départ. PostgreSQL est recommandé pour la production. Éviter SQLite en dehors du prototypage.",
        code: `<span class="cmd">rails new</span> <span class="str">my_app</span> <span class="flag">--database=postgresql</span>
<span class="cmd">rails new</span> <span class="str">my_app</span> <span class="flag">--database=postgresql --css=tailwind</span>
<span class="cmd">rails new</span> <span class="str">my_api</span> <span class="flag">--api --database=postgresql</span>  <span class="comment"># mode API</span>

<span class="cmd">cd</span> my_app
<span class="cmd">git init</span> <span class="flag">&& git add . && git commit -m</span> <span class="str">"init"</span>`,
        tags: ["critical"],
        tip: "→ Committer le projet vide immédiatement. Chaque étape majeure mérite un commit propre."
      },
      {
        title: "Configurer la base de données",
        desc: "Éditer config/database.yml. Créer les bases dev et test. Vérifier la connexion avant de continuer.",
        code: `<span class="comment"># config/database.yml</span>
<span class="kw">default</span>: &default
  adapter: postgresql
  username: <%= ENV[<span class="str">'DB_USER'</span>] %>
  password: <%= ENV[<span class="str">'DB_PASSWORD'</span>] %>

<span class="cmd">rails db:create</span>       <span class="comment"># crée les BDs dev + test</span>`,
        tags: ["critical"],
        warn: "⚠ Ne jamais hardcoder les credentials. Utiliser dotenv-rails ou Rails credentials (rails credentials:edit)."
      },
      {
        title: "Installer les gems essentielles",
        desc: "Ajouter les dépendances de base avant de commencer à coder. Mieux vaut les avoir dès le départ que les ajouter en cours de route.",
        code: `<span class="comment"># Gemfile — gems recommandées</span>
gem <span class="str">'devise'</span>              <span class="comment"># auth</span>
gem <span class="str">'pundit'</span>              <span class="comment"># autorisation</span>
gem <span class="str">'pagy'</span>                <span class="comment"># pagination</span>
gem <span class="str">'ransack'</span>             <span class="comment"># search/filter</span>

group :development, :test <span class="kw">do</span>
  gem <span class="str">'rspec-rails'</span>
  gem <span class="str">'factory_bot_rails'</span>
  gem <span class="str">'faker'</span>
  gem <span class="str">'rubocop-rails'</span>
<span class="kw">end</span>

<span class="cmd">bundle install</span>`,
        tags: ["tip"]
      },
      {
        title: "Configurer RSpec",
        desc: "Remplacer MiniTest par RSpec dès le début si c'est votre choix. Impossible à changer proprement après coup.",
        code: `<span class="cmd">rails generate rspec:install</span>

<span class="comment"># .rspec</span>
--format documentation
--color

<span class="comment"># Vérifier</span>
<span class="cmd">rspec</span>  <span class="comment"># doit retourner 0 examples</span>`,
        tags: ["tip"],
        tip: "→ RSpec > MiniTest pour les projets sérieux. Plus expressif, meilleure communauté de matchers."
      }
    ]
  },
  {
    title: "Modèles & Base de Données",
    color: "#3a6b8b",
    steps: [
      {
        title: "Générer les modèles (avec migrations)",
        desc: "Créer les modèles dans l'ordre des dépendances : les modèles parents avant les enfants. Spécifier les types de colonnes précisément.",
        code: `<span class="comment"># Ordre : parent avant enfant</span>
<span class="cmd">rails g model</span> User <span class="str">email:string:uniq name:string</span>
<span class="cmd">rails g model</span> Post <span class="str">title:string body:text user:references</span>
<span class="cmd">rails g model</span> Comment <span class="str">body:text user:references post:references</span>

<span class="comment"># :references génère automatiquement la foreign key + index</span>`,
        tags: ["critical"],
        warn: "⚠ Toujours spécifier les types explicitement. Ne pas laisser Rails deviner."
      },
      {
        title: "Écrire/réviser les migrations",
        desc: "Vérifier les migrations générées avant de les exécuter. Ajouter les contraintes NOT NULL, les index, et les valeurs par défaut manquantes.",
        code: `<span class="comment"># db/migrate/xxx_create_posts.rb</span>
<span class="kw">class</span> CreatePosts < ActiveRecord::Migration[7.0]
  <span class="kw">def</span> change
    create_table :posts <span class="kw">do</span> |t|
      t.string  :title, <span class="flag">null: false</span>
      t.text    :body
      t.boolean :published, <span class="flag">default: false, null: false</span>
      t.references :user, <span class="flag">null: false, foreign_key: true, index: true</span>
      t.timestamps
    <span class="kw">end</span>
  <span class="kw">end</span>
<span class="kw">end</span>

<span class="cmd">rails db:migrate</span>`,
        tags: ["critical"],
        tip: "→ Ajouter null: false dès que possible. Beaucoup plus facile que de corriger plus tard."
      },
      {

let checkState = {};

function renderPhases() {
  const container = document.getElementById('phases');
  let totalSteps = 0;

  PHASES.forEach((phase, pi) => {
    totalSteps += phase.steps.length;
    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase';
    phaseEl.id = `phase-${pi}`;

    const stepsHTML = phase.steps.map((step, si) => {
      const key = `${pi}-${si}`;
      const checked = checkState[key] || false;
      return `
        <div class="step" style="--phase-color: ${phase.color}">
          <div class="step-gutter">
            <div class="step-checkbox ${checked ? 'checked' : ''}" onclick="toggleCheck('${key}', this)" data-key="${key}"></div>
            <div class="step-number">${String(si + 1).padStart(2, '0')}</div>
          </div>
          <div class="step-content">
            <div class="step-title">${step.title}</div>
            <div class="step-desc">${step.desc}</div>
            ${step.code ? `<div class="step-code">${step.code}</div>` : ''}
            ${step.tip ? `<div class="tip-block">${step.tip}</div>` : ''}
            ${step.warn ? `<div class="warn-block">${step.warn}</div>` : ''}
            <div class="step-tags">
              ${(step.tags || []).map(t => `<span class="tag ${t === 'critical' ? 'tag-critical' : t === 'tip' ? 'tag-tip' : ''}">${t === 'critical' ? '⚑ critique' : t === 'tip' ? '✓ best practice' : t}</span>`).join('')}
            </div>
          </div>
        </div>`;
    }).join('');

    phaseEl.innerHTML = `
      <div class="phase-header" style="--phase-color: ${phase.color}" onclick="togglePhase(${pi})">
        <div class="phase-num">PHASE ${String(pi + 1).padStart(2, '0')}</div>
        <div class="phase-title">${phase.title}</div>
        <div class="phase-count">${phase.steps.length} étapes</div>
        <div class="phase-chevron">▼</div>
      </div>
      <div class="phase-body">${stepsHTML}</div>`;

    container.appendChild(phaseEl);
  });

  document.getElementById('stat-total').textContent = totalSteps;
  updateProgress();

  // Open first phase by default
  document.getElementById('phase-0').classList.add('open');
}

function togglePhase(pi) {
  const el = document.getElementById(`phase-${pi}`);
  el.classList.toggle('open');
}

function toggleCheck(key, el) {
  checkState[key] = !checkState[key];
  el.classList.toggle('checked', checkState[key]);
  saveState();
  updateProgress();
}

function updateProgress() {
  const total = PHASES.reduce((s, p) => s + p.steps.length, 0);
  const done = Object.values(checkState).filter(Boolean).length;
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;

  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${done} / ${total} étapes complétées`;
  document.getElementById('stat-done').textContent = done;
}

function expandAll() {
  PHASES.forEach((_, pi) => document.getElementById(`phase-${pi}`).classList.add('open'));
}

function collapseAll() {
  PHASES.forEach((_, pi) => document.getElementById(`phase-${pi}`).classList.remove('open'));
}

function resetChecks() {
  checkState = {};
  document.querySelectorAll('.step-checkbox').forEach(el => el.classList.remove('checked'));
  saveState();
  updateProgress();
}

function saveState() {
  try { localStorage.setItem('rails-workflow-checks', JSON.stringify(checkState)); } catch(e) {}
}

function loadState() {
  try {
    const saved = localStorage.getItem('rails-workflow-checks');
    if (saved) checkState = JSON.parse(saved);
  } catch(e) {}
}

loadState();
renderPhases();
