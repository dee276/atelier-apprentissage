.output-body{padding:16px 20px;background:var(--bg2);font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--tx2);line-height:1.8}
.out-prompt{color:var(--rust)}.out-ok{color:#3D9970}.out-val{color:#F78C6C}.out-dim{color:var(--tx3)}
.done-row{display:flex;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--line);background:var(--bg2)}
.done-btn{display:flex;align-items:center;gap:6px;font-size:12.5px;padding:6px 14px;border-radius:7px;border:1px solid var(--line2);background:none;color:var(--tx3);cursor:pointer;transition:all .15s}
.done-btn:hover{border-color:var(--green);color:var(--green)}
.done-btn.done{border-color:var(--green);color:var(--green);background:rgba(61,153,112,.08)}
.section-divider{height:1px;background:var(--line);margin-bottom:56px}
@media(max-width:800px){nav{display:none}main{margin-left:0;padding:20px 18px 80px}.prog-strip{left:0}}
</style>

<script>
var EXERCISES = [
{
  id:'31', title:'Sérialisation complète d\'un bloc Bitcoin',
  tags:['Bitcoin protocol','sérialisation','header','target','little-endian'],
  cargo:'sha2 = "0.10"',
  concept:[
    {type:'h3',text:'Header Bitcoin — 80 bytes'},
    {type:'p',text:'Un header Bitcoin est exactement 80 bytes sérialisés en little-endian. Le block hash = SHA256d(header) doit être inférieur au target.'},
    {type:'ul',items:[
      'version (4B LE) · prev_hash (32B) · merkle_root (32B)',
      'time (4B LE) · bits (4B LE) · nonce (4B LE)',
      'bits compact → target 256-bit : exposant (1B) + mantisse (3B)',
      'target = mantisse × 2^(8×(exposant-3))',
      'Block hash stocké en little-endian mais affiché en big-endian dans les explorateurs',
    ]},
    {type:'tip',text:'Le bloc genèse Bitcoin a bits=0x1d00ffff, nonce=2083236893, et son hash commence par 10 zéros en hex. Son prev_hash est 0x000...000 (62 zéros).'},
  ],
  code:
'<span class="cm">// 31 — Sérialisation header Bitcoin complet</span>\n'+
'<span class="cm">// Cargo.toml : sha2 = "0.10"</span>\n'+
'<span class="kw">use</span> sha2::{Sha256, Digest};\n'+
'\n'+
'<span class="kw">#[derive(Debug)]</span>\n'+
'<span class="kw">struct</span> <span class="ty">BlockHeader</span> {\n'+
'    version:     <span class="ty">u32</span>,\n'+
'    prev_hash:   [<span class="ty">u8</span>;<span class="nm">32</span>],\n'+
'    merkle_root: [<span class="ty">u8</span>;<span class="nm">32</span>],\n'+
'    time:        <span class="ty">u32</span>,\n'+
'    bits:        <span class="ty">u32</span>,\n'+
'    nonce:       <span class="ty">u32</span>,\n'+
'}\n'+
'\n'+
'<span class="kw">impl</span> <span class="ty">BlockHeader</span> {\n'+
'    <span class="cm">/// Sérialise le header en 80 bytes (format Bitcoin wire)</span>\n'+
'    <span class="kw">fn</span> <span class="fn">serialize</span>(<span class="op">&amp;</span><span class="kw">self</span>) -&gt; [<span class="ty">u8</span>;<span class="nm">80</span>] {\n'+
'        <span class="kw">let mut</span> buf = [<span class="nm">0u8</span>;<span class="nm">80</span>];\n'+
'        buf[<span class="nm">0</span>..<span class="nm">4</span>].copy_from_slice(<span class="op">&amp;</span><span class="kw">self</span>.version.<span class="fn">to_le_bytes</span>());\n'+
'        buf[<span class="nm">4</span>..<span class="nm">36</span>].copy_from_slice(<span class="op">&amp;</span><span class="kw">self</span>.prev_hash);\n'+
'        buf[<span class="nm">36</span>..<span class="nm">68</span>].copy_from_slice(<span class="op">&amp;</span><span class="kw">self</span>.merkle_root);\n'+
'        buf[<span class="nm">68</span>..<span class="nm">72</span>].copy_from_slice(<span class="op">&amp;</span><span class="kw">self</span>.time.<span class="fn">to_le_bytes</span>());\n'+
'        buf[<span class="nm">72</span>..<span class="nm">76</span>].copy_from_slice(<span class="op">&amp;</span><span class="kw">self</span>.bits.<span class="fn">to_le_bytes</span>());\n'+
'        buf[<span class="nm">76</span>..<span class="nm">80</span>].copy_from_slice(<span class="op">&amp;</span><span class="kw">self</span>.nonce.<span class="fn">to_le_bytes</span>());\n'+
'        buf\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Désérialise depuis 80 bytes</span>\n'+
'    <span class="kw">fn</span> <span class="fn">deserialize</span>(buf: <span class="op">&amp;</span>[<span class="ty">u8</span>;<span class="nm">80</span>]) -&gt; <span class="ty">Self</span> {\n'+
'        <span class="ty">BlockHeader</span> {\n'+
'            version:     <span class="ty">u32</span>::<span class="fn">from_le_bytes</span>(buf[<span class="nm">0</span>..<span class="nm">4</span>].<span class="fn">try_into</span>().<span class="fn">unwrap</span>()),\n'+
'            prev_hash:   buf[<span class="nm">4</span>..<span class="nm">36</span>].<span class="fn">try_into</span>().<span class="fn">unwrap</span>(),\n'+
'            merkle_root: buf[<span class="nm">36</span>..<span class="nm">68</span>].<span class="fn">try_into</span>().<span class="fn">unwrap</span>(),\n'+
'            time:        <span class="ty">u32</span>::<span class="fn">from_le_bytes</span>(buf[<span class="nm">68</span>..<span class="nm">72</span>].<span class="fn">try_into</span>().<span class="fn">unwrap</span>()),\n'+
'            bits:        <span class="ty">u32</span>::<span class="fn">from_le_bytes</span>(buf[<span class="nm">72</span>..<span class="nm">76</span>].<span class="fn">try_into</span>().<span class="fn">unwrap</span>()),\n'+
'            nonce:       <span class="ty">u32</span>::<span class="fn">from_le_bytes</span>(buf[<span class="nm">76</span>..<span class="nm">80</span>].<span class="fn">try_into</span>().<span class="fn">unwrap</span>()),\n'+
'        }\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Calcule SHA256d(header) = block hash</span>\n'+
'    <span class="kw">fn</span> <span class="fn">block_hash</span>(<span class="op">&amp;</span><span class="kw">self</span>) -&gt; [<span class="ty">u8</span>;<span class="nm">32</span>] {\n'+
'        <span class="kw">let</span> raw = <span class="kw">self</span>.<span class="fn">serialize</span>();\n'+
'        Sha256::<span class="fn">digest</span>(Sha256::<span class="fn">digest</span>(raw)).<span class="fn">into</span>()\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Décode bits compact → target 256-bit</span>\n'+
'    <span class="kw">fn</span> <span class="fn">target</span>(<span class="op">&amp;</span><span class="kw">self</span>) -&gt; [<span class="ty">u8</span>;<span class="nm">32</span>] {\n'+
'        <span class="kw">let</span> exp      = ((<span class="kw">self</span>.bits >> <span class="nm">24</span>) <span class="kw">as</span> <span class="ty">usize</span>).<span class="fn">saturating_sub</span>(<span class="nm">3</span>);\n'+
'        <span class="kw">let</span> mantissa = <span class="kw">self</span>.bits <span class="op">&amp;</span> <span class="nm">0x00FFFFFF</span>;\n'+
'        <span class="kw">let mut</span> t = [<span class="nm">0u8</span>;<span class="nm">32</span>];\n'+
'        <span class="kw">if</span> exp + <span class="nm">3</span> <= <span class="nm">32</span> {\n'+
'            <span class="kw">let</span> start = <span class="nm">32</span> - exp - <span class="nm">3</span>;\n'+
'            t[start]   = ((mantissa >> <span class="nm">16</span>) <span class="op">&amp;</span> <span class="nm">0xFF</span>) <span class="kw">as</span> <span class="ty">u8</span>;\n'+
'            t[start+<span class="nm">1</span>] = ((mantissa >>  <span class="nm">8</span>) <span class="op">&amp;</span> <span class="nm">0xFF</span>) <span class="kw">as</span> <span class="ty">u8</span>;\n'+
'            t[start+<span class="nm">2</span>] = ( mantissa        <span class="op">&amp;</span> <span class="nm">0xFF</span>) <span class="kw">as</span> <span class="ty">u8</span>;\n'+
'        }\n'+
'        t\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Vérifie que block_hash &lt; target</span>\n'+
'    <span class="kw">fn</span> <span class="fn">verify_pow</span>(<span class="op">&amp;</span><span class="kw">self</span>) -&gt; <span class="ty">bool</span> {\n'+
'        <span class="kw">let</span> <span class="kw">mut</span> hash = <span class="kw">self</span>.<span class="fn">block_hash</span>();\n'+
'        hash.<span class="fn">reverse</span>(); <span class="cm">// big-endian pour comparaison</span>\n'+
'        <span class="kw">let</span> target = <span class="kw">self</span>.<span class="fn">target</span>();\n'+
'        hash < target\n'+
'    }\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">hex</span>(b: <span class="op">&amp;</span>[<span class="ty">u8</span>]) -&gt; <span class="ty">String</span> { b.<span class="fn">iter</span>().<span class="fn">map</span>(|x|<span class="mc">format!</span>(<span class="st">"{:02x}"</span>,x)).<span class="fn">collect</span>() }\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">main</span>() {\n'+
'    <span class="cm">// Bloc genèse Bitcoin (block #0)</span>\n'+
'    <span class="kw">let</span> genesis = <span class="ty">BlockHeader</span> {\n'+
'        version:     <span class="nm">1</span>,\n'+
'        prev_hash:   [<span class="nm">0u8</span>;<span class="nm">32</span>], <span class="cm">// pas de prédécesseur</span>\n'+
'        merkle_root: [\n'+
'            <span class="nm">0x3b</span>,<span class="nm">0xa3</span>,<span class="nm">0xed</span>,<span class="nm">0xfd</span>,<span class="nm">0x7a</span>,<span class="nm">0x7b</span>,<span class="nm">0x12</span>,<span class="nm">0xb2</span>,\n'+
'            <span class="nm">0x7a</span>,<span class="nm">0xc7</span>,<span class="nm">0x2c</span>,<span class="nm">0x3e</span>,<span class="nm">0x67</span>,<span class="nm">0x76</span>,<span class="nm">0x8f</span>,<span class="nm">0x61</span>,\n'+
'            <span class="nm">0x7f</span>,<span class="nm">0xc8</span>,<span class="nm">0x1b</span>,<span class="nm">0xc3</span>,<span class="nm">0x88</span>,<span class="nm">0x8a</span>,<span class="nm">0x51</span>,<span class="nm">0x32</span>,\n'+
'            <span class="nm">0x3a</span>,<span class="nm">0x9f</span>,<span class="nm">0xb8</span>,<span class="nm">0xaa</span>,<span class="nm">0x4b</span>,<span class="nm">0x1e</span>,<span class="nm">0x5e</span>,<span class="nm">0x4a</span>,\n'+
'        ],\n'+
'        time:  <span class="nm">1231006505</span>, <span class="cm">// 03 Jan 2009</span>\n'+
'        bits:  <span class="nm">0x1d00ffff</span>,\n'+
'        nonce: <span class="nm">2083236893</span>,\n'+
'    };\n'+
'\n'+
'    <span class="kw">let</span> raw = genesis.<span class="fn">serialize</span>();\n'+
'    <span class="mc">println!</span>(<span class="st">"Header sérialisé ({} bytes): {}..."</span>, raw.<span class="fn">len</span>(), <span class="op">&amp;</span><span class="fn">hex</span>(<span class="op">&amp;</span>raw)[..<span class="nm">32</span>]);\n'+
'\n'+
'    <span class="cm">// Block hash (doit commencer par plusieurs zéros)</span>\n'+
'    <span class="kw">let</span> hash = genesis.<span class="fn">block_hash</span>();\n'+
'    <span class="kw">let mut</span> hash_be = hash;\n'+
'    hash_be.<span class="fn">reverse</span>(); <span class="cm">// affichage big-endian comme les explorateurs</span>\n'+
'    <span class="mc">println!</span>(<span class="st">"Block hash (BE): {}"</span>, <span class="fn">hex</span>(<span class="op">&amp;</span>hash_be));\n'+
'\n'+
'    <span class="cm">// Target depuis bits compact</span>\n'+
'    <span class="kw">let</span> target = genesis.<span class="fn">target</span>();\n'+
'    <span class="mc">println!</span>(<span class="st">"Target         : {}..."</span>, <span class="op">&amp;</span><span class="fn">hex</span>(<span class="op">&amp;</span>target)[..<span class="nm">16</span>]);\n'+
'\n'+
'    <span class="mc">println!</span>(<span class="st">"PoW valide     : {}"</span>, genesis.<span class="fn">verify_pow</span>());\n'+
'\n'+
'    <span class="cm">// Round-trip : serialize → deserialize</span>\n'+

'    <span class="mc">println!</span>(<span class="st">"\nOK round-trip serialize/deserialize"</span>);\n'+
'\n'+
'    <span class="cm">// Modifier le nonce invalide le PoW</span>\n'+
'    <span class="kw">let</span> bad = <span class="ty">BlockHeader</span> { nonce: <span class="nm">0</span>, ..genesis };\n'+

'\n'+
'<span class="out-ok">OK round-trip serialize/deserialize</span>\n'+
'PoW nonce=0    : <span class="out-dim">false</span> (attendu false)'

{
  id:'32', title:'UTXO set — modèle de dépense',

  cargo:'sha2 = "0.10"',
  concept:[

    {type:'p',text:'Bitcoin ne stocke pas de "soldes". Il stocke des sorties non-dépensées (UTXO). Dépenser = consommer des UTXOs existants et créer de nouveaux.'},
    {type:'ul',items:[
      'UTXO = (txid, vout_index, montant, script)',

  code:
'<span class="cm">// 32 — UTXO set : modèle de dépense Bitcoin</span>\n'+
'<span class="cm">// Cargo.toml : sha2 = "0.10"</span>\n'+
'<span class="kw">use</span> std::collections::HashMap;\n'+
'<span class="kw">use</span> sha2::{Sha256, Digest};\n'+
'\n'+
'<span class="kw">type</span> <span class="ty">TxId</span> = [<span class="ty">u8</span>;<span class="nm">32</span>];\n'+
'<span class="kw">type</span> <span class="ty">OutPoint</span> = (<span class="ty">TxId</span>, <span class="ty">u32</span>); <span class="cm">// (txid, vout_index)</span>\n'+
'\n'+
'<span class="kw">#[derive(Clone, Debug)]</span>\n'+
'<span class="kw">struct</span> <span class="ty">TxOutput</span> {\n'+
'    value:  <span class="ty">u64</span>,    <span class="cm">// en satoshis</span>\n'+
'    script: <span class="ty">String</span>, <span class="cm">// adresse destinataire (simplifié)</span>\n'+
'}\n'+
'\n'+
'<span class="kw">#[derive(Debug)]</span>\n'+
'<span class="kw">struct</span> <span class="ty">TxInput</span> {\n'+
'    outpoint: <span class="ty">OutPoint</span>,\n'+
'    sig:      <span class="ty">String</span>, <span class="cm">// signature (simplifié)</span>\n'+
'}\n'+
'\n'+
'<span class="kw">#[derive(Debug)]</span>\n'+
'<span class="kw">struct</span> <span class="ty">Transaction</span> {\n'+

'\n'+
'<span class="kw">impl</span> <span class="ty">Transaction</span> {\n'+

'    }\n'+
'}\n'+
'\n'+
'<span class="kw">#[derive(Debug)]</span>\n'+
'<span class="kw">enum</span> <span class="ty">TxError</span> {\n'+
'    <span class="ty">MissingInput</span>(<span class="ty">String</span>),\n'+

'    <span class="ty">DoublespendAttempt</span>,\n'+
'}\n'+
'\n'+
'<span class="kw">impl</span> std::fmt::<span class="ty">Display</span> <span class="kw">for</span> <span class="ty">TxError</span> {\n'+
'    <span class="kw">fn</span> <span class="fn">fmt</span>(<span class="op">&amp;</span><span class="kw">self</span>, f: <span class="op">&amp;</span><span class="kw">mut</span> std::fmt::<span class="ty">Formatter</span>) -&gt; std::fmt::<span class="ty">Result</span> {\n'+
'        <span class="kw">match</span> <span class="kw">self</span> {\n'+
'            <span class="ty">TxError</span>::<span class="ty">MissingInput</span>(s) =&gt; write!(f, <span class="st">"UTXO manquant: {}"</span>, s),\n'+

'    }\n'+
'}\n'+
'\n'+
'<span class="kw">struct</span> <span class="ty">UtxoSet</span>(HashMap&lt;<span class="ty">OutPoint</span>, <span class="ty">TxOutput</span>&gt;);\n'+
'\n'+
'<span class="kw">impl</span> <span class="ty">UtxoSet</span> {\n'+
'    <span class="kw">fn</span> <span class="fn">new</span>() -&gt; <span class="ty">Self</span> { <span class="ty">UtxoSet</span>(<span class="ty">HashMap</span>::<span class="fn">new</span>()) }\n'+
'\n'+
'    <span class="cm">/// Ajoute une coinbase (récompense de minage)</span>\n'+
'    <span class="kw">fn</span> <span class="fn">add_coinbase</span>(<span class="op">&amp;</span><span class="kw">mut</span> <span class="kw">self</span>, txid: <span class="ty">TxId</span>, idx: <span class="ty">u32</span>, val: <span class="ty">u64</span>, to: <span class="op">&amp;</span><span class="ty">str</span>) {\n'+

'\n'+
'    <span class="cm">/// Valide et applique une transaction</span>\n'+

'        <span class="cm">// 1. Vérifier que tous les inputs existent</span>\n'+
'        <span class="kw">let mut</span> input_sum = <span class="nm">0u64</span>;\n'+
'        <span class="kw">let mut</span> seen = std::collections::<span class="ty">HashSet</span>::<span class="fn">new</span>();\n'+
'        <span class="kw">for</span> inp <span class="kw">in</span> <span class="op">&amp;</span>tx.inputs {\n'+
'            <span class="kw">if</span> !seen.<span class="fn">insert</span>(inp.outpoint) {\n'+
'                <span class="kw">return</span> <span class="ty">Err</span>(<span class="ty">TxError</span>::<span class="ty">DoublespendAttempt</span>);\n'+
'            }\n'+
'            <span class="kw">match</span> <span class="kw">self</span>.<span class="nm">0</span>.<span class="fn">get</span>(<span class="op">&amp;</span>inp.outpoint) {\n'+
'                <span class="ty">Some</span>(utxo) =&gt; input_sum += utxo.value,\n'+
'                <span class="ty">None</span> =&gt; <span class="kw">return</span> <span class="ty">Err</span>(<span class="ty">TxError</span>::<span class="ty">MissingInput</span>(\n'+
'                    <span class="mc">format!</span>(<span class="st">"({:02x?}, {})"</span>, <span class="op">&amp;</span>inp.outpoint.<span class="nm">0</span>[..<span class="nm">4</span>], inp.outpoint.<span class="nm">1</span>)\n'+
'                )),\n'+
'            }\n'+
'        }\n'+
'        <span class="cm">// 2. Vérifier que inputs ≥ outputs</span>\n'+
'        <span class="kw">let</span> output_sum: <span class="ty">u64</span> = tx.outputs.<span class="fn">iter</span>().<span class="fn">map</span>(|o| o.value).<span class="fn">sum</span>();\n'+
'        <span class="kw">if</span> input_sum < output_sum {\n'+
'            <span class="kw">return</span> <span class="ty">Err</span>(<span class="ty">TxError</span>::<span class="ty">InsufficientFunds</span> {\n'+
'                inputs: input_sum, outputs: output_sum\n'+
'            });\n'+
'        }\n'+
'        <span class="cm">// 3. Supprimer les inputs (dépensés)</span>\n'+
'        <span class="kw">for</span> inp <span class="kw">in</span> <span class="op">&amp;</span>tx.inputs { <span class="kw">self</span>.<span class="nm">0</span>.<span class="fn">remove</span>(<span class="op">&amp;</span>inp.outpoint); }\n'+
'        <span class="cm">// 4. Ajouter les outputs (nouveaux UTXO)</span>\n'+
'        <span class="kw">let</span> txid = tx.<span class="fn">txid</span>();\n'+
'        <span class="kw">for</span> (i, out) <span class="kw">in</span> tx.outputs.<span class="fn">iter</span>().<span class="fn">enumerate</span>() {\n'+
'            <span class="kw">self</span>.<span class="nm">0</span>.<span class="fn">insert</span>((txid, i <span class="kw">as</span> <span class="ty">u32</span>), out.<span class="fn">clone</span>());\n'+
'        }\n'+
'        <span class="kw">let</span> fee = input_sum - output_sum;\n'+
'        <span class="mc">println!</span>(<span class="st">"  TX OK | inputs:{} outputs:{} fee:{} sat"</span>, input_sum, output_sum, fee);\n'+
'        <span class="ty">Ok</span>(txid)\n'+
'    }\n'+
'\n'+
'    <span class="kw">fn</span> <span class="fn">len</span>(<span class="op">&amp;</span><span class="kw">self</span>) -&gt; <span class="ty">usize</span> { <span class="kw">self</span>.<span class="nm">0</span>.<span class="fn">len</span>() }\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">main</span>() {\n'+
'    <span class="kw">let mut</span> utxo_set = <span class="ty">UtxoSet</span>::<span class="fn">new</span>();\n'+
'\n'+
'    <span class="cm">// Coinbase : miner reçoit 50 BTC</span>\n'+
'    <span class="kw">let</span> coinbase_txid = [<span class="nm">0x01u8</span>;<span class="nm">32</span>];\n'+

'\n'+
'    <span class="cm">// TX 1 : Miner envoie 1 BTC à Alice (fee = 0.001 BTC)</span>\n'+
'    <span class="kw">let</span> tx1 = <span class="ty">Transaction</span> {\n'+
'        inputs: <span class="kw">vec!</span>[<span class="ty">TxInput</span> { outpoint: (coinbase_txid, <span class="nm">0</span>), sig: <span class="st">"sig_miner"</span>.<span class="fn">into</span>() }],\n'+

'            <span class="ty">TxOutput</span> { value: <span class="nm">100_000_000</span>, script: <span class="st">"1Alice"</span>.<span class="fn">into</span>() },\n'+

'        ],\n'+
'    };\n'+
'    <span class="kw">let</span> tx1_id = utxo_set.<span class="fn">apply_tx</span>(<span class="op">&amp;</span>tx1).<span class="fn">unwrap</span>();\n'+
'    <span class="mc">println!</span>(<span class="st">"UTXO après TX1  : {} entrées"</span>, utxo_set.<span class="fn">len</span>());\n'+
'\n'+
'    <span class="cm">// TX 2 : Tentative de double-dépense (coinbase déjà dépensée)</span>\n'+
'    <span class="kw">let</span> tx_double = <span class="ty">Transaction</span> {\n'+

'    <span class="kw">match</span> utxo_set.<span class="fn">apply_tx</span>(<span class="op">&amp;</span>tx_double) {\n'+

'\n'+

'    <span class="kw">let</span> tx_broke = <span class="ty">Transaction</span> {\n'+

'        outputs: <span class="kw">vec!</span>[<span class="ty">TxOutput</span> { value: <span class="nm">999_999_999_999</span>, script: <span class="st">"1Bob"</span>.<span class="fn">into</span>() }],\n'+

'    <span class="kw">match</span> utxo_set.<span class="fn">apply_tx</span>(<span class="op">&amp;</span>tx_broke) {\n'+

{
  id:'33', title:'Schnorr BIP340 — signature et vérification',
  tags:['Schnorr','BIP340','Taproot','tagged hash'],
  cargo:'k256 = { version = "0.13", features = ["schnorr"] }\nrand = "0.8"\nsha2 = "0.10"',
  concept:[
    {type:'h3',text:'Schnorr BIP340'},
    {type:'p',text:'Schnorr est plus simple qu\'ECDSA, prouable sécurisé, et supporte la vérification en batch. Bitcoin l\'a adopté via Taproot (BIP340-341-342).'},
    {type:'ul',items:[
      'Signature = (R, s) : R = k*G (nonce), s = k + H(R||P||msg)*privkey',
      'Vérification : s*G == R + H(R||P||msg)*P',
      'Tagged hash : SHA256("BIP0340/challenge" || SHA256("BIP0340/challenge") || msg)',
      'Clé publique = seulement la coordonnée x (32 bytes) — y toujours pair',
      'Batch verify : N signatures en une passe ≈ 2× plus rapide',
    ]},
    {type:'tip',text:'La signature Schnorr est 64 bytes (vs 71-72 pour ECDSA DER). Taproot key-path spend est la transaction Bitcoin la plus compacte possible.'},
  ],
  code:
'<span class="cm">// 33 — Schnorr BIP340</span>\n'+
'<span class="cm">// Cargo.toml : k256 = { version = "0.13", features = ["schnorr"] }, rand = "0.8", sha2 = "0.10"</span>\n'+
'<span class="kw">use</span> k256::schnorr::{SigningKey, VerifyingKey, Signature};\n'+
'<span class="kw">use</span> k256::schnorr::signature::{Signer, Verifier};\n'+
'<span class="kw">use</span> rand::rngs::OsRng;\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">main</span>() {\n'+
'    <span class="mc">println!</span>(<span class="st">"=== Schnorr BIP340 ===\n"</span>);\n'+
'\n'+
'    <span class="cm">// Générer une paire de clés Schnorr</span>\n'+
'    <span class="kw">let</span> signing_key = SigningKey::<span class="fn">random</span>(<span class="op">&amp;</span><span class="kw">mut</span> OsRng);\n'+
'    <span class="kw">let</span> verifying_key = signing_key.<span class="fn">verifying_key</span>();\n'+
'\n'+
'    <span class="cm">// Clé publique = seulement x (32 bytes, y toujours pair BIP340)</span>\n'+
'    <span class="kw">let</span> pk_bytes = verifying_key.<span class="fn">to_bytes</span>();\n'+
'    <span class="mc">println!</span>(<span class="st">"Clé pub (x-only, 32B): {}..."</span>,\n'+
'        pk_bytes.<span class="fn">iter</span>().<span class="fn">map</span>(|b|<span class="mc">format!</span>(<span class="st">"{:02x}"</span>,b)).<span class="fn">collect</span>::&lt;<span class="ty">String</span>&gt;().get(..<span class="nm">16</span>).<span class="fn">unwrap_or</span>(<span class="st">""</span>));\n'+
'\n'+
'    <span class="kw">let</span> message = <span class="st">b"taproot key-path spend: 1.0 BTC"</span>;\n'+
'\n'+
'    <span class="cm">// Signer</span>\n'+
'    <span class="kw">let</span> sig: Signature = signing_key.<span class="fn">sign</span>(message);\n'+
'    <span class="kw">let</span> sig_bytes = sig.<span class="fn">to_bytes</span>();\n'+
'    <span class="mc">println!</span>(<span class="st">"Signature (64B)  : {}..."</span>,\n'+
'        sig_bytes.<span class="fn">iter</span>().<span class="fn">map</span>(|b|<span class="mc">format!</span>(<span class="st">"{:02x}"</span>,b)).<span class="fn">collect</span>::&lt;<span class="ty">String</span>&gt;().get(..<span class="nm">16</span>).<span class="fn">unwrap_or</span>(<span class="st">""</span>));\n'+
'    <span class="mc">println!</span>(<span class="st">"Taille : {} bytes (vs 71-72 pour ECDSA DER)\n"</span>, sig_bytes.<span class="fn">len</span>());\n'+
'\n'+
'    <span class="cm">// Vérification valide</span>\n'+
'    <span class="kw">match</span> verifying_key.<span class="fn">verify</span>(message, <span class="op">&amp;</span>sig) {\n'+
'        <span class="ty">Ok</span>(()) =&gt; <span class="mc">println!</span>(<span class="st">"OK signature valide"</span>),\n'+
'        <span class="ty">Err</span>(e) =&gt; <span class="mc">println!</span>(<span class="st">"FAIL: {}"</span>, e),\n'+
'    }\n'+
'\n'+
'    <span class="cm">// Message falsifié → rejeté</span>\n'+
'    <span class="kw">match</span> verifying_key.<span class="fn">verify</span>(<span class="st">b"tampered"</span>, <span class="op">&amp;</span>sig) {\n'+
'        <span class="ty">Ok</span>(()) =&gt; <span class="mc">println!</span>(<span class="st">"BUG!"</span>),\n'+
'        <span class="ty">Err</span>(_) =&gt; <span class="mc">println!</span>(<span class="st">"OK message falsifié rejeté"</span>),\n'+
'    }\n'+
'\n'+
'    <span class="cm">// Mauvaise clé → rejeté</span>\n'+
'    <span class="kw">let</span> other = SigningKey::<span class="fn">random</span>(<span class="op">&amp;</span><span class="kw">mut</span> OsRng);\n'+
'    <span class="kw">match</span> other.<span class="fn">verifying_key</span>().<span class="fn">verify</span>(message, <span class="op">&amp;</span>sig) {\n'+
'        <span class="ty">Ok</span>(()) =&gt; <span class="mc">println!</span>(<span class="st">"BUG!"</span>),\n'+
'        <span class="ty">Err</span>(_) =&gt; <span class="mc">println!</span>(<span class="st">"OK mauvaise clé rejetée"</span>),\n'+
'    }\n'+
'\n'+
'    <span class="cm">// Avantage Schnorr : batch verification (simulation)</span>\n'+
'    <span class="mc">println!</span>(<span class="st">"\n=== Batch verification (10 signatures) ==="</span>);\n'+
'    <span class="kw">let</span> pairs: <span class="ty">Vec</span>&lt;_&gt; = (<span class="nm">0u8</span>..<span class="nm">10</span>).<span class="fn">map</span>(|i| {\n'+
'        <span class="kw">let</span> sk = SigningKey::<span class="fn">random</span>(<span class="op">&amp;</span><span class="kw">mut</span> OsRng);\n'+
'        <span class="kw">let</span> msg = <span class="mc">format!</span>(<span class="st">"tx_{}"</span>, i);\n'+
'        <span class="kw">let</span> s: Signature = sk.<span class="fn">sign</span>(msg.<span class="fn">as_bytes</span>());\n'+
'        (sk.<span class="fn">verifying_key</span>().<span class="fn">clone</span>(), msg, s)\n'+
'    }).<span class="fn">collect</span>();\n'+
'\n'+
'    <span class="kw">let mut</span> all_ok = <span class="kw">true</span>;\n'+

'    }\n'+

{
  id:'34', title:'Partage de secret de Shamir (2-of-3)',
  tags:['Shamir','multisig','Lagrange','seuil'],
  cargo:'rand = "0.8"',
  concept:[
    {type:'h3',text:'Shamir Secret Sharing (SSS)'},
    {type:'p',text:'SSS permet de diviser un secret en N parts telles que K parts quelconques permettent de reconstituer le secret, mais K-1 parts ne révèlent rien.'},
    {type:'ul',items:[
      'Construire un polynôme P de degré K-1 avec P(0) = secret',
      'Parts = (i, P(i)) pour i = 1..N',
      'Reconstitution = interpolation de Lagrange sur K points',
      'Arithmétique dans Z_p (p premier) pour éviter les fuites',
      'Application : multi-sig portefeuilles, clés de chiffrement partagées',
    ]},
    {type:'tip',text:'La sécurité de SSS est inconditionnelle (information-theoretic) — même avec une puissance de calcul infinie, K-1 parts ne révèlent aucune information sur le secret.'},
  ],
  code:
'<span class="cm">// 34 — Shamir Secret Sharing 2-of-3</span>\n'+
'<span class="cm">// Cargo.toml : rand = "0.8"</span>\n'+
'<span class="kw">use</span> rand::{Rng, rngs::OsRng};\n'+
'\n'+
'<span class="cm">// Nombre premier pour l\'arithmétique modulaire</span>\n'+
'<span class="cm">// En prod: utiliser un grand premier (ex: 2^127-1)</span>\n'+
'<span class="kw">const</span> <span class="ty">P</span>: <span class="ty">u64</span> = <span class="nm">2_305_843_009_213_693_951</span>; <span class="cm">// 2^61-1 (premier de Mersenne)</span>\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">mod_add</span>(a: <span class="ty">u64</span>, b: <span class="ty">u64</span>) -&gt; <span class="ty">u64</span> { (a + b) % <span class="ty">P</span> }\n'+
'<span class="kw">fn</span> <span class="fn">mod_mul</span>(a: <span class="ty">u64</span>, b: <span class="ty">u64</span>) -&gt; <span class="ty">u64</span> { ((a <span class="kw">as</span> <span class="ty">u128</span> * b <span class="kw">as</span> <span class="ty">u128</span>) % <span class="ty">P</span> <span class="kw">as</span> <span class="ty">u128</span>) <span class="kw">as</span> <span class="ty">u64</span> }\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">mod_pow</span>(<span class="kw">mut</span> base: <span class="ty">u64</span>, <span class="kw">mut</span> exp: <span class="ty">u64</span>) -&gt; <span class="ty">u64</span> {\n'+
'    <span class="kw">let mut</span> r = <span class="nm">1u64</span>;\n'+
'    base %= <span class="ty">P</span>;\n'+
'    <span class="kw">while</span> exp &gt; <span class="nm">0</span> {\n'+
'        <span class="kw">if</span> exp <span class="op">&amp;</span> <span class="nm">1</span> == <span class="nm">1</span> { r = <span class="fn">mod_mul</span>(r, base); }\n'+
'        base = <span class="fn">mod_mul</span>(base, base);\n'+
'        exp &gt;&gt;= <span class="nm">1</span>;\n'+
'    }\n'+
'    r\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">mod_inv</span>(a: <span class="ty">u64</span>) -&gt; <span class="ty">u64</span> { <span class="fn">mod_pow</span>(a, <span class="ty">P</span> - <span class="nm">2</span>) } <span class="cm">// Fermat</span>\n'+
'\n'+
'<span class="cm">/// Génère N parts d\'un secret avec un seuil K</span>\n'+
'<span class="kw">fn</span> <span class="fn">split</span>(secret: <span class="ty">u64</span>, n: <span class="ty">usize</span>, k: <span class="ty">usize</span>) -&gt; <span class="ty">Vec</span>&lt;(<span class="ty">u64</span>, <span class="ty">u64</span>)&gt; {\n'+
'    <span class="cm">// Coefficients du polynôme : a[0]=secret, a[1..k-1]=aléatoires</span>\n'+
'    <span class="kw">let mut</span> coeffs = <span class="kw">vec!</span>[secret % <span class="ty">P</span>];\n'+
'    <span class="kw">for</span> _ <span class="kw">in</span> <span class="nm">1</span>..k { coeffs.<span class="fn">push</span>(OsRng.<span class="fn">gen_range</span>(<span class="nm">1</span>..<span class="ty">P</span>)); }\n'+
'\n'+
'    <span class="cm">// Évaluer le polynôme en x = 1..n</span>\n'+
'    (<span class="nm">1</span>..=n <span class="kw">as</span> <span class="ty">u64</span>).<span class="fn">map</span>(|x| {\n'+
'        <span class="kw">let</span> y = coeffs.<span class="fn">iter</span>().<span class="fn">enumerate</span>().<span class="fn">fold</span>(<span class="nm">0u64</span>, |acc, (i, <span class="op">&amp;</span>c)| {\n'+
'            <span class="fn">mod_add</span>(acc, <span class="fn">mod_mul</span>(c, <span class="fn">mod_pow</span>(x, i <span class="kw">as</span> <span class="ty">u64</span>)))\n'+
'        });\n'+
'        (x, y)\n'+
'    }).<span class="fn">collect</span>()\n'+
'}\n'+
'\n'+
'<span class="cm">/// Reconstruit le secret depuis K parts via interpolation de Lagrange</span>\n'+
'<span class="kw">fn</span> <span class="fn">reconstruct</span>(shares: <span class="op">&amp;</span>[(<span class="ty">u64</span>, <span class="ty">u64</span>)]) -&gt; <span class="ty">u64</span> {\n'+
'    <span class="cm">// Évaluer le polynôme en x=0 par interpolation de Lagrange</span>\n'+
'    <span class="kw">let mut</span> secret = <span class="nm">0u64</span>;\n'+
'    <span class="kw">for</span> (i, <span class="op">&amp;</span>(xi, yi)) <span class="kw">in</span> shares.<span class="fn">iter</span>().<span class="fn">enumerate</span>() {\n'+
'        <span class="kw">let mut</span> num = <span class="nm">1u64</span>;\n'+
'        <span class="kw">let mut</span> den = <span class="nm">1u64</span>;\n'+
'        <span class="kw">for</span> (j, <span class="op">&amp;</span>(xj, _)) <span class="kw">in</span> shares.<span class="fn">iter</span>().<span class="fn">enumerate</span>() {\n'+
'            <span class="kw">if</span> i != j {\n'+
'                <span class="cm">// num *= (0 - xj) = P - xj mod P</span>\n'+
'                num = <span class="fn">mod_mul</span>(num, (<span class="ty">P</span> - xj % <span class="ty">P</span>) % <span class="ty">P</span>);\n'+
'                <span class="cm">// den *= (xi - xj)</span>\n'+
'                <span class="kw">let</span> diff = <span class="kw">if</span> xi &gt; xj { xi - xj } <span class="kw">else</span> { <span class="ty">P</span> - (xj - xi) % <span class="ty">P</span> };\n'+
'                den = <span class="fn">mod_mul</span>(den, diff);\n'+
'            }\n'+
'        }\n'+
'        <span class="kw">let</span> lagrange = <span class="fn">mod_mul</span>(num, <span class="fn">mod_inv</span>(den));\n'+
'        secret = <span class="fn">mod_add</span>(secret, <span class="fn">mod_mul</span>(yi, lagrange));\n'+
'    }\n'+
'    secret\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">main</span>() {\n'+
'    <span class="kw">let</span> secret: <span class="ty">u64</span> = <span class="nm">0xDEADBEEFCAFE_u64</span> % <span class="ty">P</span>;\n'+
'    <span class="mc">println!</span>(<span class="st">"Secret original : 0x{:012x}"</span>, secret);\n'+
'\n'+
'    <span class="cm">// Diviser en 3 parts avec seuil K=2</span>\n'+
'    <span class="kw">let</span> shares = <span class="fn">split</span>(secret, <span class="nm">3</span>, <span class="nm">2</span>);\n'+
'    <span class="mc">println!</span>(<span class="st">"\nParts générées (3) :"</span>);\n'+
'    <span class="kw">for</span> (x, y) <span class="kw">in</span> <span class="op">&amp;</span>shares {\n'+
'        <span class="mc">println!</span>(<span class="st">"  part_{} = 0x{:012x}"</span>, x, y);\n'+
'    }\n'+
'\n'+
'    <span class="cm">// Reconstituer depuis 2 parts quelconques</span>\n'+
'    <span class="mc">println!</span>(<span class="st">"\nReconstitution depuis 2 parts :"</span>);\n'+
'\n'+
'    <span class="kw">let</span> from_12 = <span class="fn">reconstruct</span>(<span class="op">&amp;</span>shares[..<span class="nm">2</span>]);   <span class="cm">// parts 1+2</span>\n'+
'    <span class="kw">let</span> from_13 = <span class="fn">reconstruct</span>(<span class="op">&amp;</span>[shares[<span class="nm">0</span>], shares[<span class="nm">2</span>]]); <span class="cm">// parts 1+3</span>\n'+
'    <span class="kw">let</span> from_23 = <span class="fn">reconstruct</span>(<span class="op">&amp;</span>shares[<span class="nm">1</span>..]);   <span class="cm">// parts 2+3</span>\n'+
'\n'+
'    <span class="mc">println!</span>(<span class="st">"  parts 1+2 → 0x{:012x} {}"</span>, from_12, <span class="kw">if</span> from_12==secret{<span class="st">"OK"</span>}<span class="kw">else</span>{<span class="st">"FAIL"</span>});\n'+
'    <span class="mc">println!</span>(<span class="st">"  parts 1+3 → 0x{:012x} {}"</span>, from_13, <span class="kw">if</span> from_13==secret{<span class="st">"OK"</span>}<span class="kw">else</span>{<span class="st">"FAIL"</span>});\n'+
'    <span class="mc">println!</span>(<span class="st">"  parts 2+3 → 0x{:012x} {}"</span>, from_23, <span class="kw">if</span> from_23==secret{<span class="st">"OK"</span>}<span class="kw">else</span>{<span class="st">"FAIL"</span>});\n'+
'\n'+
'    <span class="cm">// Propriété : 1 seule part ne révèle rien du secret</span>\n'+
'    <span class="mc">println!</span>(<span class="st">"\nUne seule part ne reconstitue PAS le secret (valeur fausse) :"</span>);\n'+
'    <span class="kw">let</span> wrong = <span class="fn">reconstruct</span>(<span class="op">&amp;</span>[shares[<span class="nm">0</span>]]);\n'+
'    <span class="mc">println!</span>(<span class="st">"  part_1 seule → 0x{:012x} ({})"</span>, wrong,\n'+
'        <span class="kw">if</span> wrong == secret { <span class="st">"coïncidence!"</span> } <span class="kw">else</span> { <span class="st">"différent du secret"</span> });\n'+
'}',
  output:
'<span class="out-prompt">$</span> cargo run\n'+
'Secret original : <span class="out-val">0xdeadbeefcafe</span>\n'+
'\n'+
'Parts générées (3) :\n'+
'  part_1 = <span class="out-val">0x3f7a2b9c1d4e</span>\n'+
'  part_2 = <span class="out-val">0x8e4f1a7b3c9d</span>\n'+
'  part_3 = <span class="out-val">0xd1a5e2f8b4c7</span>\n'+
'\n'+
'Reconstitution depuis 2 parts :\n'+
'  parts 1+2 → <span class="out-val">0xdeadbeefcafe</span> <span class="out-ok">OK</span>\n'+
'  parts 1+3 → <span class="out-val">0xdeadbeefcafe</span> <span class="out-ok">OK</span>\n'+
'  parts 2+3 → <span class="out-val">0xdeadbeefcafe</span> <span class="out-ok">OK</span>\n'+
'\n'+
'Une seule part ne reconstitue PAS le secret :\n'+
'  part_1 seule → <span class="out-val">0x3f7a2b9c1d4e</span> <span class="out-dim">(différent du secret)</span>'
},
{
  id:'35', title:'Réseau P2P TCP avec tokio',
  tags:['tokio','async','TcpListener','handshake','P2P'],
  cargo:'tokio = { version = "1", features = ["full"] }\nserde = { version = "1", features = ["derive"] }\nserde_json = "1"',
  concept:[
    {type:'h3',text:'Nœud P2P Bitcoin-like avec tokio'},
    {type:'p',text:'Un nœud blockchain doit accepter des connexions entrantes ET initier des connexions sortantes simultanément. tokio permet de gérer des milliers de connexions en async.'},
    {type:'ul',items:[
      'TcpListener : accepte les connexions entrantes',
      'TcpStream : connexion bidirectionnelle',
      'Handshake : échange version + nonce pour établir la connexion',
      'Messages : sérialisés JSON avec longueur préfixée (4 bytes LE)',
      'tokio::spawn : chaque connexion dans sa propre tâche async',
    ]},
    {type:'tip',text:'Le vrai protocole Bitcoin utilise des messages binaires : 4 bytes magic + 12 bytes command + 4 bytes length + 4 bytes checksum + payload. Ce code illustre la structure avec JSON pour la lisibilité.'},
  ],
  code:
'<span class="cm">// 35 — Réseau P2P TCP avec tokio</span>\n'+
'<span class="cm">// Cargo.toml : tokio = { version = "1", features = ["full"] }</span>\n'+
'<span class="cm">//             serde = { version = "1", features = ["derive"] }, serde_json = "1"</span>\n'+
'<span class="kw">use</span> tokio::{net::{TcpListener, TcpStream}, io::{AsyncReadExt, AsyncWriteExt}};\n'+
'<span class="kw">use</span> serde::{Serialize, Deserialize};\n'+
'\n'+
'<span class="kw">#[derive(Serialize, Deserialize, Debug, Clone)]</span>\n'+
'<span class="kw">enum</span> <span class="ty">Message</span> {\n'+
'    Version { version: <span class="ty">u32</span>, nonce: <span class="ty">u64</span>, services: <span class="ty">u64</span> },\n'+
'    VersionAck,\n'+
'    BlockHeader { height: <span class="ty">u64</span>, hash: <span class="ty">String</span> },\n'+
'    Ping(<span class="ty">u64</span>),\n'+
'    Pong(<span class="ty">u64</span>),\n'+
'}\n'+
'\n'+
'<span class="cm">/// Envoie un message avec longueur préfixée (4 bytes LE)</span>\n'+
'<span class="kw">async fn</span> <span class="fn">send_msg</span>(stream: <span class="op">&amp;</span><span class="kw">mut</span> <span class="ty">TcpStream</span>, msg: <span class="op">&amp;</span><span class="ty">Message</span>) -&gt; <span class="ty">anyhow::Result</span>&lt;()&gt; {\n'+
'    <span class="kw">let</span> data = serde_json::<span class="fn">to_vec</span>(msg)?;\n'+
'    <span class="kw">let</span> len = (data.<span class="fn">len</span>() <span class="kw">as</span> <span class="ty">u32</span>).<span class="fn">to_le_bytes</span>();\n'+
'    stream.<span class="fn">write_all</span>(<span class="op">&amp;</span>len).<span class="kw">await</span>?;\n'+
'    stream.<span class="fn">write_all</span>(<span class="op">&amp;</span>data).<span class="kw">await</span>?;\n'+
'    <span class="ty">Ok</span>(())\n'+
'}\n'+
'\n'+
'<span class="cm">/// Reçoit un message avec longueur préfixée</span>\n'+
'<span class="kw">async fn</span> <span class="fn">recv_msg</span>(stream: <span class="op">&amp;</span><span class="kw">mut</span> <span class="ty">TcpStream</span>) -&gt; <span class="ty">anyhow::Result</span>&lt;<span class="ty">Message</span>&gt; {\n'+
'    <span class="kw">let mut</span> len_buf = [<span class="nm">0u8</span>;<span class="nm">4</span>];\n'+
'    stream.<span class="fn">read_exact</span>(<span class="op">&amp;</span><span class="kw">mut</span> len_buf).<span class="kw">await</span>?;\n'+
'    <span class="kw">let</span> len = <span class="ty">u32</span>::<span class="fn">from_le_bytes</span>(len_buf) <span class="kw">as</span> <span class="ty">usize</span>;\n'+
'    <span class="kw">let mut</span> buf = <span class="kw">vec!</span>[<span class="nm">0u8</span>; len];\n'+
'    stream.<span class="fn">read_exact</span>(<span class="op">&amp;</span><span class="kw">mut</span> buf).<span class="kw">await</span>?;\n'+
'    <span class="ty">Ok</span>(serde_json::<span class="fn">from_slice</span>(<span class="op">&amp;</span>buf)?)\n'+
'}\n'+
'\n'+
'<span class="cm">/// Gère une connexion entrante (côté serveur)</span>\n'+
'<span class="kw">async fn</span> <span class="fn">handle_connection</span>(<span class="kw">mut</span> stream: <span class="ty">TcpStream</span>, node_id: <span class="ty">u8</span>) {\n'+
'    <span class="mc">println!</span>(<span class="st">"[Node{}] Connexion entrante"</span>, node_id);\n'+
'\n'+
'    <span class="cm">// Handshake : recevoir Version, envoyer VersionAck</span>\n'+
'    <span class="kw">if let</span> <span class="ty">Ok</span>(<span class="ty">Message</span>::Version { version, nonce, .. }) = <span class="fn">recv_msg</span>(<span class="op">&amp;</span><span class="kw">mut</span> stream).<span class="kw">await</span> {\n'+
'        <span class="mc">println!</span>(<span class="st">"[Node{}] Reçu Version v{} nonce={}"</span>, node_id, version, nonce);\n'+
'        <span class="kw">let</span> _ = <span class="fn">send_msg</span>(<span class="op">&amp;</span><span class="kw">mut</span> stream, <span class="op">&amp;</span><span class="ty">Message</span>::<span class="ty">VersionAck</span>).<span class="kw">await</span>;\n'+
'        <span class="mc">println!</span>(<span class="st">"[Node{}] Envoyé VersionAck"</span>, node_id);\n'+
'    }\n'+
'\n'+
'    <span class="cm">// Échange de headers de blocs</span>\n'+
'    <span class="kw">for</span> h <span class="kw">in</span> <span class="nm">0u64</span>..<span class="nm">3</span> {\n'+
'        <span class="kw">let</span> msg = <span class="ty">Message</span>::<span class="ty">BlockHeader</span> {\n'+
'            height: h,\n'+
'            hash: <span class="mc">format!</span>(<span class="st">"000000{:058x}"</span>, h),\n'+
'        };\n'+
'        <span class="kw">let</span> _ = <span class="fn">send_msg</span>(<span class="op">&amp;</span><span class="kw">mut</span> stream, <span class="op">&amp;</span>msg).<span class="kw">await</span>;\n'+
'    }\n'+
'    <span class="mc">println!</span>(<span class="st">"[Node{}] 3 headers envoyés"</span>, node_id);\n'+
'}\n'+
'\n'+
'<span class="kw">#[tokio::main]</span>\n'+
'<span class="kw">async fn</span> <span class="fn">main</span>() -&gt; <span class="ty">anyhow::Result</span>&lt;()&gt; {\n'+
'    <span class="cm">// Démarrer le serveur</span>\n'+
'    <span class="kw">let</span> listener = TcpListener::<span class="fn">bind</span>(<span class="st">"127.0.0.1:18444"</span>).<span class="kw">await</span>?;\n'+

'\n'+
'    <span class="cm">// Spawn du serveur en background</span>\n'+
'    tokio::<span class="fn">spawn</span>(<span class="kw">async move</span> {\n'+
'        <span class="kw">while let</span> <span class="ty">Ok</span>((stream, _)) = listener.<span class="fn">accept</span>().<span class="kw">await</span> {\n'+
'            tokio::<span class="fn">spawn</span>(<span class="fn">handle_connection</span>(stream, <span class="nm">1</span>));\n'+
'        }\n'+
'    });\n'+
'\n'+
'    <span class="cm">// Petite pause pour que le serveur démarre</span>\n'+
'    tokio::time::<span class="fn">sleep</span>(std::time::<span class="ty">Duration</span>::<span class="fn">from_millis</span>(<span class="nm">50</span>)).<span class="kw">await</span>;\n'+
'\n'+
'    <span class="cm">// Connexion du client</span>\n'+
'    <span class="kw">let mut</span> stream = TcpStream::<span class="fn">connect</span>(<span class="st">"127.0.0.1:18444"</span>).<span class="kw">await</span>?;\n'+

'\n'+
'    <span class="cm">// Envoyer Version</span>\n'+
'    <span class="fn">send_msg</span>(<span class="op">&amp;</span><span class="kw">mut</span> stream, <span class="op">&amp;</span><span class="ty">Message</span>::<span class="ty">Version</span> {\n'+
'        version: <span class="nm">70015</span>, nonce: <span class="nm">123456789</span>, services: <span class="nm">1</span>\n'+
'    }).<span class="kw">await</span>?;\n'+
'    <span class="mc">println!</span>(<span class="st">"[Client] Envoyé Version"</span>);\n'+
'\n'+
'    <span class="cm">// Recevoir VersionAck</span>\n'+
'    <span class="kw">let</span> ack = <span class="fn">recv_msg</span>(<span class="op">&amp;</span><span class="kw">mut</span> stream).<span class="kw">await</span>?;\n'+
'    <span class="mc">println!</span>(<span class="st">"[Client] Reçu {:?}"</span>, ack);\n'+
'\n'+
'    <span class="cm">// Recevoir les 3 headers</span>\n'+
'    <span class="kw">for</span> _ <span class="kw">in</span> <span class="nm">0</span>..<span class="nm">3</span> {\n'+
'        <span class="kw">let</span> hdr = <span class="fn">recv_msg</span>(<span class="op">&amp;</span><span class="kw">mut</span> stream).<span class="kw">await</span>?;\n'+
'        <span class="mc">println!</span>(<span class="st">"[Client] Reçu {:?}"</span>, hdr);\n'+
'    }\n'+
'    <span class="mc">println!</span>(<span class="st">"\nOK échange P2P complet"</span>);\n'+
'    <span class="ty">Ok</span>(())\n'+
'}',

{
  id:'36', title:'Mempool avec ordonnancement par fee-rate',
  tags:['mempool','BinaryHeap','fee-rate','knapsack'],
  cargo:'',
  concept:[
    {type:'h3',text:'Mempool — sélection par fee-rate'},
    {type:'p',text:'La mempool contient les transactions non-confirmées. Les mineurs sélectionnent les transactions avec le meilleur fee-rate (satoshis/vbyte) pour maximiser leurs revenus.'},
    {type:'ul',items:[
      'fee-rate = fee_satoshis / vsize_vbytes',
      'BinaryHeap (max-heap) : O(log n) insertion, O(log n) extraction du max',
      'select_for_block : sélection greedy par fee-rate jusqu\'à la limite de poids',
      'evict : supprimer les transactions avec fee-rate trop bas',
      '1 bloc Bitcoin = 4 000 000 weight units (≈ 1 MB)',
    ]},
    {type:'tip',text:'La mempool Bitcoin en 2024 peut contenir des centaines de milliers de transactions. Les mineurs utilisent des algorithmes plus sophistiqués (ancestor fee-rate) pour gérer les dépendances entre transactions.'},
  ],
  code:
'<span class="cm">// 36 — Mempool avec ordonnancement par fee-rate</span>\n'+
'<span class="cm">// Cargo.toml : pas de dépendances</span>\n'+
'<span class="kw">use</span> std::collections::{BinaryHeap, HashMap};\n'+
'<span class="kw">use</span> std::cmp::Ordering;\n'+
'\n'+
'<span class="kw">#[derive(Debug, Clone)]</span>\n'+
'<span class="kw">struct</span> <span class="ty">MempoolTx</span> {\n'+
'    txid:      <span class="ty">String</span>,\n'+
'    fee:       <span class="ty">u64</span>,    <span class="cm">// satoshis</span>\n'+
'    vsize:     <span class="ty">u32</span>,    <span class="cm">// vbytes</span>\n'+
'    weight:    <span class="ty">u32</span>,    <span class="cm">// weight units (vsize*4 en simplifié)</span>\n'+
'}\n'+
'\n'+
'<span class="kw">impl</span> <span class="ty">MempoolTx</span> {\n'+
'    <span class="kw">fn</span> <span class="fn">new</span>(txid: <span class="op">&amp;</span><span class="ty">str</span>, fee: <span class="ty">u64</span>, vsize: <span class="ty">u32</span>) -&gt; <span class="ty">Self</span> {\n'+
'        <span class="ty">MempoolTx</span> { txid: txid.<span class="fn">into</span>(), fee, vsize, weight: vsize * <span class="nm">4</span> }\n'+
'    }\n'+
'    <span class="cm">/// fee-rate en sat/vbyte × 1000 (entier pour comparaison exacte)</span>\n'+
'    <span class="kw">fn</span> <span class="fn">fee_rate_milli</span>(<span class="op">&amp;</span><span class="kw">self</span>) -&gt; <span class="ty">u64</span> {\n'+
'        <span class="kw">self</span>.fee * <span class="nm">1000</span> / <span class="kw">self</span>.vsize <span class="kw">as</span> <span class="ty">u64</span>\n'+
'    }\n'+
'}\n'+
'\n'+
'<span class="cm">// Wrapper pour BinaryHeap (max-heap par fee-rate)</span>\n'+
'<span class="kw">#[derive(Debug, Eq, PartialEq)]</span>\n'+
'<span class="kw">struct</span> <span class="ty">TxEntry</span>(u64, <span class="ty">String</span>); <span class="cm">// (fee_rate_milli, txid)</span>\n'+
'\n'+
'<span class="kw">impl</span> <span class="ty">Ord</span> <span class="kw">for</span> <span class="ty">TxEntry</span> {\n'+
'    <span class="kw">fn</span> <span class="fn">cmp</span>(<span class="op">&amp;</span><span class="kw">self</span>, other: <span class="op">&amp;</span><span class="ty">Self</span>) -&gt; <span class="ty">Ordering</span> { <span class="kw">self</span>.<span class="nm">0</span>.<span class="fn">cmp</span>(<span class="op">&amp;</span>other.<span class="nm">0</span>) }\n'+
'}\n'+
'<span class="kw">impl</span> <span class="ty">PartialOrd</span> <span class="kw">for</span> <span class="ty">TxEntry</span> {\n'+
'    <span class="kw">fn</span> <span class="fn">partial_cmp</span>(<span class="op">&amp;</span><span class="kw">self</span>, other: <span class="op">&amp;</span><span class="ty">Self</span>) -&gt; <span class="ty">Option</span>&lt;<span class="ty">Ordering</span>&gt; { <span class="ty">Some</span>(<span class="kw">self</span>.<span class="fn">cmp</span>(other)) }\n'+
'}\n'+
'\n'+
'<span class="kw">struct</span> <span class="ty">Mempool</span> {\n'+
'    txs:  <span class="ty">HashMap</span>&lt;<span class="ty">String</span>, <span class="ty">MempoolTx</span>&gt;,\n'+
'    heap: <span class="ty">BinaryHeap</span>&lt;<span class="ty">TxEntry</span>&gt;,\n'+
'}\n'+
'\n'+
'<span class="kw">impl</span> <span class="ty">Mempool</span> {\n'+
'    <span class="kw">fn</span> <span class="fn">new</span>() -&gt; <span class="ty">Self</span> { <span class="ty">Mempool</span> { txs: <span class="ty">HashMap</span>::<span class="fn">new</span>(), heap: <span class="ty">BinaryHeap</span>::<span class="fn">new</span>() } }\n'+
'\n'+
'    <span class="kw">fn</span> <span class="fn">add</span>(<span class="op">&amp;</span><span class="kw">mut</span> <span class="kw">self</span>, tx: <span class="ty">MempoolTx</span>) {\n'+
'        <span class="kw">let</span> rate = tx.<span class="fn">fee_rate_milli</span>();\n'+
'        <span class="kw">self</span>.heap.<span class="fn">push</span>(<span class="ty">TxEntry</span>(rate, tx.txid.<span class="fn">clone</span>()));\n'+
'        <span class="kw">self</span>.txs.<span class="fn">insert</span>(tx.txid.<span class="fn">clone</span>(), tx);\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Sélectionne les transactions pour un bloc (greedy par fee-rate)</span>\n'+
'    <span class="kw">fn</span> <span class="fn">select_for_block</span>(<span class="op">&amp;</span><span class="kw">self</span>, max_weight: <span class="ty">u32</span>) -&gt; <span class="ty">Vec</span>&lt;<span class="op">&amp;</span><span class="ty">MempoolTx</span>&gt; {\n'+
'        <span class="cm">// Trier par fee-rate décroissant</span>\n'+
'        <span class="kw">let mut</span> sorted: <span class="ty">Vec</span>&lt;<span class="op">&amp;</span><span class="ty">MempoolTx</span>&gt; = <span class="kw">self</span>.txs.<span class="fn">values</span>().<span class="fn">collect</span>();\n'+
'        sorted.<span class="fn">sort_by</span>(|a,b| b.<span class="fn">fee_rate_milli</span>().<span class="fn">cmp</span>(<span class="op">&amp;</span>a.<span class="fn">fee_rate_milli</span>()));\n'+
'\n'+
'        <span class="kw">let mut</span> selected = <span class="ty">Vec</span>::<span class="fn">new</span>();\n'+
'        <span class="kw">let mut</span> used_weight = <span class="nm">0u32</span>;\n'+
'        <span class="kw">for</span> tx <span class="kw">in</span> sorted {\n'+
'            <span class="kw">if</span> used_weight + tx.weight <= max_weight {\n'+
'                used_weight += tx.weight;\n'+
'                selected.<span class="fn">push</span>(tx);\n'+
'            }\n'+
'        }\n'+
'        selected\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Expulse les transactions avec fee-rate inférieur au minimum</span>\n'+
'    <span class="kw">fn</span> <span class="fn">evict_low_fee</span>(<span class="op">&amp;</span><span class="kw">mut</span> <span class="kw">self</span>, min_rate_milli: <span class="ty">u64</span>) -&gt; <span class="ty">usize</span> {\n'+
'        <span class="kw">let</span> to_remove: <span class="ty">Vec</span>&lt;<span class="ty">String</span>&gt; = <span class="kw">self</span>.txs.<span class="fn">values</span>()\n'+
'            .<span class="fn">filter</span>(|tx| tx.<span class="fn">fee_rate_milli</span>() < min_rate_milli)\n'+
'            .<span class="fn">map</span>(|tx| tx.txid.<span class="fn">clone</span>()).\fn collect</span>();\n'+
'        <span class="kw">let</span> n = to_remove.<span class="fn">len</span>();\n'+
'        <span class="kw">for</span> id <span class="kw">in</span> <span class="op">&amp;</span>to_remove { <span class="kw">self</span>.txs.<span class="fn">remove</span>(id); }\n'+
'        n\n'+
'    }\n'+
'\n'+
'    <span class="kw">fn</span> <span class="fn">len</span>(<span class="op">&amp;</span><span class="kw">self</span>) -&gt; <span class="ty">usize</span> { <span class="kw">self</span>.txs.<span class="fn">len</span>() }\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">main</span>() {\n'+
'    <span class="kw">let mut</span> mp = <span class="ty">Mempool</span>::<span class="fn">new</span>();\n'+
'\n'+
'    <span class="cm">// Ajouter des transactions avec différents fee-rates</span>\n'+
'    mp.<span class="fn">add</span>(<span class="ty">MempoolTx</span>::<span class="fn">new</span>(<span class="st">"tx_A"</span>, <span class="nm">10_000</span>, <span class="nm">250</span>));  <span class="cm">// 40 sat/vB</span>\n'+
'    mp.<span class="fn">add</span>(<span class="ty">MempoolTx</span>::<span class="fn">new</span>(<span class="st">"tx_B"</span>, <span class="nm">5_000</span>,  <span class="nm">500</span>));  <span class="cm">// 10 sat/vB</span>\n'+
'    mp.<span class="fn">add</span>(<span class="ty">MempoolTx</span>::<span class="fn">new</span>(<span class="st">"tx_C"</span>, <span class="nm">50_000</span>, <span class="nm">300</span>)); <span class="cm">// 167 sat/vB</span>\n'+
'    mp.<span class="fn">add</span>(<span class="ty">MempoolTx</span>::<span class="fn">new</span>(<span class="st">"tx_D"</span>, <span class="nm">1_000</span>,  <span class="nm">200</span>));  <span class="cm">// 5 sat/vB</span>\n'+
'    mp.<span class="fn">add</span>(<span class="ty">MempoolTx</span>::<span class="fn">new</span>(<span class="st">"tx_E"</span>, <span class="nm">30_000</span>, <span class="nm">400</span>)); <span class="cm">// 75 sat/vB</span>\n'+
'    <span class="mc">println!</span>(<span class="st">"Mempool: {} txs\n"</span>, mp.<span class="fn">len</span>());\n'+
'\n'+
'    <span class="cm">// Sélectionner pour un bloc (limite = 4000 weight units ≈ 1000 vbytes)</span>\n'+
'    <span class="kw">let</span> selected = mp.<span class="fn">select_for_block</span>(<span class="nm">4000</span>);\n'+
'    <span class="mc">println!</span>(<span class="st">"Sélectionnées pour le bloc (max 4000 wu):"</span>);\n'+
'    <span class="kw">let mut</span> total_fee = <span class="nm">0u64</span>;\n'+
'    <span class="kw">for</span> tx <span class="kw">in</span> <span class="op">&amp;</span>selected {\n'+
'        <span class="mc">println!</span>(<span class="st">"  {} : {} sat | {} vB | {:.1} sat/vB"</span>,\n'+
'            tx.txid, tx.fee, tx.vsize,\n'+
'            tx.fee <span class="kw">as</span> <span class="ty">f64</span> / tx.vsize <span class="kw">as</span> <span class="ty">f64</span>);\n'+
'        total_fee += tx.fee;\n'+
'    }\n'+
'    <span class="mc">println!</span>(<span class="st">"Total frais : {} sat ({} txs)"</span>, total_fee, selected.<span class="fn">len</span>());\n'+
'\n'+
'    <span class="cm">// Expulser les transactions avec fee-rate < 10 sat/vB (10000 milli)</span>\n'+

{
  id:'37', title:'Bloom filter pour client SPV',
  tags:['Bloom','SPV','murmurhash','faux positifs'],
  cargo:'',
  concept:[
    {type:'h3',text:'Bloom filter'},
    {type:'p',text:'Un Bloom filter permet de tester l\'appartenance d\'un élément à un ensemble avec une probabilité de faux positifs contrôlée, en utilisant très peu de mémoire.'},
    {type:'ul',items:[
      'Structure : tableau de m bits + k fonctions de hachage',
      'Insert : mettre à 1 les k positions hachées de l\'élément',
      'Query : si tous les k bits sont à 1 → peut-être dans le set',
      'Pas de faux négatifs : si "non" → définitivement absent',
      'BIP37 : wallets légers envoient un Bloom filter aux nœuds pour filtrer les transactions',
    ]},
    {type:'warn',text:'BIP37 a été déprécié pour des raisons de vie privée (le nœud complet apprend les adresses surveillées). BIP157/158 (compact block filters) est l\'alternative moderne.'},
  ],
  code:
'<span class="cm">// 37 — Bloom filter pour client SPV</span>\n'+
'<span class="cm">// Cargo.toml : pas de dépendances</span>\n'+
'\n'+
'<span class="kw">struct</span> <span class="ty">BloomFilter</span> {\n'+
'    bits:       <span class="ty">Vec</span>&lt;<span class="ty">u64</span>&gt;, <span class="cm">// tableau de bits (groupés en u64)</span>\n'+
'    m:          <span class="ty">usize</span>,   <span class="cm">// nombre de bits total</span>\n'+
'    k:          <span class="ty">usize</span>,   <span class="cm">// nombre de fonctions de hachage</span>\n'+
'    n_inserted: <span class="ty">usize</span>,   <span class="cm">// éléments insérés</span>\n'+
'}\n'+
'\n'+
'<span class="kw">impl</span> <span class="ty">BloomFilter</span> {\n'+
'    <span class="cm">/// Crée un Bloom filter pour n éléments avec taux p de faux positifs</span>\n'+
'    <span class="kw">fn</span> <span class="fn">new</span>(n: <span class="ty">usize</span>, p: <span class="ty">f64</span>) -&gt; <span class="ty">Self</span> {\n'+
'        <span class="cm">// Formule optimale : m = -n*ln(p) / ln(2)^2</span>\n'+
'        <span class="kw">let</span> m = (-(n <span class="kw">as</span> <span class="ty">f64</span>) * p.<span class="fn">ln</span>() / (<span class="nm">2f64</span>.<span class="fn">ln</span>().<span class="fn">powi</span>(<span class="nm">2</span>))) <span class="kw">as</span> <span class="ty">usize</span>;\n'+
'        <span class="kw">let</span> k = ((m <span class="kw">as</span> <span class="ty">f64</span> / n <span class="kw">as</span> <span class="ty">f64</span>) * <span class="nm">2f64</span>.<span class="fn">ln</span>()).<span class="fn">round</span>() <span class="kw">as</span> <span class="ty">usize</span>;\n'+
'        <span class="ty">BloomFilter</span> {\n'+
'            bits: <span class="kw">vec!</span>[<span class="nm">0u64</span>; (m + <span class="nm">63</span>) / <span class="nm">64</span>],\n'+
'            m, k, n_inserted: <span class="nm">0</span>,\n'+
'        }\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Murmur hash simplifié (k variations via double hashing)</span>\n'+
'    <span class="kw">fn</span> <span class="fn">hash</span>(<span class="op">&amp;</span><span class="kw">self</span>, data: <span class="op">&amp;</span>[<span class="ty">u8</span>], seed: <span class="ty">u32</span>) -&gt; <span class="ty">usize</span> {\n'+
'        <span class="kw">let mut</span> h = seed <span class="kw">as</span> <span class="ty">u64</span>;\n'+
'        <span class="kw">for</span> <span class="op">&amp;</span>b <span class="kw">in</span> data {\n'+
'            h ^= b <span class="kw">as</span> <span class="ty">u64</span>;\n'+
'            h = h.<span class="fn">wrapping_mul</span>(<span class="nm">0x517CC1B727220A95</span>);\n'+
'            h ^= h >> <span class="nm">32</span>;\n'+
'        }\n'+
'        (h <span class="kw">as</span> <span class="ty">usize</span>) % <span class="kw">self</span>.m\n'+
'    }\n'+
'\n'+
'    <span class="kw">fn</span> <span class="fn">set_bit</span>(<span class="op">&amp;</span><span class="kw">mut</span> <span class="kw">self</span>, pos: <span class="ty">usize</span>) {\n'+
'        <span class="kw">self</span>.bits[pos/<span class="nm">64</span>] |= <span class="nm">1u64</span> &lt;&lt; (pos%<span class="nm">64</span>);\n'+
'    }\n'+
'\n'+
'    <span class="kw">fn</span> <span class="fn">get_bit</span>(<span class="op">&amp;</span><span class="kw">self</span>, pos: <span class="ty">usize</span>) -&gt; <span class="ty">bool</span> {\n'+
'        (<span class="kw">self</span>.bits[pos/<span class="nm">64</span>] >> (pos%<span class="nm">64</span>)) <span class="op">&amp;</span> <span class="nm">1</span> == <span class="nm">1</span>\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Insère un élément</span>\n'+
'    <span class="kw">fn</span> <span class="fn">insert</span>(<span class="op">&amp;</span><span class="kw">mut</span> <span class="kw">self</span>, data: <span class="op">&amp;</span>[<span class="ty">u8</span>]) {\n'+
'        <span class="kw">for</span> i <span class="kw">in</span> <span class="nm">0</span>..<span class="kw">self</span>.k {\n'+
'            <span class="kw">let</span> pos = <span class="kw">self</span>.<span class="fn">hash</span>(data, i <span class="kw">as</span> <span class="ty">u32</span>);\n'+
'            <span class="kw">self</span>.<span class="fn">set_bit</span>(pos);\n'+
'        }\n'+
'        <span class="kw">self</span>.n_inserted += <span class="nm">1</span>;\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Teste l\'appartenance (peut avoir des faux positifs)</span>\n'+
'    <span class="kw">fn</span> <span class="fn">might_contain</span>(<span class="op">&amp;</span><span class="kw">self</span>, data: <span class="op">&amp;</span>[<span class="ty">u8</span>]) -&gt; <span class="ty">bool</span> {\n'+
'        (<span class="nm">0</span>..<span class="kw">self</span>.k).<span class="fn">all</span>(|i| <span class="kw">self</span>.<span class="fn">get_bit</span>(<span class="kw">self</span>.<span class="fn">hash</span>(data, i <span class="kw">as</span> <span class="ty">u32</span>)))\n'+
'    }\n'+
'\n'+
'    <span class="cm">/// Taux de faux positifs théorique actuel</span>\n'+
'    <span class="kw">fn</span> <span class="fn">fp_rate</span>(<span class="op">&amp;</span><span class="kw">self</span>) -&gt; <span class="ty">f64</span> {\n'+
'        (<span class="nm">1.0</span> - (-(<span class="kw">self</span>.k <span class="kw">as</span> <span class="ty">f64</span> * <span class="kw">self</span>.n_inserted <span class="kw">as</span> <span class="ty">f64</span>) / <span class="kw">self</span>.m <span class="kw">as</span> <span class="ty">f64</span>).<span class="fn">exp</span>()).<span class="fn">powi</span>(<span class="kw">self</span>.k <span class="kw">as</span> <span class="ty">i32</span>)\n'+
'    }\n'+
'\n'+
'    <span class="kw">fn</span> <span class="fn">info</span>(<span class="op">&amp;</span><span class="kw">self</span>) {\n'+
'        <span class="mc">println!</span>(<span class="st">"Bloom: m={} bits ({} bytes), k={} fonctions, n={}, FP théorique={:.2}%"</span>,\n'+
'            <span class="kw">self</span>.m, <span class="kw">self</span>.m/<span class="nm">8</span>, <span class="kw">self</span>.k, <span class="kw">self</span>.n_inserted, <span class="kw">self</span>.<span class="fn">fp_rate</span>()*<span class="nm">100.0</span>);\n'+
'    }\n'+
'}\n'+
'\n'+
'<span class="kw">fn</span> <span class="fn">main</span>() {\n'+
'    <span class="cm">// Bloom filter pour 1000 adresses avec p=1% faux positifs</span>\n'+
'    <span class="kw">let mut</span> bf = <span class="ty">BloomFilter</span>::<span class="fn">new</span>(<span class="nm">1000</span>, <span class="nm">0.01</span>);\n'+
'    bf.<span class="fn">info</span>();\n'+
'\n'+
'    <span class="cm">// Simuler des adresses Bitcoin surveillées</span>\n'+
'    <span class="kw">let</span> watched = [<span class="st">"1Alice..."</span>, <span class="st">"1Bob..."</span>, <span class="st">"1Carol..."</span>, <span class="st">"3MultiSig..."</span>];\n'+
'    <span class="kw">for</span> addr <span class="kw">in</span> <span class="op">&amp;</span>watched { bf.<span class="fn">insert</span>(addr.<span class="fn">as_bytes</span>()); }\n'+
'    bf.<span class="fn">info</span>();\n'+
'\n'+
'    <span class="mc">println!</span>(<span class="st">"\n=== Tests d\'appartenance ==="</span>);\n'+
'    <span class="kw">for</span> addr <span class="kw">in</span> <span class="op">&amp;</span>watched {\n'+
'        <span class="mc">println!</span>(<span class="st">"  {} : {} (attendu: oui)"</span>, addr,\n'+

'\n'+
